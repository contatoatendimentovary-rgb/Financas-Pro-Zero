<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EAB308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Finan Pro</title>

    <link rel="manifest" href="data:application/manifest+json,{'name':'Finan Pro','short_name':'FinanPro','start_url':'/','display':'standalone','background_color':'#050505','theme_color':'#EAB308','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/10433/10433048.png','sizes':'512x512','type':'image/png','purpose':'any maskable'}]}">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        .header { padding: 50px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: var(--accent); color: #000; padding: 8px 16px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .month-bar { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; padding-bottom: 5px; }
        .m-item { padding: 10px 18px; border-radius: 14px; background: #1A1A1A; border: 1px solid var(--border); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        .hero { text-align: center; padding: 35px 20px 15px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; }

        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 10px; }
        .stat-card small { font-size: 0.6rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; display: block; }

        .chart-box { background: var(--card); border-radius: 28px; border: 1px solid var(--border); margin: 0 20px 25px; padding: 30px; text-align: center; }
        .chart-container { width: 160px; height: 160px; margin: 0 auto; }

        .t-row { background: var(--card); padding: 16px; border-radius: 20px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .ai-fab { position: fixed; bottom: 105px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); z-index: 999; }
        .panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
        .msg-user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 700; }

        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 25px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.65rem; }
        .n-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="ai-modal" class="panel">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--card)">
            <b style="color:var(--accent)">✨ CONSULTOR INTELIGENTE</b>
            <button onclick="toggleIA()" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="chat-box" class="chat-area"></div>
        <div style="padding:25px; display:flex; gap:12px; background:var(--card); border-top:1px solid var(--border);">
            <input type="text" id="ai-input" placeholder="Conversar ou lançar..." style="flex:1; padding:18px; border-radius:15px; border:1px solid var(--border); background:#000; color:#fff; outline:none;">
            <button onclick="processarIA()" style="background:var(--accent); border:none; padding:0 25px; border-radius:15px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b>FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" class="user-badge" onclick="login()">CONECTAR</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div id="v-home">
        <div class="hero">
            <span>Saldo Acumulado</span>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>
        <div style="padding: 0 20px;">
            <div class="stat-card"><small>Saldo do Mês Passado</small><b id="st-ant" style="color:var(--accent)">R$ 0,00</b></div>
            <div style="display:flex; gap:10px;">
                <div class="stat-card" style="flex:1;"><small>Receitas</small><b id="st-rec" style="color:var(--green)">R$ 0,00</b></div>
                <div class="stat-card" style="flex:1;"><small>Despesas</small><b id="st-gas" style="color:var(--red)">R$ 0,00</b></div>
            </div>
        </div>
        <div class="chart-box">
            <div class="chart-container"><canvas id="myChart"></canvas></div>
        </div>
    </div>

    <div id="v-lista" style="display:none;"><div id="cont-lista" style="padding-top:20px;"></div></div>

    <button class="ai-fab" onclick="toggleIA()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="tab('home', this)">📊 DASHBOARD</button>
        <button class="n-btn" onclick="tab('lista', this)">📜 EXTRATO</button>
    </nav>

    <script>
        // Registro do Service Worker para Instalação PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        const cfg = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null, saldoCache = 0;

        function init() {
            const mCont = document.getElementById('month-list');
            MESES.forEach(m => {
                const d = document.createElement('div');
                d.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                d.innerText = m.charAt(0).toUpperCase() + m.slice(1);
                d.onclick = () => { document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active')); d.classList.add('active'); mesAtivo = m; sync(); };
                mCont.appendChild(d);
            });
            auth.onAuthStateChanged(u => { if(u){ document.getElementById('user-display').innerText = u.displayName.split(' ')[0]; sync(); } });
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function sync() {
            if(!auth.currentUser) return;
            let saldoAnt = 0;
            let idx = MESES.indexOf(mesAtivo);

            for (let i = 0; i < idx; i++) {
                const s = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(MESES[i]).get();
                if (s.exists) (s.data().transacoes || []).forEach(t => {
                    const v = parseFloat(t.valor) || 0;
                    t.tipo.toLowerCase().includes('entrada') ? saldoAnt += v : saldoAnt -= v;
                });
            }

            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo)
            .onSnapshot(doc => {
                let rec = 0, gas = 0, html = "";
                let cats = { Fixo:0, Lazer:0, Invest:0, Outros:0 };
                const trans = doc.exists ? doc.data().transacoes || [] : [];
                
                trans.forEach((t, i) => {
                    const v = parseFloat(t.valor) || 0;
                    const tp = t.tipo.toLowerCase();
                    if(tp.includes('entrada')) rec += v;
                    else {
                        gas += v;
                        if(tp.includes('fixo')) cats.Fixo += v;
                        else if(tp.includes('lazer')) cats.Lazer += v;
                        else if(tp.includes('invest')) cats.Invest += v;
                        else cats.Outros += v;
                    }
                    html += `<div class="t-row"><div><b>${t.descricao}</b><br><small>${t.tipo}</small></div><b>R$ ${v.toFixed(2)}</b></div>`;
                });

                saldoCache = saldoAnt + rec - gas;
                document.getElementById('main-balance').innerText = saldoCache.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('st-ant').innerText = `R$ ${saldoAnt.toFixed(2)}`;
                document.getElementById('st-rec').innerText = `R$ ${rec.toFixed(2)}`;
                document.getElementById('st-gas').innerText = `R$ ${gas.toFixed(2)}`;
                document.getElementById('cont-lista').innerHTML = html;
                renderChart(cats, saldoAnt, rec, gas);
            });
        }

        function renderChart(c, ant, rec, gas) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            const sobra = ((ant > 0 ? ant : 0) + rec) - gas;
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Invest', 'Outros', 'Saldo'],
                    datasets: [{
                        data: [c.Fixo, c.Lazer, c.Invest, c.Outros, sobra > 0 ? sobra : 0],
                        backgroundColor: ['#3B82F6', '#F59E0B', '#A855F7', '#EF4444', '#EAB308'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        async function processarIA() {
            const inp = document.getElementById('ai-input'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const prompt = inp.value;
            box.innerHTML += `<div class="msg msg-user">${prompt}</div>`;
            inp.value = ""; box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({
                        model:"llama-3.1-8b-instant",
                        messages:[{role:"system", content: "FinanPro AI. Se for lançamento: envie APENAS JSON {\"is_launch\":true,\"desc\":\"...\",\"valor\":0.0,\"tipo\":\"entrada/fixo/lazer/invest\"}. Se for conversa, seja um mentor humano e dê feedback sobre o saldo atual: R$ "+saldoCache}, {role:"user", content: prompt}]
                    })
                });
                const data = await res.json();
                const aiText = data.choices[0].message.content;

                if(aiText.includes("{")) {
                    const r = JSON.parse(aiText);
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo);
                    const s = await ref.get();
                    let l = s.exists ? s.data().transacoes || [] : [];
                    l.push({ descricao: r.desc, valor: r.valor, tipo: r.tipo });
                    await ref.set({ transacoes: l });
                    box.innerHTML += `<div class="msg msg-ai">✅ Lançado! Analisando aqui: ${r.valor > (saldoCache*0.2) ? 'Cuidado, esse gasto foi alto pro seu saldo!' : 'Gasto sob controle.'}</div>`;
                } else {
                    box.innerHTML += `<div class="msg msg-ai">${aiText}</div>`;
                }
            } catch(e) { box.innerHTML += `<div class="msg msg-ai">Erro ao processar.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        function tab(t, b) {
            document.getElementById('v-home').style.display = t==='home'?'block':'none';
            document.getElementById('v-lista').style.display = t==='lista'?'block':'none';
            document.querySelectorAll('.n-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function toggleIA() { const m = document.getElementById('ai-modal'); m.style.display = m.style.display==='flex'?'none':'flex'; }

        init();
    </script>
</body>
</html>
