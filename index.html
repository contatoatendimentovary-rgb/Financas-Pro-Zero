<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO - Cloud</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Finanças<span>PRO</span></h1>
            <button onclick="window.loginGoogle()" id="btnAuth" class="btn-google">Login Google</button>
        </div>
    </header>

    <div class="container">
        <div class="card-balanco">
            <div class="seletor-mes">
                <select id="filtroMes" onchange="carregarDadosDoFirebase()"></select>
            </div>
            <small>Saldo em Conta</small>
            <h2 id="saldo">R$ 0,00</h2>
            <div class="chart-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>

        <div class="card-form">
            <h3>Novo Registro</h3>
            <input type="text" id="desc" placeholder="Descrição">
            <div class="row">
                <input type="number" id="valor" placeholder="R$ 0,00" style="flex:2">
                <input type="date" id="data" style="flex:1.5">
            </div>
            <select id="cat">
                <option value="Receita">Receita / Salário</option>
                <option value="Essencial">Essencial (50%)</option>
                <option value="Lazer">Lazer (30%)</option>
                <option value="Investimento">Investimento (20%)</option>
            </select>
            <button onclick="salvarNoFirebase()" class="btn-save">Confirmar Registro</button>
        </div>

        <div id="lista" class="historico-lista"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
        authDomain: "financaspro-1e0e8.firebaseapp.com",
        projectId: "financaspro-1e0e8",
        storageBucket: "financaspro-1e0e8.firebasestorage.app",
        messagingSenderId: "659521706556",
        appId: "1:659521706556:web:86f2174c4c8a89335ac139"
      };

      const app = initializeApp(firebaseConfig);
      window.auth = getAuth(app);
      window.db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      window.loginGoogle = () => {
        signInWithPopup(window.auth, provider).then(() => location.reload());
      };

      onAuthStateChanged(window.auth, (user) => {
          if (user) {
              document.getElementById('btnAuth').innerText = "Sair";
              document.getElementById('btnAuth').onclick = () => window.auth.signOut().then(() => location.reload());
              window.carregarDadosDoFirebase();
          }
      });
    </script>
    <script src="script.js"></script>
</body>
</html>
