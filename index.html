<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO // Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #0A0A0A; --text-main: #FFFFFF;
            --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047;
            --green: #22C55E; --red: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* TELA DE BLOQUEIO */
        #app-lock { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .lock-btn { background: var(--accent); color: #000; border: none; padding: 18px 35px; border-radius: 20px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 80%; }

        /* HEADER */
        .glass-header { background: #000; padding: 40px 20px 30px; border-bottom: 1px solid var(--border); }
        .user-pill { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; }
        
        /* CARDS */
        .viz-card { background: var(--card); margin: 20px; padding: 20px; border-radius: 25px; border: 1px solid var(--border); min-height: 280px; }
        .entry-card { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* NAVEGAÇÃO */
        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-weight: 700; font-size: 0.8rem; }
        .nav-btn.active { color: var(--accent); }

        .floating-btn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 30px; font-weight: 800; z-index: 999; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: #000; width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: #0A0A0A; color: #fff; }
        
        .tab-content { display: none; padding-bottom: 120px; } 
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="app-lock">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
        <h2 style="font-weight: 800;">FinançasPRO Locked</h2>
        <p style="color: var(--text-sub); font-size: 0.9rem;">Acesse com sua digital ou PIN</p>
        <button onclick="tentarDesbloquear()" class="lock-btn">DESBLOQUEAR</button>
    </div>

    <div id="main-content">
        <header class="glass-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-weight:800; font-size:1.1rem;">Finanças<span style="color:var(--accent)">PRO</span></div>
                <button id="btnAuth" class="user-pill" onclick="loginGoogle()">ENTRAR</button>
            </div>
            <p style="color:var(--text-sub); text-transform:uppercase; font-size:0.7rem; letter-spacing:1px;">Saldo Disponível</p>
            <h1 id="saldo" style="font-size:2.5rem; font-weight:800; margin-top:5px;">R$ 0,00</h1>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card">
                <canvas id="graficoPizza"></canvas>
            </div>
        </section>

        <section id="aba-aportes" class="tab-content">
            <div class="viz-card" style="height: auto;">
                <h3 style="margin-bottom:15px; font-size:0.9rem; color:var(--accent);">Meus Investimentos</h3>
                <div id="lista-invest"></div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option>
                    <option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option>
                    <option value="abril">Abril</option>
                    <option value="maio" selected>Maio</option>
                </select>
            </div>
            <div id="lista" style="padding: 0 20px;"></div>
        </section>

        <nav class="bottom-tab-bar">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active">📊 Resumo</button>
            <button onclick="switchTab('aba-aportes', this)" class="nav-btn">📈 Aportes</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn">📜 Extrato</button>
        </nav>

        <button onclick="abrirModal()" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="margin-bottom:20px;">Novo Lançamento</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="0,00">
                    <input type="date" id="data-reg">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (-)</option>
                        <option value="lazer">Lazer (-)</option>
                        <option value="investimento">Investimento (-)</option>
                    </select>
                </div>
                <button onclick="salvarRegistro()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:15px; font-weight:800;">CONFIRMAR</button>
                <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:var(--text-sub); padding:15px;">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.f_doc = doc; window.f_setDoc = setDoc; window.f_getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase();
                window.carregarDados();
            }
        });

        window.loginGoogle = () => {
            signInWithPopup(window.auth, new GoogleAuthProvider()).catch(e => console.log(e));
        };
    </script>
    
    <script>
        let myChart;

        // BIOMETRIA CORRIGIDA - REMOÇÃO DO ERRO DE CHAVE DE ACESSO
        function tentarDesbloquear() {
            if (window.PublicKeyCredential) {
                // Apenas fecha a tela de bloqueio, pois o Android já gerencia o login do sistema
                document.getElementById('app-lock').style.display = 'none';
            } else {
                document.getElementById('app-lock').style.display = 'none';
            }
        }

        async function carregarDados() {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.f_doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.f_getDoc(ref);
            
            let saldoTotal = 0, fixo = 0, lazer = 0, invest = 0, html = "", investHtml = "";
            let trans = snap.exists() ? snap.data().transacoes : [];
            
            trans.forEach(t => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') saldoTotal += v;
                else {
                    saldoTotal -= v;
                    if(t.tipo === 'fixo') fixo += v;
                    else if(t.tipo === 'lazer') lazer += v;
                    else if(t.tipo === 'investimento') {
                        invest += v;
                        investHtml += `<div class="entry-card"><span>${t.descricao}</span><b>R$ ${v.toFixed(2)}</b></div>`;
                    }
                }
                html += `<div class="entry-card"><div><b>${t.descricao}</b><br><small>${t.data}</small></div><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b></div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${saldoTotal.toFixed(2)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.3;">Vazio</p>';
            document.getElementById('lista-invest').innerHTML = investHtml || '<p style="text-align:center; opacity:0.3;">Sem aportes</p>';
            
            // ATUALIZAÇÃO DO GRÁFICO
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Invest'],
                    datasets: [{ data: [fixo, lazer, invest], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }]
                },
                options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }

        async function salvarRegistro() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data-reg').value, t = document.getElementById('tipo').value;
            if (!dt || !v) return;

            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const mesAlvo = meses[new Date(dt).getUTCMonth()];

            const ref = window.f_doc(window.db, "usuarios", user.uid, "meses", mesAlvo);
            const snap = await window.f_getDoc(ref);
            let lista = snap.exists() ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            
            await window.f_setDoc(ref, { transacoes: lista });
            fecharModal();
            carregarDados();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
