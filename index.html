<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro - Gestão Comercial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0F172A; --header-bg: #1E293B; --card: #1E293B; --text-main: #F1F5F9;
            --text-sub: #94A3B8; --border: #334155; --accent: #6366F1;
            --green: #10B981; --red: #EF4444; --orange: #F59E0B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 100px; }
        .glass-header { background: var(--header-bg); padding: 40px 20px; border-radius: 0 0 30px 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .main-balance h1 { font-size: 2.5rem; margin: 10px 0; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-top: -20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .entry-card { background: var(--card); padding: 15px; border-radius: 15px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--header-bg); display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-end; }
        .modal-content { background: var(--card); width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; margin: 5px 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 0.5s; }
        .ai-popup { display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; background: var(--card); border: 1px solid var(--accent); border-radius: 28px; padding: 22px; z-index: 3000; flex-direction: column; max-height: 70vh; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .chat-area { flex: 1; overflow-y: auto; margin: 15px 0; font-size: 0.9rem; min-height: 200px; }
        .chat-bubble { margin-bottom: 12px; padding: 14px; border-radius: 18px; max-width: 90%; line-height: 1.4; }
        .ai-bubble { background: rgba(99, 102, 241, 0.1); color: var(--text-main); border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--accent); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    </style>
</head>
<body>

    <div id="ai-modal" class="ai-popup">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--accent);">Mente Financeira</b>
            <button onclick="fecharAI()" style="background:none; border:none; font-size:1.8rem; color:var(--text-sub);">&times;</button>
        </div>
        <div class="chat-area" id="chat-historico"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="ai-input" placeholder="Dúvida sobre o fluxo?" style="flex:1;">
            <button onclick="perguntarIA()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:10px; font-weight:bold;">IR</button>
        </div>
    </div>

    <header class="glass-header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:800; color:var(--accent)">FINAN PRO</div>
            <button onclick="loginGoogle()" id="btnAuth" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:15px; font-weight:bold;">LOGIN</button>
        </div>
        <div class="main-balance"><small>SALDO TOTAL</small><h1 id="saldo">R$ 0,00</h1></div>
    </header>

    <div class="stats-row">
        <div class="stat-card"><small>ENTRADAS</small><b id="res-rec" style="color:var(--green); display:block;">R$ 0,00</b></div>
        <div class="stat-card"><small>SAÍDAS</small><b id="res-des" style="color:var(--red); display:block;">R$ 0,00</b></div>
    </div>

    <main style="margin-top:30px;">
        <div id="aba-dash">
            <div style="margin: 0 20px;"><canvas id="chartJS" style="max-height: 180px;"></canvas></div>
            <div id="perc-labels" style="padding: 20px;"></div>
        </div>
        <div id="aba-extrato" style="display:none;">
            <div style="padding:0 20px 10px;"><select id="filtroMes" onchange="carregarDados()"></select></div>
            <div id="lista-transacoes"></div>
        </div>
    </main>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showTab('aba-dash', this)">📊 DASH</button>
        <button class="nav-btn" onclick="openModal()">➕ NOVO</button>
        <button class="nav-btn" onclick="showTab('aba-extrato', this)">📜 EXTRATO</button>
    </div>

    <div class="modal" id="modalLanca">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center;">Novo Lançamento</h3>
            <input type="text" id="desc" placeholder="Ex: Almoço">
            <input type="number" id="valor" placeholder="Valor">
            <input type="date" id="data">
            <select id="tipo">
                <option value="entrada">💰 Receita</option>
                <option value="fixo">🏠 Fixo</option>
                <option value="lazer">🍦 Lazer</option>
                <option value="investimento">📈 Reserva</option>
            </select>
            <button onclick="salvar()" id="btnSalvar" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">CONFIRMAR</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-sub); margin-top:10px;">Voltar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", 
            authDomain: "financaspro-1e0e8.firebaseapp.com", 
            projectId: "financaspro-1e0e8", 
            storageBucket: "financaspro-1e0e8.firebasestorage.app", 
            messagingSenderId: "659521706556", 
            appId: "1:659521706556:web:86f2174c4c8a89335ac139" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // CHAVE API INSERIDA AQUI
        const GROQ_API_KEY = "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"; 
        
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        let meuGrafico = null;
        let resumoGlobal = { saldo: 0 };

        const selectMes = document.getElementById('filtroMes');
        meses.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.text = m.charAt(0).toUpperCase() + m.slice(1); selectMes.add(opt); });
        selectMes.value = meses[new Date().getMonth()];

        async function loginGoogle() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) { console.error(e); } }
        function showTab(id, btn) { 
            document.getElementById('aba-dash').style.display = id === 'aba-dash' ? 'block' : 'none';
            document.getElementById('aba-extrato').style.display = id === 'aba-extrato' ? 'block' : 'none';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function openModal() { document.getElementById('data').value = new Date().toISOString().split('T')[0]; document.getElementById('modalLanca').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalLanca').style.display = 'none'; }
        function abrirAI() { document.getElementById('ai-modal').style.display = 'flex'; }
        function fecharAI() { document.getElementById('ai-modal').style.display = 'none'; }

        async function carregarDados() {
            if (!auth.currentUser) return;
            const mesSel = document.getElementById('filtroMes').value;
            const doc = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesSel).get();
            let sal = 0, ent = 0, sai = 0, f = 0, l = 0, i = 0, html = "";
            
            if (doc.exists) {
                const dados = doc.data().transacoes || [];
                dados.sort((a,b) => b.timestamp - a.timestamp);
                dados.forEach(t => {
                    const v = Number(t.valor);
                    if (t.tipo === 'entrada') { ent += v; sal += v; }
                    else { sai += v; sal -= v; if(t.tipo==='fixo') f+=v; else if(t.tipo==='lazer') l+=v; else i+=v; }
                    html += `<div class="entry-card"><div><b>${t.descricao}</b><br><small>${t.data}</small></div><span style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>`;
                });
            }
            resumoGlobal.saldo = sal;
            document.getElementById('saldo').innerText = sal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('res-rec').innerText = ent.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('res-des').innerText = sai.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('lista-transacoes').innerHTML = html || "<p style='text-align:center;padding:20px;opacity:0.5;'>Vazio.</p>";
            atualizarGrafico(f, l, i);
        }

        async function salvar() {
            if (!auth.currentUser) return alert("Logue primeiro!");
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data').value, tp = document.getElementById('tipo').value;
            if(!d || !v || !dt) return alert("Preencha tudo!");

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.innerText = "GRAVANDO...";

            try {
                const mesNome = meses[new Date(dt + "T12:00:00").getMonth()];
                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesNome);
                await ref.set({
                    transacoes: firebase.firestore.FieldValue.arrayUnion({
                        descricao: d, valor: parseFloat(v), tipo: tp, data: dt, timestamp: Date.now()
                    })
                }, { merge: true });

                closeModal();
                await carregarDados(); 
                abrirAI();
                perguntarIA(tp === 'entrada' ? `Henrique, entrou R$ ${v} de ${d}.` : `Gastei R$ ${v} com ${d}.`);
            } catch(e) { console.error(e); }
            finally { btn.disabled = false; btn.innerText = "CONFIRMAR"; document.getElementById('desc').value = ""; document.getElementById('valor').value = ""; }
        }

        async function perguntarIA(perguntaExtra = null) {
            const input = document.getElementById('ai-input'), chat = document.getElementById('chat-historico');
            const texto = perguntaExtra || input.value;
            if(!texto) return;
            if(!perguntaExtra) { chat.innerHTML += `<div class="chat-bubble user-bubble">${texto}</div>`; input.value = ""; }
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ 
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: "Você é o parceiro de negócios do Henrique. Ele estuda Gestão Comercial. Seja direto, humano e use termos como 'fluxo' e 'game'. Saldo: R$" + resumoGlobal.saldo }, { role: "user", content: texto }]
                    })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="chat-bubble ai-bubble">${data.choices[0].message.content}</div>`;
            } catch(e) { chat.innerHTML += `<div class="chat-bubble ai-bubble">Bora focar no jogo, a IA deu um soluço aqui.</div>`; }
            chat.scrollTop = chat.scrollHeight;
        }

        function atualizarGrafico(f, l, i) {
            const ctx = document.getElementById('chartJS').getContext('2d');
            if(meuGrafico) meuGrafico.destroy();
            meuGrafico = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Fixos', 'Lazer', 'Reserva'], datasets: [{ data: [f||1, l||0, i||0], backgroundColor: ['#EF4444', '#F59E0B', '#6366F1'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
            const total = (f + l + i) || 1;
            document.getElementById('perc-labels').innerHTML = `
                <small>Fixos: ${((f/total)*100).toFixed(0)}%</small><div class="progress-bar"><div class="progress-fill" style="width:${(f/total)*100}%; background:var(--red)"></div></div>
                <small>Lazer: ${((l/total)*100).toFixed(0)}%</small><div class="progress-bar"><div class="progress-fill" style="width:${(l/total)*100}%; background:var(--orange)"></div></div>
            `;
        }

        auth.onAuthStateChanged(user => { if (user) { document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase(); carregarDados(); } });
    </script>
</body>
</html>
