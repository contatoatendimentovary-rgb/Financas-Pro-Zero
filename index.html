<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro - Gestão Comercial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0F172A; --header-bg: #1E293B; --card: #1E293B; --text-main: #F1F5F9;
            --text-sub: #94A3B8; --border: #334155; --accent: #6366F1;
            --green: #10B981; --orange: #F59E0B; --red: #EF4444; 
            --ai-gradient: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }
        [data-theme="light"] {
            --bg: #F8FAFC; --header-bg: #FFFFFF; --card: #FFFFFF; --text-main: #0F172A;
            --text-sub: #64748B; --border: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 110px; transition: 0.3s; overflow-x: hidden; }
        .glass-header { background: var(--header-bg); padding: 50px 20px 40px; border-radius: 0 0 30px 30px; border-bottom: 1px solid var(--border); text-align: center; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 12px; cursor: pointer; }
        .user-pill { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin: 5px 0; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-top: -25px; position: relative; z-index: 10; }
        .stat-card { background: var(--card); padding: 18px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .viz-card { background: var(--card); margin: 20px; padding: 22px; border-radius: 28px; border: 1px solid var(--border); }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .entry-card { background: var(--card); padding: 16px; border-radius: 20px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .ai-popup { display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; background: var(--card); border: 1px solid var(--accent); border-radius: 28px; padding: 22px; z-index: 3000; flex-direction: column; max-height: 70vh; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .chat-area { flex: 1; overflow-y: auto; margin: 15px 0; font-size: 0.9rem; min-height: 200px; }
        .chat-bubble { margin-bottom: 10px; padding: 12px; border-radius: 16px; max-width: 85%; line-height: 1.4; }
        .ai-bubble { background: rgba(79, 70, 229, 0.1); color: var(--text-main); border-bottom-left-radius: 4px; }
        .user-bubble { background: var(--accent); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--header-bg); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn span { font-size: 1.4rem; margin-bottom: 4px; }
        .floating-btn { position: fixed; bottom: 115px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--ai-gradient); color: white; border: none; font-size: 24px; z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 4000; align-items: flex-end; backdrop-filter: blur(4px); }
        .modal-sheet { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 2px solid var(--accent); }
        .input-grid input, .input-grid select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); outline: none; }
        .progress-container { background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; margin: 6px 0 12px; }
        .bar { height: 100%; transition: 0.8s; }
    </style>
</head>
<body>

    <div id="ai-modal" class="ai-popup">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--accent); font-size: 0.8rem;">✨ CONSULTOR FINAN PRO</b>
            <button onclick="fecharAI()" style="background:none; border:none; font-size:1.5rem; color:var(--text-sub);">&times;</button>
        </div>
        <div class="chat-area" id="chat-historico">
            <div class="chat-bubble ai-bubble">Olá Henrique! Sou seu assistente de Gestão Comercial. Como posso ajudar hoje?</div>
        </div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="ai-input" placeholder="Perguntar..." style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text-main);">
            <button onclick="perguntarIA()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:12px; font-weight:bold;">OK</button>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-top">
            <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
            <div style="font-weight: 800; color: var(--accent);">FINAN PRO</div>
            <button id="btnAuth" class="user-pill" onclick="loginGoogle()">ENTRAR</button>
        </div>
        <div class="main-balance"><h1 id="saldo">R$ 0,00</h1><small style="color: var(--text-sub); font-weight: 700;">SALDO TOTAL</small></div>
    </header>

    <div class="stats-row">
        <div class="stat-card"><small style="color:var(--text-sub); font-size: 0.6rem;">RECEITAS</small><b id="resumo-receita" style="color: var(--green); display:block;">R$ 0,00</b></div>
        <div class="stat-card"><small style="color:var(--text-sub); font-size: 0.6rem;">DESPESAS</small><b id="resumo-despesa" style="color: var(--red); display:block;">R$ 0,00</b></div>
    </div>

    <main>
        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card"><canvas id="graficoPizza" style="max-height: 180px;"></canvas></div>
            <div id="metas-container" style="padding: 0 20px;"></div>
        </section>
        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;"><select id="filtroMes" class="input-grid" onchange="carregarDados()"><option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option><option value="março">Março</option><option value="abril">Abril</option><option value="maio">Maio</option><option value="junho">Junho</option><option value="julho">Julho</option><option value="agosto">Agosto</option><option value="setembro">Setembro</option><option value="outubro">Outubro</option><option value="novembro">Novembro</option><option value="dezembro">Dezembro</option></select></div>
            <div id="lista-geral"></div>
        </section>
    </main>

    <button class="floating-btn" onclick="abrirAI()">✨</button>

    <nav class="bottom-tab-bar">
        <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active"><span>📊</span>DASH</button>
        <button onclick="abrirModalLançamento()" class="nav-btn"><span>➕</span>NOVO</button>
        <button onclick="switchTab('aba-extrato', this)" class="nav-btn"><span>📜</span>EXTRATO</button>
    </nav>

    <div id="modal" class="modal-overlay" onclick="if(event.target==this) fecharModal()">
        <div class="modal-sheet">
            <h3 style="margin-bottom: 20px; text-align: center;">Novo Registro</h3>
            <div class="input-grid">
                <input type="text" id="desc" placeholder="Descrição">
                <input type="number" id="valor" placeholder="Valor R$">
                <input type="date" id="data-reg">
                <select id="tipo"><option value="fixo">Essencial (50%)</option><option value="lazer">Lazer (30%)</option><option value="investimento">Reserva (20%)</option><option value="entrada">Receita (+)</option></select>
                <button onclick="salvarRegistro()" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:16px; font-weight:bold;">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // CHAVE API SOLICITADA
        const Gemini_API_Key = "AIzaSyABN1kT-ycsJkhVT0OtqRoK8r2Z1iwrD5I"; 

        let chartP = null;
        let dadosFinanceiros = { rec:0, f:0, l:0, i:0, saldo:0 };
        const mesesNomes = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

        function toggleTheme() { document.body.getAttribute('data-theme') === 'light' ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'light'); }
        function abrirAI() { document.getElementById('ai-modal').style.display = 'flex'; }
        function fecharAI() { document.getElementById('ai-modal').style.display = 'none'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }
        function abrirModalLançamento() { document.getElementById('data-reg').value = new Date().toISOString().split('T')[0]; document.getElementById('modal').style.display = 'flex'; }
        function switchTab(id, btn) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }

        async function loginGoogle() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch (e) { alert("Erro ao logar."); } }

        async function carregarDados() {
            if (!auth.currentUser) return;
            const mes = document.getElementById('filtroMes').value;
            const snap = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes).get();
            let s = 0, f = 0, l = 0, i = 0, r = 0, html = "";
            if (snap.exists) {
                (snap.data().transacoes || []).forEach(t => {
                    const v = parseFloat(t.valor);
                    if (t.tipo === 'entrada') { s += v; r += v; }
                    else { s -= v; if(t.tipo==='fixo') f+=v; else if(t.tipo==='lazer') l+=v; else i+=v; }
                    html += `<div class="entry-card"><b>${t.descricao}</b> <span style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>`;
                });
            }
            dadosFinanceiros = { rec:r, f, l, i, saldo:s };
            document.getElementById('saldo').innerText = s.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('resumo-receita').innerText = r.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('resumo-despesa').innerText = (f+l+i).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('lista-geral').innerHTML = html || "<p style='text-align:center;padding:40px;opacity:0.5'>Vazio.</p>";
            renderCharts(f, l, i);
        }

        async function salvarRegistro() {
            if (!auth.currentUser) return;
            const v = document.getElementById('valor').value, dt = document.getElementById('data-reg').value;
            const mes = mesesNomes[parseInt(dt.split('-')[1]) - 1];
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes);
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: document.getElementById('desc').value || "S/N", valor: v, tipo: document.getElementById('tipo').value, data: dt });
            await ref.set({ transacoes: lista });
            fecharModal(); carregarDados();
        }

        // IA - MODELO FLASH 1.5 ATUALIZADO COM ENDPOINT v1beta
        async function perguntarIA() {
            const input = document.getElementById('ai-input');
            const chat = document.getElementById('chat-historico');
            if(!input.value) return;
            
            const textoUser = input.value;
            chat.innerHTML += `<div class="chat-bubble user-bubble">${textoUser}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const prompt = `Henrique (Estudante de Gestão Comercial). Saldo: R$${dadosFinanceiros.saldo}. Essencial: R$${dadosFinanceiros.f}, Lazer: R$${dadosFinanceiros.l}, Reserva: R$${dadosFinanceiros.i}. Analise e responda brevemente: ${textoUser}`;
                
                // Chamada para a versão beta que é mais estável para chaves individuais
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${Gemini_API_Key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const botResposta = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="chat-bubble ai-bubble">${botResposta}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="chat-bubble ai-bubble" style="color:var(--red)"><b>Erro:</b> ${e.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function renderCharts(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if(chartP) chartP.destroy();
            chartP = new Chart(ctx, { type:'doughnut', data:{ labels:['Fixo','Lazer','Reserva'], datasets:[{ data:[f||1, l||0, i||0], backgroundColor:['#EF4444','#F59E0B','#6366F1'], borderWidth:0 }] }, options:{ cutout:'80%', plugins:{legend:{display:false}} }});
            const totalGasto = (f+l+i) || 1;
            const pct = (v) => ((v/totalGasto)*100).toFixed(0);
            document.getElementById('metas-container').innerHTML = `
                <div style="margin-top:15px;"><small>Essencial: ${pct(f)}%</small><div class="progress-container"><div class="bar" style="width:${pct(f)}%;background:var(--red)"></div></div>
                <small>Lazer: ${pct(l)}%</small><div class="progress-container"><div class="bar" style="width:${pct(l)}%;background:var(--orange)"></div></div>
                <small>Reserva: ${pct(i)}%</small><div class="progress-container"><div class="bar" style="width:${pct(i)}%;background:var(--accent)"></div></div></div>`;
        }

        auth.onAuthStateChanged(user => { if (user) { document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase(); document.getElementById('filtroMes').value = mesesNomes[new Date().getMonth()]; carregarDados(); } });
        renderCharts(0,0,0);
    </script>
</body>
</html>
