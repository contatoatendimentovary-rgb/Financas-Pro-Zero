<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Oficial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        .header { padding: 45px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: var(--accent); color: #000; padding: 8px 16px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .month-bar { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; padding-bottom: 5px; }
        .m-item { padding: 10px 18px; border-radius: 14px; background: #1A1A1A; border: 1px solid var(--border); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        .hero { text-align: center; padding: 35px 20px 15px; }
        .hero span { font-size: 0.7rem; text-transform: uppercase; color: var(--subtext); font-weight: 800; letter-spacing: 1.5px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; margin-top: 5px; }

        .mini-stats { display: flex; gap: 12px; margin: 0 20px 25px; }
        .stat-card { flex: 1; background: var(--card); padding: 18px; border-radius: 22px; border: 1px solid var(--border); }
        .stat-card small { font-size: 0.6rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; display: block; margin-bottom: 6px; }
        .stat-card b { font-size: 1.05rem; letter-spacing: -0.5px; }

        .chart-box { background: var(--card); border-radius: 28px; border: 1px solid var(--border); margin: 0 20px 25px; padding: 30px; text-align: center; }
        .chart-container { width: 170px; height: 170px; margin: 0 auto; position: relative; }

        .t-row { background: var(--card); padding: 16px; border-radius: 20px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-info { display: flex; align-items: center; gap: 14px; }
        .t-emoji { width: 44px; height: 44px; background: #1A1A1A; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border: 1px solid var(--border); }
        .t-details b { display: block; font-size: 0.95rem; letter-spacing: -0.3px; }
        .t-details span { font-size: 0.65rem; color: var(--subtext); font-weight: 800; text-transform: uppercase; }

        .btn-del { background: rgba(239, 68, 68, 0.1); border: none; color: var(--red); width: 38px; height: 38px; border-radius: 12px; font-size: 1rem; cursor: pointer; }

        .ai-fab { position: fixed; bottom: 105px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); z-index: 999; }

        .panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); color: #fff; }
        .msg-user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 700; }

        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 20px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.65rem; }
        .n-btn.active { color: var(--accent); }
        .n-btn i { font-size: 1.6rem; margin-bottom: 6px; }
    </style>
</head>
<body>

    <div id="ai-modal" class="panel">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--accent); letter-spacing:1px;">✨ ASSISTENTE FINANPRO</b>
            <button onclick="toggleIA()" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="chat-box" class="chat-area">
            <div class="msg msg-ai">Olá Henrique! Sou sua IA. Pode falar seus gastos ou ganhos que eu organizo tudo. 😊</div>
        </div>
        <div style="padding:25px; display:flex; gap:12px; background:var(--card);">
            <input type="text" id="ai-input" placeholder="Ex: Ganhei 3000 de auxilio" style="flex:1; padding:18px; border-radius:15px; border:1px solid var(--border); background:#000; color:#fff; outline:none;">
            <button onclick="processarIA()" style="background:var(--accent); border:none; padding:0 25px; border-radius:15px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1.3rem; letter-spacing: -1px;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" class="user-badge" onclick="login()">LOGIN</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div id="v-home">
        <div class="hero">
            <span>Saldo em Conta</span>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>

        <div class="mini-stats">
            <div class="stat-card">
                <small>Entradas</small>
                <b id="st-rec" style="color:var(--green)">R$ 0,00</b>
            </div>
            <div class="stat-card">
                <small>Saídas</small>
                <b id="st-gas" style="color:var(--red)">R$ 0,00</b>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-container"><canvas id="myChart"></canvas></div>
            <p style="margin-top:18px; font-size:0.7rem; font-weight:800; color:var(--subtext); letter-spacing:1px;">CONSUMO DO ORÇAMENTO</p>
        </div>
    </div>

    <div id="v-lista" style="display:none; padding-top:10px;">
        <div id="cont-lista"></div>
    </div>

    <button class="ai-fab" onclick="toggleIA()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="tab('home', this)"><i>📊</i>Home</button>
        <button class="n-btn" onclick="toggleIA()"><i>➕</i>Lançar</button>
        <button class="n-btn" onclick="tab('lista', this)"><i>📜</i>Extrato</button>
    </nav>

    <script>
        const cfg = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null;

        function init() {
            const mCont = document.getElementById('month-list');
            MESES.forEach(m => {
                const d = document.createElement('div');
                d.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                d.innerText = m;
                d.onclick = () => {
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    d.classList.add('active');
                    mesAtivo = m;
                    sync();
                };
                mCont.appendChild(d);
            });
            auth.onAuthStateChanged(u => { if(u){ document.getElementById('user-display').innerText = u.displayName.split(' ')[0]; sync(); } });
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let rec = 0, gas = 0, html = "";
                const data = doc.exists ? doc.data().transacoes || [] : [];
                
                // Cálculo Matemático Rigoroso
                data.forEach((t, i) => {
                    const val = parseFloat(t.valor) || 0;
                    const type = (t.tipo || '').toLowerCase();
                    const isEntrada = type.includes('entrada') || type.includes('receita');

                    if(isEntrada) rec += val; else gas += val;

                    html += `<div class="t-row">
                        <div class="t-info">
                            <div class="t-emoji">${isEntrada ? '💵' : (type.includes('fixo') ? '🏠' : '🍿')}</div>
                            <div class="t-details"><b>${t.descricao}</b><span>${t.tipo}</span></div>
                        </div>
                        <div style="display:flex; align-items:center; gap:12px;">
                            <b style="color:${isEntrada ? 'var(--green)' : '#fff'}">R$ ${val.toFixed(2)}</b>
                            <button class="btn-del" onclick="del(${i})">🗑️</button>
                        </div>
                    </div>`;
                });

                const saldo = rec - gas;
                document.getElementById('main-balance').innerText = saldo.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('main-balance').style.color = saldo < 0 ? 'var(--red)' : '#fff';
                document.getElementById('st-rec').innerText = `R$ ${rec.toFixed(2)}`;
                document.getElementById('st-gas').innerText = `R$ ${gas.toFixed(2)}`;
                document.getElementById('cont-lista').innerHTML = html || "<p style='text-align:center; opacity:0.2; margin-top:50px;'>Sem registros.</p>";
                
                render(rec, gas);
            });
        }

        function render(r, g) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            
            // Gráfico de Dedução Real
            // Se o gasto for maior que a receita, o saldo é 0 para o gráfico não quebrar
            const saldoGrafico = r > g ? r - g : 0;
            
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [g || 0.1, saldoGrafico || 0.1],
                        backgroundColor: ['#EF4444', '#EAB308'], // Vermelho (Gasto) / Amarelo (O que sobrou)
                        borderWidth: 0
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        async function processarIA() {
            const inp = document.getElementById('ai-input'), box = document.getElementById('chat-box');
            const txt = inp.value; if(!txt) return;
            box.innerHTML += `<div class="msg msg-user">${txt}</div>`;
            inp.value = "";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({
                        model:"llama-3.1-8b-instant",
                        messages:[
                            {role:"system", content:"Você é uma IA financeira. Se o usuário quer lançar, retorne APENAS JSON: {\"is_launch\":true, \"desc\":\"nome\", \"valor\":0.0, \"tipo\":\"entrada/fixo/lazer\"}. Se for conversa, JSON: {\"is_launch\":false, \"msg\":\"resposta\"}. IMPORTANTE: 'recebi', 'ganhei', 'pix' é sempre TIPO ENTRADA."},
                            {role:"user", content:txt}
                        ], response_format:{"type":"json_object"}
                    })
                });
                const r = JSON.parse((await res.json()).choices[0].message.content);
                if(r.is_launch) {
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                    const snap = await ref.get();
                    let list = snap.exists ? snap.data().transacoes || [] : [];
                    list.push({ descricao: r.desc, valor: r.valor, tipo: r.tipo, data: new Date().toISOString() });
                    await ref.set({ transacoes: list });
                    box.innerHTML += `<div class="msg msg-ai">✅ Entendido! Salvei ${r.desc} de R$ ${r.valor} como ${r.tipo}.</div>`;
                } else {
                    box.innerHTML += `<div class="msg msg-ai">${r.msg}</div>`;
                }
            } catch(e) { box.innerHTML += `<div class="msg msg-ai">Erro ao processar.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        async function del(idx) {
            if(!confirm("Apagar?")) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let list = snap.data().transacoes;
            list.splice(idx, 1);
            await ref.set({ transacoes: list });
        }

        function tab(t, b) {
            document.getElementById('v-home').style.display = t==='home'?'block':'none';
            document.getElementById('v-lista').style.display = t==='lista'?'block':'none';
            document.querySelectorAll('.n-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function toggleIA() { const m = document.getElementById('ai-modal'); m.style.display = m.style.display==='flex'?'none':'flex'; }

        init();
    </script>
</body>
</html>
