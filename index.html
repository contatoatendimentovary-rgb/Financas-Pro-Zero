<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO // Final</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #0A0A0A; --text: #FFFFFF;
            --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047;
            --green: #22C55E; --red: #EF4444;
        }
        body.light-mode {
            --bg: #F9FAFB; --card: #FFFFFF; --text: #111827;
            --text-sub: #6B7280; --border: #E5E7EB; --accent: #EAB308;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; transition: 0.3s; }

        .glass-header { padding: 40px 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .action-bar { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        
        .viz-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 25px; border: 1px solid var(--border); }
        .entry-card { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        
        .btn-delete { color: var(--red); background: none; border: none; padding: 5px; font-size: 1.1rem; }
        .btn-export { width: 100%; padding: 12px; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-weight: 800; margin-bottom: 15px; }

        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-weight: 700; font-size: 0.75rem; }
        .nav-btn.active { color: var(--accent); }

        .floating-btn { position: fixed; bottom: 110px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 30px; font-weight: 800; z-index: 999; color: #000; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: var(--bg); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
        
        .tab-content { display: none; } .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="glass-header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:800; font-size:1.1rem;">Finanças<span style="color:var(--accent)">PRO</span></div>
            <div class="action-bar">
                <button onclick="toggleTheme()" class="icon-btn" id="theme-icon">🌙</button>
                <button id="btnAuth" style="background:var(--accent); color:#000; border:none; padding:8px 15px; border-radius:12px; font-weight:800; font-size:0.7rem;" onclick="loginGoogle()">ENTRAR</button>
                <button onclick="logout()" class="icon-btn" style="font-size: 0.9rem;">🚪</button>
            </div>
        </div>
        <h1 id="saldo" style="font-size:2.6rem; font-weight:800;">R$ 0,00</h1>
    </header>

    <section id="aba-dashboard" class="tab-content active">
        <div class="viz-card"><canvas id="graficoPizza" style="max-height: 250px;"></canvas></div>
    </section>

    <section id="aba-aportes" class="tab-content">
        <div class="viz-card"><canvas id="graficoBarras" style="max-height: 250px;"></canvas></div>
        <div id="lista-invest" style="padding: 0 20px;"></div>
    </section>

    <section id="aba-extrato" class="tab-content">
        <div style="padding: 10px 20px;">
            <button onclick="exportarExcel()" class="btn-export">📊 EXPORTAR MÊS (EXCEL)</button>
            <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                <option value="março">Março</option><option value="abril">Abril</option>
                <option value="maio">Maio</option><option value="junho">Junho</option>
                <option value="julho">Julho</option><option value="agosto">Agosto</option>
                <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
            </select>
        </div>
        <div id="lista" style="padding: 0 20px;"></div>
    </section>

    <nav class="bottom-tab-bar">
        <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active">📊 Resumo</button>
        <button onclick="switchTab('aba-aportes', this)" class="nav-btn">📈 Aportes</button>
        <button onclick="switchTab('aba-extrato', this)" class="nav-btn">📜 Extrato</button>
    </nav>

    <button onclick="abrirModal()" class="floating-btn">+</button>

    <div id="modal" class="modal-overlay">
        <div class="modal-sheet">
            <h3>Novo Lançamento</h3><br>
            <div class="input-grid">
                <input type="text" id="desc" placeholder="Descrição">
                <input type="number" id="valor" placeholder="R$ 0,00">
                <input type="date" id="data-reg">
                <select id="tipo">
                    <option value="entrada">Receita (+)</option>
                    <option value="fixo">Essencial (-)</option>
                    <option value="lazer">Lazer (-)</option>
                    <option value="investimento">Investimento (-)</option>
                </select>
            </div>
            <button onclick="salvarRegistro()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:15px; font-weight:800;">SALVAR</button>
            <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:var(--text-sub); padding:15px;">CANCELAR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.f_doc = doc; window.f_setDoc = setDoc; window.f_getDoc = getDoc;

        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        document.getElementById('filtroMes').value = meses[new Date().getMonth()];

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase();
                window.carregarDados();
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        window.logout = () => signOut(window.auth).then(() => location.reload());
    </script>
    
    <script>
        let chartP; let chartB;

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            document.getElementById('theme-icon').innerText = isLight ? '☀️' : '🌙';
            window.carregarDados();
        }

        async function carregarDados() {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const snap = await window.f_getDoc(window.f_doc(window.db, "usuarios", user.uid, "meses", mes));
            
            let saldo = 0, fixo = 0, lazer = 0, invest = 0, html = "", invHtml = "";
            let trans = snap.exists() ? snap.data().transacoes : [];
            window.dadosAtuais = trans; // Para exportação

            trans.forEach((t, i_idx) => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') saldo += v;
                else {
                    saldo -= v;
                    if(t.tipo === 'fixo') fixo += v;
                    else if(t.tipo === 'lazer') lazer += v;
                    else { invest += v; invHtml += `<div class="entry-card"><span>${t.descricao}</span><b>R$ ${v.toFixed(2)}</b></div>`; }
                }
                html += `<div class="entry-card">
                    <div><b>${t.descricao}</b><br><small>${t.data}</small></div>
                    <div style="display:flex; align-items:center; gap:10px">
                        <b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                        <button class="btn-delete" onclick="excluirRegistro(${i_idx})">🗑️</button>
                    </div>
                </div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.3;">Vazio</p>';
            document.getElementById('lista-invest').innerHTML = invHtml;
            renderCharts(fixo, lazer, invest);
        }

        async function excluirRegistro(idx) {
            if(!confirm("Deseja excluir este item?")) return;
            const user = window.auth.currentUser;
            const mes = document.getElementById('filtroMes').value;
            let novaLista = [...window.dadosAtuais];
            novaLista.splice(idx, 1);
            await window.f_setDoc(window.f_doc(window.db, "usuarios", user.uid, "meses", mes), { transacoes: novaLista });
            window.carregarDados();
        }

        function exportarExcel() {
            if(!window.dadosAtuais || window.dadosAtuais.length === 0) return alert("Sem dados para exportar");
            let csv = "Descricao,Valor,Data,Tipo\n";
            window.dadosAtuais.forEach(t => { csv += `${t.descricao},${t.valor},${t.data},${t.tipo}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Financas_${document.getElementById('filtroMes').value}.csv`;
            a.click();
        }

        function renderCharts(f, l, i) {
            const txt = document.body.classList.contains('light-mode') ? '#000' : '#fff';
            const ctxP = document.getElementById('graficoPizza').getContext('2d');
            if(chartP) chartP.destroy();
            chartP = new Chart(ctxP, {
                type: 'doughnut',
                data: { labels: ['Fixo', 'Lazer', 'Invest'], datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }] },
                options: { plugins: { legend: { labels: { color: txt } } } }
            });

            const ctxB = document.getElementById('graficoBarras').getContext('2d');
            if(chartB) chartB.destroy();
            chartB = new Chart(ctxB, {
                type: 'bar',
                data: { labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'], datasets: [{ label: 'Aportes', data: new Array(12).fill(0), backgroundColor: '#FDE047' }] },
                options: { scales: { y: { ticks: { color: txt } }, x: { ticks: { color: txt } } }, plugins: { legend: { display: false } } }
            });
            chartB.data.datasets[0].data[document.getElementById('filtroMes').selectedIndex] = i;
            chartB.update();
        }

        async function salvarRegistro() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data-reg').value, t = document.getElementById('tipo').value;
            if(!dt || !v) return;
            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const mesAlvo = meses[new Date(dt).getUTCMonth()];
            const snap = await window.f_getDoc(window.f_doc(window.db, "usuarios", user.uid, "meses", mesAlvo));
            let lista = snap.exists() ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            await window.f_setDoc(window.f_doc(window.db, "usuarios", user.uid, "meses", mesAlvo), { transacoes: lista });
            fecharModal(); window.carregarDados();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            window.dispatchEvent(new Event('resize'));
        }
        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
