<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinançasPRO - 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A84FF">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <h1>FinançasPRO</h1>
        <button id="btnAuth" class="btn-auth">Login Google</button>
    </header>

    <main>
        <section class="resumo">
            <div class="card">
                <h3>Saldo Atual</h3>
                <p id="saldo">R$ 0,00</p>
            </div>
            <div class="chart-container">
                <canvas id="meuGrafico"></canvas>
            </div>
        </section>

        <section class="controles">
            <select id="filtroMes">
                <option value="janeiro">Janeiro</option>
                <option value="fevereiro">Fevereiro</option>
                <option value="março">Março</option>
                <option value="abril">Abril</option>
                <option value="maio">Maio</option>
                <option value="junho">Junho</option>
                <option value="julho">Julho</option>
                <option value="agosto">Agosto</option>
                <option value="setembro">Setembro</option>
                <option value="outubro">Outubro</option>
                <option value="novembro">Novembro</option>
                <option value="dezembro">Dezembro</option>
            </select>
            <button id="abrirModal" class="btn-add">+</button>
        </section>

        <section class="lista-transacoes">
            <ul id="lista">
                </ul>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Novo Registro</h2>
            <input type="text" id="desc" placeholder="Ex: Salário, Aluguel...">
            <input type="number" id="valor" placeholder="R$ 0,00">
            <select id="tipo">
                <option value="entrada">Entrada (+)</option>
                <option value="saida">Saída (-)</option>
            </select>
            <div class="modal-actions">
                <button id="btnSalvar">Confirmar</button>
                <button id="btnFechar">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        
        // Exportando para o script.js conseguir usar
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        
        const provider = new GoogleAuthProvider();

        window.loginGoogle = () => {
            signInWithPopup(window.auth, provider)
                .then(() => location.reload())
                .catch((error) => console.error("Erro no login:", error));
        };

        onAuthStateChanged(window.auth, (user) => {
            const btn = document.getElementById('btnAuth');
            if (user) {
                btn.innerText = "Sair";
                btn.onclick = () => window.auth.signOut().then(() => location.reload());
                // Carrega os dados do Firebase se a função existir no script.js
                if (typeof window.carregarDadosDoFirebase === "function") {
                    window.carregarDadosDoFirebase();
                }
            } else {
                btn.innerText = "Login Google";
                btn.onclick = window.loginGoogle;
            }
        });
    </script>
</body>
</html>
