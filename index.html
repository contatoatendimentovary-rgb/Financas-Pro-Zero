<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Gestão Comercial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* Identidade Visual: Branco e Azul */
            --bg: #F4F7FE; --card: #FFFFFF; --accent: #0052FF; --text: #1B2559;
            --subtext: #A3AED0; --green: #05CD99; --red: #EE5D50; --border: #E9EDF7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; }

        /* Toast Turbo */
        .fin-toast { position: fixed; top: -100px; left: 20px; right: 20px; background: var(--accent); color: white; padding: 20px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0, 82, 255, 0.2); z-index: 5000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .fin-toast.show { top: 25px; }

        .header { padding: 50px 24px 30px; background: var(--card); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; color: var(--accent); font-size: 1.3rem; letter-spacing: -1px; }
        .user-pill { background: var(--bg); border: none; padding: 10px 20px; border-radius: 50px; font-size: 0.75rem; color: var(--text); font-weight: 800; cursor: pointer; }

        .month-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .m-btn { padding: 12px 24px; border-radius: 50px; border: none; background: var(--bg); color: var(--subtext); font-size: 0.85rem; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .m-btn.active { background: var(--accent); color: white; box-shadow: 0 8px 15px rgba(0, 82, 255, 0.2); }

        .hero { text-align: center; margin: 30px 0; }
        .hero h1 { font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; color: var(--text); }
        .hero small { color: var(--subtext); font-size: 0.75rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 24px; margin-top: -20px; }
        .stat-card { background: var(--card); padding: 22px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .stat-card span { font-size: 0.7rem; color: var(--subtext); font-weight: 800; display: block; margin-bottom: 6px; }

        .chart-box { background: var(--card); margin: 24px; padding: 35px; border-radius: 35px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }

        /* Lista / Extrato */
        .t-item { background: var(--card); padding: 20px; border-radius: 26px; margin: 0 24px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-date { font-size: 0.65rem; font-weight: 800; color: var(--accent); background: rgba(0, 82, 255, 0.05); padding: 4px 10px; border-radius: 8px; width: fit-content; }
        .t-item b { font-size: 1rem; color: var(--text); }
        .t-item small { color: var(--subtext); font-weight: 600; }
        
        .btn-del { color: var(--red); background: #FFF5F5; border: none; width: 40px; height: 40px; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { background: var(--red); color: white; }

        /* IA MODAL */
        .ai-fab { position: fixed; bottom: 120px; right: 24px; width: 68px; height: 68px; border-radius: 24px; background: var(--accent); color: white; border: none; font-size: 30px; box-shadow: 0 12px 25px rgba(0, 82, 255, 0.3); z-index: 1000; }
        .ai-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-head { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 18px 22px; border-radius: 24px; max-width: 85%; font-size: 0.95rem; line-height: 1.6; }
        .m-ai { background: var(--card); color: var(--text); border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .m-user { background: var(--accent); color: white; align-self: flex-end; box-shadow: 0 6px 15px rgba(0, 82, 255, 0.2); }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; padding-bottom: 30px; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab span { font-size: 1.6rem; margin-bottom: 4px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(27, 37, 89, 0.4); backdrop-filter: blur(8px); z-index: 3000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 40px 40px 0 0; padding: 40px; box-shadow: 0 -15px 40px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem; font-weight: 600; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-go { width: 100%; padding: 22px; border-radius: 22px; background: var(--accent); color: white; border: none; font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="ai-panel" class="ai-panel">
        <div class="ai-head"><b>✨ ASSISTENTE TURBO</b> <button onclick="closeAI()" style="border:none;background:none;font-size:2rem;color:var(--text)">&times;</button></div>
        <div class="chat-view" id="chat-box"><div class="msg m-ai">Henrique, acabei de ser atualizado! Pode mandar: "Lança 40 reais de gasolina" que eu já coloco no extrato. 🚀</div></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card); border-top: 1px solid var(--border);">
            <input type="text" id="ai-in" placeholder="Fale comigo...">
            <button onclick="askIA()" style="background:var(--accent); color:white; border:none; padding:0 25px; border-radius:18px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top"><b class="logo">FINAN PRO</b> <button id="user-btn" class="user-pill" onclick="login()">CONECTAR CONTA</button></div>
        <div class="month-scroll" id="m-list"></div>
        <div class="hero"><small id="m-label">CARREGANDO...</small><h1 id="v-bal">R$ 0,00</h1></div>
    </header>

    <div class="grid">
        <div class="stat-card"><span>TOTAL RECEBIDO</span><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-card"><span>TOTAL GASTO</span><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <main id="v-dash">
        <div style="padding:35px 24px 0; font-size: 0.75rem; font-weight: 900; color: var(--subtext); letter-spacing: 1px;">SAÚDE PATRIMONIAL</div>
        <div class="chart-box"><canvas id="pChart" style="max-height: 230px;"></canvas></div>
    </main>

    <main id="v-list" style="display:none;">
        <div style="padding:35px 24px 15px; font-size: 0.75rem; font-weight: 900; color: var(--subtext); letter-spacing: 1px;">MOVIMENTAÇÕES</div>
        <div id="list-cont"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="navbar">
        <button class="nav-tab active" onclick="tab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-tab" onclick="openAdd()"><span>➕</span>ADD</button>
        <button class="nav-tab" onclick="tab('list', this)"><span>📜</span>LISTA</button>
    </nav>

    <div id="m-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="text-align:center; margin-bottom:30px; font-weight:900;">Novo Registro</h3>
            <input type="text" id="in-desc" placeholder="Descrição (Ex: Almoço)">
            <input type="number" id="in-val" placeholder="Valor R$">
            <select id="in-tipo">
                <option value="fixo">🏠 Essencial (50%)</option>
                <option value="lazer">🍿 Lazer (30%)</option>
                <option value="investimento">💰 Reserva (20%)</option>
                <option value="entrada">💵 Receita (+)</option>
            </select>
            <input type="date" id="in-date">
            <button class="btn-go" onclick="save()">CONFIRMAR LANÇAMENTO</button>
        </div>
    </div>

    <script>
        const GROQAPY = "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";
        const fbConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null, dataC = { bal:0, in:0, f:0, l:0, i:0 };

        function init() {
            const list = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-btn ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); mesAtivo = m; sync();
                };
                list.appendChild(b);
            });
        }

        function toast(t) {
            const el = document.createElement('div'); el.className = 'fin-toast';
            el.innerHTML = `<span>⚡</span> ${t === 'entrada' ? 'Receita salva!' : 'Despesa registrada!'}`;
            document.body.appendChild(el);
            setTimeout(() => el.classList.add('show'), 100);
            setTimeout(() => { el.classList.remove('show'); setTimeout(()=>el.remove(),500); }, 3000);
        }

        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }
        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        function tab(v, b) {
            document.querySelectorAll('main').forEach(m => m.style.display='none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('v-'+v).style.display='block'; b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        // SINCRONIZAÇÃO TURBO REAL-TIME
        function sync() {
            if(!auth.currentUser) return;
            document.getElementById('m-label').innerText = `Fluxo de ${mesAtivo}`;
            
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let sin=0, sf=0, sl=0, si=0, html="";
                if(doc.exists) {
                    const trans = doc.data().transacoes || [];
                    // Ordenar por data (mais recente primeiro)
                    const sorted = [...trans].sort((a,b) => new Date(b.data) - new Date(a.data));
                    
                    sorted.forEach((t) => {
                        const v = parseFloat(t.valor);
                        const d = t.data ? t.data.split('-').reverse().slice(0,2).join('/') : '??';
                        if(t.tipo==='entrada') sin+=v; else { if(t.tipo==='fixo') sf+=v; else if(t.tipo==='lazer') sl+=v; else si+=v; }
                        html += `<div class="t-item"><div class="t-info"><span class="t-date">${d}</span><b>${t.descricao}</b><small>${t.tipo.toUpperCase()}</small></div>
                                 <div style="display:flex;align-items:center;gap:15px;"><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                                 <button class="btn-del" onclick="delTrans('${t.descricao}', ${v})">🗑️</button></div></div>`;
                    });
                }
                dataC = { bal: sin-(sf+sl+si), in: sin, f: sf, l: sl, i: si };
                document.getElementById('v-bal').innerText = dataC.bal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ "+sin.toFixed(2);
                document.getElementById('v-out').innerText = "R$ "+(sf+sl+si).toFixed(2);
                document.getElementById('list-cont').innerHTML = html || "<p style='text-align:center;opacity:0.3;padding:60px;font-weight:700;'>Nenhum registro encontrado.</p>";
                render(sf, sl, si, sin);
            });
        }

        async function save() {
            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: document.getElementById('in-date').value });
            await ref.set({ transacoes: lista });
            closeAdd(); toast(t);
        }

        async function delTrans(desc, valor) {
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.data().transacoes;
            const index = lista.findIndex(x => x.descricao === desc && parseFloat(x.valor) === valor);
            if(index > -1) {
                lista.splice(index, 1);
                await ref.set({ transacoes: lista });
            }
        }

        function render(f, l, i, s) {
            const ctx = document.getElementById('pChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Reserva', 'Livre'],
                    datasets: [{ data: [f||0.1, l||0.1, i||0.1, (s-(f+l+i))||0.1], backgroundColor: ['#EE5D50', '#FFB547', '#05CD99', '#0052FF'], borderWidth: 8, borderColor: '#fff', hoverOffset: 10 }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } }, animation: { duration: 800, easing: 'easeOutQuart' } }
            });
        }

        async function askIA() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const txt = inp.value; box.innerHTML += `<div class="msg m-user">${txt}</div>`;
            inp.value = ""; box.scrollTop = box.scrollHeight;
            try {
                const p = `Analise: "${txt}". Se for gasto/ganho, responda JSON: {"desc":"item","valor":0,"tipo":"fixo/lazer/investimento/entrada","msg":"Ok!"}. Se não, {"msg":"texto"}.`;
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':`Bearer ${GROQAPY}`,'Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:p}], response_format:{"type":"json_object"}})
                });
                const r = JSON.parse((await res.json()).choices[0].message.content);
                if(r.valor) {
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                    const snap = await ref.get();
                    let lista = snap.exists ? snap.data().transacoes : [];
                    lista.push({ descricao: r.desc, valor: r.valor, tipo: r.tipo, data: new Date().toISOString().split('T')[0] });
                    await ref.set({ transacoes: lista });
                    toast(r.tipo);
                    box.innerHTML += `<div class="msg m-ai">✅ <b>Entendido!</b> Lançamento de R$ ${r.valor} em "${r.desc}" realizado com sucesso.</div>`;
                } else { box.innerHTML += `<div class="msg m-ai">${r.msg}</div>`; }
            } catch(e) { box.innerHTML += `<div class="msg m-ai">Houve um erro no Turbo. Tente novamente!</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        init();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-btn').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
