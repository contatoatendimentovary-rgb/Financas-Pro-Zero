<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <title>FinançasPRO | Off-White Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            /* Palette Off-White Premium */
            --bg: #FDFDFD; 
            --card: #FFFFFF; 
            --accent: #EAB308; 
            --text: #18181B;
            --subtext: #71717A; 
            --green: #10B981; 
            --red: #EF4444; 
            --border: #F1F1F4;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* Header & Month Bar */
        .header { padding: 50px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: #18181B; color: #fff; padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }

        .month-bar { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
        .month-bar::-webkit-scrollbar { display: none; }
        .m-item { padding: 10px 20px; border-radius: 14px; background: #F4F4F5; color: var(--subtext); font-weight: 700; font-size: 0.85rem; border: none; white-space: nowrap; transition: 0.2s; }
        .m-item.active { background: var(--accent); color: #000; box-shadow: 0 4px 10px rgba(234, 179, 8, 0.2); }

        /* Balance Section */
        .hero { text-align: center; padding: 40px 20px; }
        .hero span { font-size: 0.75rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; }
        .hero h1 { font-size: 3.2rem; font-weight: 900; margin-top: 5px; color: #18181B; }

        /* Summary Cards */
        .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .s-box { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .s-box small { font-size: 0.65rem; font-weight: 800; color: var(--subtext); display: block; margin-bottom: 5px; }
        .s-box b { font-size: 1.25rem; }

        /* Transaction List */
        .t-item { background: var(--card); padding: 20px; border-radius: 22px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .t-info b { display: block; font-size: 1rem; color: #18181B; margin-bottom: 2px; }
        .t-info span { font-size: 0.7rem; font-weight: 700; color: var(--subtext); text-transform: uppercase; }

        /* Navigation Bottom */
        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 15px; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; }
        .n-btn.active { color: var(--accent); }
        .n-btn i { font-size: 1.6rem; margin-bottom: 4px; }

        /* IA Trigger */
        .ai-btn { position: fixed; bottom: 105px; right: 20px; width: 64px; height: 64px; border-radius: 22px; background: #18181B; color: var(--accent); border: none; font-size: 26px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 99; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: flex-end; }
        .sheet { background: var(--bg); width: 100%; border-radius: 32px 32px 0 0; padding: 35px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; border: 1px solid var(--border); background: #F9F9FB; font-weight: 700; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="ai-view" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:2000; flex-direction:column;">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b style="letter-spacing: -0.5px;">✨ IA INTELIGENTE</b>
            <button onclick="toggleIA()" style="border:none; background:none; font-size:2rem;">&times;</button>
        </div>
        <div id="chat" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
        <div style="padding:25px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-input" placeholder="Ex: Gastei 50 no mercado hoje" style="margin-bottom:0;">
            <button onclick="processIA()" style="background:#18181B; color:var(--accent); border:none; padding:0 25px; border-radius:16px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1.2rem; letter-spacing: -1px;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" onclick="login()" class="user-badge">ENTRAR</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div class="hero">
        <span>Saldo Global</span>
        <h1 id="total">R$ 0,00</h1>
    </div>

    <div class="summary">
        <div class="s-box"><small>RECEBIDOS</small><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="s-box"><small>GASTOS</small><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <div id="tab-home" style="padding:30px 20px;">
        <div style="background:var(--card); padding:25px; border-radius:30px; border:1px solid var(--border); box-shadow: var(--shadow);">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div id="tab-list" style="display:none; padding-top:20px;">
        <div id="trans-list"></div>
    </div>

    <button class="ai-btn" onclick="toggleIA()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="switchTab('home', this)"><i>📊</i>Início</button>
        <button class="n-btn" onclick="openModal()"><i>➕</i>Novo</button>
        <button class="n-btn" onclick="switchTab('list', this)"><i>📜</i>Extrato</button>
    </nav>

    <div id="modal-add" class="overlay" onclick="if(event.target==this) closeModal()">
        <div class="sheet">
            <h2 style="margin-bottom:20px; letter-spacing:-1px;">Novo Registro</h2>
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" placeholder="0,00">
            <select id="tipo">
                <option value="entrada">💵 Entrada / Receita</option>
                <option value="fixo">🏠 Gasto Fixo</option>
                <option value="lazer" selected>🍿 Gasto Variável</option>
            </select>
            <input type="date" id="data">
            <button onclick="manualSave()" style="width:100%; padding:20px; border-radius:18px; background:var(--accent); color:#000; border:none; font-weight:900; font-size:1.1rem;">SALVAR REGISTRO</button>
        </div>
    </div>

    <script>
        const CFG = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(CFG);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesRef = MESES[new Date().getMonth()];
        let chart = null;

        function start() {
            const container = document.getElementById('month-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-item ${m === mesRef ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); mesRef = m; sync();
                };
                container.appendChild(b);
                if(m === mesRef) b.scrollIntoView({ inline: 'center' });
            });
            sync();
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesRef.toLowerCase())
            .onSnapshot(doc => {
                let rec=0, gas=0, fix=0, laz=0, html="";
                if(doc.exists) {
                    const data = doc.data().transacoes || [];
                    data.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(t => {
                        const v = parseFloat(t.valor);
                        if(t.tipo === 'entrada') rec += v;
                        else { gas += v; if(t.tipo === 'fixo') fix += v; else laz += v; }
                        html += `<div class="t-item"><div class="t-info"><b>${t.descricao || 'Sem nome'}</b><span>${t.tipo}</span></div>
                                 <b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b></div>`;
                    });
                }
                document.getElementById('total').innerText = (rec - gas).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ " + rec.toFixed(2);
                document.getElementById('v-out').innerText = "R$ " + gas.toFixed(2);
                document.getElementById('trans-list').innerHTML = html || "<p style='text-align:center; opacity:0.2; margin-top:40px;'>Nenhum dado.</p>";
                draw(fix, laz, rec - gas);
            });
        }

        function draw(f, l, s) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Variável', 'Sobra'],
                    datasets: [{
                        data: [f||1, l||1, s > 0 ? s : 0.1],
                        backgroundColor: ['#EF4444', '#EAB308', '#3B82F6'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '82%', plugins: { legend: { display: false } } }
            });
        }

        async function processIA() {
            const input = document.getElementById('ai-input'), chat = document.getElementById('chat');
            if(!input.value) return;
            const text = input.value;
            chat.innerHTML += `<div style="background:var(--accent); color:#000; padding:15px; border-radius:20px; align-self:flex-end; font-weight:700;">${text}</div>`;
            input.value = "";

            try {
                const prompt = `Extraia dados de: "${text}". 
                IMPORTANTE: Se for gasto, tipo deve ser 'lazer' ou 'fixo'. 
                Retorne APENAS JSON: {"desc":"Nome","valor":0.00,"tipo":"entrada/fixo/lazer"}`;

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer 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', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role:"user", content:prompt}], response_format: {"type":"json_object"}})
                });

                let r = JSON.parse((await res.json()).choices[0].message.content);
                
                // Correção de Undefined e Tipo
                if(!r.desc || r.desc === "undefined") r.desc = text.charAt(0).toUpperCase() + text.slice(1);
                const despesa = ["gastei","paguei","comi","comprei","lanche","mercado"].some(k => text.toLowerCase().includes(k));
                if(despesa) r.tipo = "lazer";

                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesRef.toLowerCase());
                const snap = await ref.get();
                let list = snap.exists ? snap.data().transacoes : [];
                list.push({ ...r, data: new Date().toISOString().split('T')[0] });
                await ref.set({ transacoes: list });
                chat.innerHTML += `<div style="background:var(--card); border:1px solid var(--border); padding:15px; border-radius:20px;">✅ Lançado: ${r.desc}</div>`;
            } catch(e) { chat.innerHTML += `<div>Erro na IA.</div>`; }
            chat.scrollTop = chat.scrollHeight;
        }

        function switchTab(t, b) {
            document.getElementById('tab-home').style.display = t === 'home' ? 'block' : 'none';
            document.getElementById('tab-list').style.display = t === 'list' ? 'block' : 'none';
            document.querySelectorAll('.n-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }

        function openModal() { document.getElementById('data').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-add').style.display='flex'; }
        function closeModal() { document.getElementById('modal-add').style.display='none'; }
        function toggleIA() { const v = document.getElementById('ai-view'); v.style.display = v.style.display === 'none' ? 'flex' : 'none'; }

        start();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-display').innerText = u.displayName.split(' ')[0]; sync(); } });
    </script>
</body>
</html>
