<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Inteligente</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #F3F4F6; --card: #FAFAFA; --accent: #2563EB; --text: #1E293B;
            --subtext: #64748B; --green: #10B981; --red: #EF4444; --border: #E2E8F0;
            --shadow: rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg: #0B0F1A; --card: #161B2C; --accent: #3B82F6; --text: #F8FAFC;
            --subtext: #94A3B8; --border: rgba(255, 255, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; transition: background 0.3s; overflow-x: hidden; }

        /* HEADER E NAVEGAÇÃO */
        .header { padding: 45px 24px 25px; background: var(--card); border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; box-shadow: 0 10px 30px var(--shadow); position: relative; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; color: var(--accent); font-size: 1.2rem; letter-spacing: -1px; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .theme-btn { background: var(--bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .user-pill { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }

        .month-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
        .month-scroll::-webkit-scrollbar { display: none; }
        .m-btn { padding: 10px 22px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .m-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }

        .hero { text-align: center; margin: 25px 0; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; margin: 5px 0; }
        .hero small { color: var(--subtext); font-size: 0.7rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* CARDS DE STATUS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; margin-top: -10px; position: relative; z-index: 10; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 12px var(--shadow); }
        .stat-card span { font-size: 0.65rem; color: var(--subtext); font-weight: 800; display: block; margin-bottom: 4px; }
        .stat-card b { font-size: 1.1rem; }

        /* EXTRATO ESTILIZADO */
        .t-item { background: var(--card); padding: 18px; border-radius: 22px; margin: 0 24px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px var(--shadow); animation: slide 0.3s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-date { font-size: 0.6rem; font-weight: 800; color: var(--accent); background: rgba(37, 99, 235, 0.1); padding: 3px 8px; border-radius: 6px; width: fit-content; }
        .t-item b { font-size: 0.95rem; color: var(--text); }
        .t-item small { color: var(--subtext); font-weight: 600; text-transform: lowercase; }
        
        .btn-del { color: var(--red); background: rgba(239, 68, 68, 0.08); border: none; width: 40px; height: 40px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

        /* IA E MODAIS */
        .ai-fab { position: fixed; bottom: 110px; right: 24px; width: 62px; height: 62px; border-radius: 22px; background: linear-gradient(135deg, var(--accent), #1E40AF); color: white; border: none; font-size: 26px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 500; cursor: pointer; }
        .ai-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-head { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .m-ai { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        .m-user { background: var(--accent); color: white; align-self: flex-end; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 25px; z-index: 1000; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab span { font-size: 1.6rem; margin-bottom: 4px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 3000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 600; font-size: 1rem; outline: none; }
        .btn-go { width: 100%; padding: 20px; border-radius: 18px; background: var(--accent); color: white; border: none; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="ai-panel" class="ai-panel">
        <div class="ai-head"><b style="font-size: 1.2rem;">✨ IA FIN PRO</b> <button onclick="closeAI()" style="border:none;background:none;font-size:2rem;color:var(--text);">&times;</button></div>
        <div class="chat-view" id="chat-box"><div class="msg m-ai">Fala Henrique! Pode mandar: "Recebi 2000 do Job" ou "50 reais de pizza". Eu organizo tudo com emojis pra você! 🚀</div></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card); border-top: 1px solid var(--border);">
            <input type="text" id="ai-in" placeholder="Diga o que aconteceu...">
            <button onclick="askIA()" style="background:var(--accent); color:white; border:none; padding:0 25px; border-radius:15px; font-weight:900;">ENVIAR</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b class="logo">FINAN PRO</b> 
            <div class="header-actions">
                <button class="theme-btn" onclick="toggleTheme()" id="t-icon">☀️</button>
                <button id="user-btn" class="user-pill" onclick="login()">CONECTAR</button>
            </div>
        </div>
        <div class="month-scroll" id="m-list"></div>
        <div class="hero"><small id="m-label">CARREGANDO...</small><h1 id="v-bal">R$ 0,00</h1></div>
    </header>

    <div class="grid">
        <div class="stat-card"><span>RECEBIDO</span><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-card"><span>GASTO TOTAL</span><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <main id="v-dash">
        <div style="padding:30px 24px 0; font-size: 0.7rem; font-weight: 900; color: var(--subtext); letter-spacing: 1px;">DISTRIBUIÇÃO PATRIMONIAL</div>
        <div style="margin: 20px 24px; padding: 25px; background: var(--card); border-radius: 30px; border: 1px solid var(--border);">
            <canvas id="pChart"></canvas>
        </div>
    </main>

    <main id="v-list" style="display:none;">
        <div style="padding:30px 24px 10px; font-size: 0.7rem; font-weight: 900; color: var(--subtext); letter-spacing: 1px;">HISTÓRICO DETALHADO</div>
        <div id="list-cont"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="navbar">
        <button class="nav-tab active" onclick="tab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-tab" onclick="openAdd()"><span>➕</span>NOVO</button>
        <button class="nav-tab" onclick="tab('list', this)"><span>📜</span>LISTA</button>
    </nav>

    <div id="m-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="margin-bottom:20px; text-align:center;">Lançamento Manual</h3>
            <input type="text" id="in-desc" placeholder="Descrição">
            <input type="number" id="in-val" placeholder="Valor R$">
            <select id="in-tipo">
                <option value="fixo">🏠 Contas Fixas</option>
                <option value="lazer">🍿 Lazer/Variável</option>
                <option value="investimento">💰 Reserva/Investimento</option>
                <option value="entrada">💵 Receita/Entrada</option>
            </select>
            <input type="date" id="in-date">
            <button class="btn-go" onclick="save()">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const GROQAPY = "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";
        const fbConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null;

        function toggleTheme() {
            const doc = document.documentElement;
            const target = doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            doc.setAttribute('data-theme', target);
            document.getElementById('t-icon').innerText = target === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('finTheme', target);
            sync();
        }

        function init() {
            const saved = localStorage.getItem('finTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('t-icon').innerText = saved === 'dark' ? '☀️' : '🌙';

            const list = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-btn ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); mesAtivo = m; sync();
                };
                list.appendChild(b);
            });
        }

        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }
        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        
        function tab(v, b) {
            document.querySelectorAll('main').forEach(m => m.style.display='none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('v-'+v).style.display='block';
            b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            document.getElementById('m-label').innerText = `GESTÃO - ${mesAtivo.toUpperCase()}`;
            
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())

                    });
                }
                const bal = sin-(sf+sl+si);
                document.getElementById('v-bal').innerText = bal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ "+sin.toFixed(2);
                document.getElementById('v-out').innerText = "R$ "+(sf+sl+si).toFixed(2);
                document.getElementById('list-cont').innerHTML = html || "<p style='text-align:center; padding:40px; opacity:0.5;'>Nenhum lançamento.</p>";
                render(sf, sl, si, sin);
            });
        }

            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value, dt = document.getElementById('in-date').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            await ref
