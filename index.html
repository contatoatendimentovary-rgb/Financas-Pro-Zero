<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>FinançasPRO // Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --header-bg: #000000; --card: #0A0A0A;
            --text-main: #FFFFFF; --text-sub: #A1A1AA; --border: #1F2937;
            --accent: #FDE047; --green: #22C55E; --orange: #F97316; --red: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; }
        
        /* TELA DE BLOQUEIO */
        .app-lock-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* CABEÇALHO E BALANCE */
        .glass-header { background: var(--header-bg); padding: 40px 20px 30px; border-radius: 0 0 35px 35px; border-bottom: 1px solid var(--border); text-align: center; }
        .main-balance small { text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-size: 0.7rem; font-weight: 700; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; margin: 5px 0 15px; }

        /* ALERTAS */
        .alert-box { background: rgba(249, 115, 22, 0.15); color: var(--orange); border: 1px solid var(--orange); padding: 15px; border-radius: 18px; margin: 15px 20px; font-size: 0.85rem; font-weight: 700; display: none; border-left: 5px solid var(--orange); }

        /* CARDS E GRÁFICO */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-top: -25px; }
        .stat-card { background: var(--card); padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .viz-card { background: var(--card); margin: 25px 20px; padding: 30px; border-radius: 32px; border: 1px solid var(--border); height: 320px; display: flex; align-items: center; justify-content: center; position: relative; }
        .chart-container { width: 100%; height: 100%; position: relative; }

        /* LISTA DE LANÇAMENTOS */
        .timeline-list { padding: 0 20px; }
        .entry-card { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* BOTÕES */
        .user-pill { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-export { background: #1DB954; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; font-size: 0.65rem; cursor: pointer; margin-top: 10px; }
        .floating-btn { position: fixed; bottom: 110px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); border: none; font-size: 32px; font-weight: 800; z-index: 999; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }

        /* MENU INFERIOR */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; }
        .nav-btn.active { color: var(--accent); }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: #080808; width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; background: #000; color: #fff; border: 1px solid var(--border); font-size: 1rem; }

        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="app-lock" class="app-lock-overlay">
        <div style="font-weight:800; font-size:1.5rem; margin-bottom:10px;">Finanças<span>PRO</span></div>
        <p style="color:var(--text-sub); margin-bottom:30px;">Ambiente Seguro</p>
        <button onclick="autenticarBio()" class="user-pill">USAR BIOMETRIA</button>
    </div>

    <div class="app-wrapper">
        <header class="glass-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <div style="font-weight:800; font-size:1.1rem;">Finanças<span>PRO</span></div>
                <button id="btnAuth" class="user-pill" style="padding:8px 15px; font-size:0.7rem;">Entrar</button>
            </div>
            <div class="main-balance">
                <small>Saldo Disponível</small>
                <h1 id="saldo">R$ 0,00</h1>
                <button onclick="exportarCSV()" class="btn-export">📊 EXPORTAR PLANILHA</button>
            </div>
        </header>

        <div id="alerta-economia" class="alert-box"></div>

        <section id="aba-dashboard" class="tab-content active">
            <div class="stats-row">
                <div class="stat-card" style="border-left: 4px solid var(--green);">
                    <div><small>Receitas</small><br><b id="resumo-receita" style="color:var(--green)">R$ 0</b></div>
                </div>
                <div class="stat-card" style="border-left: 4px solid var(--red);">
                    <div><small>Gastos</small><br><b id="resumo-despesa" style="color:var(--red)">R$ 0</b></div>
                </div>
            </div>
            <div class="viz-card">
                <div class="chart-container">
                    <canvas id="graficoPizza"></canvas>
                </div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
                </select>
            </div>
            <div id="lista" class="timeline-list"></div>
        </section>

        <nav class="bottom-nav">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active"><span>📊</span>Home</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn"><span>📜</span>Extrato</button>
        </nav>

        <button onclick="abrirModal()" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="margin-bottom:20px;">Novo Lançamento</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Invest (20%)</option>
                    </select>
                </div>
                <button onclick="salvar()" class="user-pill" style="width:100%; padding:20px; border-radius:18px;">CONFIRMAR</button>
                <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:var(--text-sub); padding:15px; font-weight:700;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;

        enableIndexedDbPersistence(window.db).catch(() => console.log("Offline Ativo"));

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                window.carregarDados();
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        document.getElementById('btnAuth').onclick = () => window.loginGoogle();
    </script>

    <script>
        let currentChart;

        // BIOMETRIA FORÇADA
        async function autenticarBio() {
            const lock = document.getElementById('app-lock');
            if (window.PublicKeyCredential) {
                try {
                    const options = {
                        publicKey: {
                            challenge: crypto.getRandomValues(new Uint8Array(32)),
                            rp: { name: "FinancasPRO" },
                            user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "user", displayName: "User" },
                            pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                            timeout: 60000
                        }
                    };
                    const cred = await navigator.credentials.create(options);
                    if (cred) {
                        lock.style.opacity = '0';
                        setTimeout(() => lock.style.display = 'none', 500);
                    }
                } catch (e) {
                    console.error(e);
                    alert("Autenticação necessária.");
                }
            } else {
                lock.style.display = 'none';
            }
        }

        // EXPORTAÇÃO CSV
        async function exportarCSV() {
            const user = window.auth.currentUser;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            if (!snap.exists()) return alert("Sem dados.");
            
            let csv = "\uFEFFData,Descricao,Valor,Tipo\n";
            snap.data().transacoes.forEach(t => {
                csv += `${t.data},${t.descricao},${t.valor},${t.tipo}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `financas_${mes}.csv`;
            link.click();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        window.carregarDados = async () => {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            
            let r = 0, f = 0, l = 0, i = 0, html = "";
            let trans = snap.exists() ? snap.data().transacoes : [];

            trans.forEach(t => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') r += v;
                else if(t.tipo === 'fixo') f += v;
                else if(t.tipo === 'lazer') l += v;
                else i += v;

                html += `<div class="entry-card">
                    <div><b>${t.descricao}</b><br><small>${t.data}</small></div>
                    <div style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}; font-weight:800">
                        ${t.tipo==='entrada'?'+':'-'} R$ ${v.toFixed(2)}
                    </div>
                </div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(r - (f+l+i)).toFixed(2)}`;
            document.getElementById('resumo-receita').innerText = `R$ ${r.toFixed(0)}`;
            document.getElementById('resumo-despesa').innerText = `R$ ${(f+l+i).toFixed(0)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; padding:20px; opacity:0.5;">Vazio</p>';
            
            // INSIGHTS
            const alerta = document.getElementById('alerta-economia');
            if (l >= (r * 0.3) * 0.8 && r > 0) {
                alerta.style.display = 'block';
                alerta.innerText = `⚠️ Atenção: Gastos com Lazer atingiram 80% do limite recomendado para sua receita.`;
            } else { alerta.style.display = 'none'; }

            renderPizza(f, l, i);
        };

        function renderPizza(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if (currentChart) currentChart.destroy();
            if (f+l+i === 0) return;

            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Essencial', 'Lazer', 'Invest'],
                    datasets: [{ 
                        data: [f, l, i], 
                        backgroundColor: ['#EF4444', '#F97316', '#FDE047'], 
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: { 
                    cutout: '82%', 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function salvar() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, t = document.getElementById('tipo').value, dt = document.getElementById('data-lancamento').value, m = document.getElementById('filtroMes').value;
            if (!d || !v || !dt) return alert("Preencha tudo!");
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
            const snap = await window.getDoc(ref);
            let trans = snap.exists() ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: parseFloat(v), tipo: t, data: dt });
            await window.setDoc(ref, { transacoes: trans });
            fecharModal();
            window.carregarDados();
        }
    </script>
</body>
</html>
