<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Inteligência Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --accent: #ffcc00; --text: #ffffff;
            --subtext: #a1a1aa; --green: #22c55e; --red: #ef4444; --border: #27272a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* Header Premium */
        .header { padding: 40px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: var(--accent); color: #000; padding: 6px 15px; border-radius: 10px; font-weight: 900; font-size: 0.75rem; }

        .month-bar { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; scrollbar-width: none; }
        .m-item { padding: 8px 20px; border-radius: 12px; background: #222; color: var(--subtext); cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; border: 1px solid transparent; }
        .m-item.active { background: var(--accent); color: #000; transform: scale(1.05); }

        /* Saldo Central */
        .balance-card { text-align: center; padding: 40px 20px; }
        .balance-card span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--subtext); font-weight: 800; }
        .balance-card h1 { font-size: 2.8rem; font-weight: 800; margin-top: 5px; }

        /* Cards de Resumo */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 25px; }
        .s-card { background: var(--card); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .s-card label { font-size: 0.65rem; font-weight: 800; color: var(--subtext); display: block; margin-bottom: 5px; }
        .s-card b { font-size: 1.1rem; }

        /* Gráfico */
        .chart-section { background: var(--card); margin: 0 20px 20px; padding: 25px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto; }

        /* Lista de Lançamentos */
        .t-item { background: var(--card); margin: 0 20px 10px; padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .t-main { display: flex; align-items: center; gap: 12px; }
        .t-icon { width: 40px; height: 40px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .t-desc b { display: block; font-size: 0.9rem; }
        .t-desc span { font-size: 0.65rem; color: var(--subtext); text-transform: uppercase; font-weight: 700; }
        .t-val { text-align: right; font-weight: 700; }

        /* Botão IA flutuante */
        .ai-btn { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(255, 204, 0, 0.3); border: none; z-index: 99; }

        /* Menu Inferior */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.4rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-top">
            <b style="letter-spacing: -1px; font-size: 1.2rem;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" class="user-badge" onclick="login()">LOGIN</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <main id="view-home">
        <section class="balance-card">
            <span>SALDO ATUAL</span>
            <h1 id="main-balance">R$ 0,00</h1>
        </section>

        <section class="summary-grid">
            <div class="s-card">
                <label>RECEBIDO</label>
                <b id="total-in" style="color:var(--green)">R$ 0,00</b>
            </div>
            <div class="s-card">
                <label>GASTO</label>
                <b id="total-out" style="color:var(--red)">R$ 0,00</b>
            </div>
        </section>

        <section class="chart-section">
            <div class="chart-container"><canvas id="financeChart"></canvas></div>
            <p style="margin-top:15px; font-size:0.6rem; font-weight:800; color:var(--subtext)">RESUMO DE DISTRIBUIÇÃO</p>
        </section>
    </main>

    <main id="view-list" style="display:none; padding-top:20px;">
        <div id="transaction-list"></div>
    </main>

    <button class="ai-btn" onclick="toggleIA()">✨</button>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="changeTab('home', this)"><i>📊</i>Home</button>
        <button class="nav-item" onclick="openManualAdd()"><i>➕</i>Lançar</button>
        <button class="nav-item" onclick="changeTab('list', this)"><i>📜</i>Extrato</button>
        <button class="nav-item"><i>❤️</i>Saúde</button>
    </nav>

    <script>
        // Configuração Firebase (Sua configuração atual)
        const firebaseConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho"];
        let currentMonth = months[new Date().getMonth()];
        let chartInstance = null;

        function init() {
            const container = document.getElementById('month-list');
            months.forEach(m => {
                const div = document.createElement('div');
                div.className = `m-item ${m === currentMonth ? 'active' : ''}`;
                div.innerText = m;
                div.onclick = () => {
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    div.classList.add('active');
                    currentMonth = m;
                    syncData();
                };
                container.appendChild(div);
            });
            syncData();
        }

        async function login() { 
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function syncData() {
            if(!auth.currentUser) return;
            
            db.collection("usuarios").doc(auth.currentUser.uid)
              .collection("meses").doc(currentMonth.toLowerCase())
              .onSnapshot(doc => {
                  let incoming = 0, outgoing = 0;
                  let html = "";
                  const icons = { entrada: "💵", fixo: "🏠", lazer: "🍿", investimento: "💰" };

                  if(doc.exists) {
                      const data = doc.data().transacoes || [];
                      data.sort((a,b) => new Date(b.data) - new Date(a.data));

                      data.forEach(t => {
                          const val = parseFloat(t.valor);
                          if(t.tipo === 'entrada') {
                              incoming += val;
                          } else {
                              outgoing += val;
                          }

                          html += `
                            <div class="t-item">
                                <div class="t-main">
                                    <div class="t-icon">${icons[t.tipo] || "📝"}</div>
                                    <div class="t-desc"><b>${t.descricao}</b><span>${t.tipo}</span></div>
                                </div>
                                <div class="t-val" style="color:${t.tipo==='entrada'?'#22c55e':'#fff'}">
                                    ${t.tipo==='entrada' ? '+' : '-'} R$ ${val.toFixed(2)}
                                </div>
                            </div>`;
                      });
                  }

                  // ATUALIZAÇÃO DOS CÁLCULOS (Correção Principal)
                  const finalBalance = incoming - outgoing;
                  document.getElementById('main-balance').innerText = finalBalance.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                  document.getElementById('main-balance').style.color = finalBalance >= 0 ? "#fff" : "#ef4444";
                  
                  document.getElementById('total-in').innerText = `R$ ${incoming.toFixed(2)}`;
                  document.getElementById('total-out').innerText = `R$ ${outgoing.toFixed(2)}`;
                  document.getElementById('transaction-list').innerHTML = html || "<p style='text-align:center; opacity:0.2; padding:40px;'>Sem dados</p>";
                  
                  updateChart(incoming, outgoing);
              });
        }

        function updateChart(inc, out) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [out || 0.1, inc || 0.1],
                        backgroundColor: ['#ef4444', '#ffcc00'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    cutout: '85%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        function changeTab(tab, btn) {
            document.getElementById('view-home').style.display = tab === 'home' ? 'block' : 'none';
            document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('user-display').innerText = user.displayName.split(' ')[0].toUpperCase();
                init();
            }
        });
    </script>
</body>
</html>
