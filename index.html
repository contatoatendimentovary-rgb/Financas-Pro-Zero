<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO | Finan</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#EAB308">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #0A0A0A; --text: #FFFFFF; --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047; --green: #22C55E; --red: #EF4444; }
        body.light-mode { --bg: #F9FAFB; --card: #FFFFFF; --text: #111827; --text-sub: #6B7280; --border: #E5E7EB; --accent: #EAB308; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; transition: 0.3s; overflow-x: hidden; }
        
        /* Loader Corrigido - Some em 2s para não travar a tela */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; font-weight: 800; color: var(--accent); transition: opacity 0.5s; }
        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .glass-header { padding: 40px 20px 30px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .viz-card { background: var(--card); margin: 15px; padding: 22px; border-radius: 28px; border: 1px solid var(--border); }
        
        .progress-box { margin-top: 20px; }
        .prog-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; margin-bottom: 6px; text-transform: uppercase; }
        .bar-bg { background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
        .bar-fill { height: 100%; transition: 0.5s; }

        .entry-card { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-del { color: var(--red); background: none; border: none; font-weight: 800; padding: 10px; }

        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-weight: 700; font-size: 0.75rem; gap: 4px; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
        
        .floating-btn { position: fixed; bottom: 110px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 30px; font-weight: 800; z-index: 999; color: #000; cursor: pointer; }
        .ia-btn { position: fixed; bottom: 110px; left: 20px; width: 60px; height: 60px; border-radius: 20px; background: #2563eb; border: none; font-size: 24px; z-index: 999; color: #fff; cursor: pointer; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: var(--bg); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 1px solid var(--border); }

        .input-grid input, .input-grid select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1rem; }
        .btn-save { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 16px; font-weight: 800; color: #000; cursor: pointer; }
        
        .tab-content { display: none; } .tab-content.active { display: block; }

        #chat-content { height: 300px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
        .msg.ia { background: #1e293b; color: #fff; align-self: flex-start; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader">Carregando Finan Pro...</div>

    <header class="glass-header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="toggleTheme()" style="background:var(--card); border:1px solid var(--border); padding:8px; border-radius:12px;">🌓</button>
            <div style="font-weight:800; font-size:1.1rem;">Finanças<span style="color:var(--accent)">PRO</span></div>
            <button id="btnAuth" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:8px 15px; border-radius:12px; font-weight:800; font-size:0.7rem;" onclick="window.gerenciarAuth()">ENTRAR</button>
        </div>
        <h1 id="saldo" style="font-size:2.6rem; font-weight:800;">R$ 0,00</h1>
    </header>

    <main>
        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card">
                <canvas id="graficoPizza" style="max-height: 180px;"></canvas>
                <div class="progress-box">
                    <div class="prog-item"><div class="prog-label"><span>Essencial</span><span id="txt-fixo">0%</span></div><div class="bar-bg"><div id="bar-fixo" class="bar-fill" style="background:#EF4444; width:0%"></div></div></div>
                    <div class="prog-item"><div class="prog-label"><span>Lazer</span><span id="txt-lazer">0%</span></div><div class="bar-bg"><div id="bar-lazer" class="bar-fill" style="background:#F97316; width:0%"></div></div></div>
                    <div class="prog-item"><div class="prog-label"><span>Investimento</span><span id="txt-invest">0%</span></div><div class="bar-bg"><div id="bar-invest" class="bar-fill" style="background:#FDE047; width:0%"></div></div></div>
                </div>
            </div>
        </section>
        <section id="aba-aportes" class="tab-content"><div id="lista-investimentos" style="padding: 20px;"></div></section>
        <section id="aba-extrato" class="tab-content"><div id="lista-geral" style="padding: 20px;"></div></section>
    </main>

    <nav class="bottom-tab-bar">
        <button onclick="window.switchTab('aba-dashboard', this)" class="nav-btn active">📊 Resumo</button>
        <button onclick="window.switchTab('aba-aportes', this)" class="nav-btn">📈 Aportes</button>
        <button onclick="window.switchTab('aba-extrato', this)" class="nav-btn">📜 Extrato</button>
    </nav>

    <button onclick="window.abrirIA()" class="ia-btn">🤖</button>
    <button onclick="window.abrirModal()" class="floating-btn">+</button>

    <div id="modalIA" class="modal-overlay">
        <div class="modal-sheet">
            <h3 style="margin-bottom:15px; font-weight:800;">Falar com <span style="color:#2563eb">Finan</span></h3>
            <div id="chat-content">
                <div class="msg ia">Olá Henrique! Sou o Finan. Como posso ajudar você hoje?</div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ia-input" placeholder="Diga algo..." style="flex:1; background:#111; border:1px solid #333; color:white; padding:15px; border-radius:12px; outline:none;">
                <button onclick="window.perguntarIA()" style="background:#2563eb; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">ENVIAR</button>
            </div>
            <button onclick="window.fecharIA()" style="width:100%; border:none; background:none; color:#888; padding:15px;">FECHAR</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-sheet">
            <h3 style="margin-bottom:20px; font-weight:800;">Novo Lançamento</h3>
            <div class="input-grid">
                <input type="text" id="desc" placeholder="Descrição">
                <input type="number" id="valor" placeholder="R$ 0,00">
                <input type="date" id="data-reg">
                <select id="tipo">
                    <option value="fixo">Essencial</option><option value="lazer">Lazer</option>
                    <option value="investimento">Investimento</option><option value="entrada">Receita</option>
                </select>
            </div>
            <button onclick="window.salvarRegistro()" class="btn-save">SALVAR</button>
            <button onclick="window.fecharModal()" style="width:100%; border:none; background:none; color:#888; padding:15px;">FECHAR</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth; window.db = db;
        window.f_doc = doc; window.f_setDoc = setDoc; window.f_getDoc = getDoc;
        window.mesesNomes = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

        // Garantia de que o loader suma em 2 segundos para não travar
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 2000);

        setPersistence(auth, browserLocalPersistence).then(() => {
            getRedirectResult(auth).catch(e => console.log("Erro Auth:", e));
        });

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase();
                window.carregarDados();
            } else {
                document.getElementById('btnAuth').innerText = "ENTRAR";
            }
        });

        window.gerenciarAuth = () => {
            if (auth.currentUser) { if(confirm("Sair?")) signOut(auth); }
            else { signInWithRedirect(auth, new GoogleAuthProvider()); }
        };
    </script>

    <script>
        let chartP;

        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };

        window.carregarDados = async () => {
            const user = window.auth.currentUser; if (!user) return;
            let saldoM = 0, fixo = 0, lazer = 0, invest = 0;
            const mesAtual = window.mesesNomes[new Date().getMonth()];
            try {
                const snap = await window.f_getDoc(window.f_doc(window.db, "usuarios", user.uid, "meses", mesAtual));
                if (snap.exists()) {
                    snap.data().transacoes.forEach(t => {
                        const v = parseFloat(t.valor);
                        if (t.tipo === 'entrada') saldoM += v;
                        else {
                            saldoM -= v;
                            if(t.tipo === 'fixo') fixo += v;
                            else if(t.tipo === 'lazer') lazer += v;
                            else invest += v;
                        }
                    });
                }
                document.getElementById('saldo').innerText = saldoM.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                renderPizza(fixo, lazer, invest);
            } catch (e) { console.error("Erro Firestore:", e); }
        };

        function renderPizza(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if(chartP) chartP.destroy();
            chartP = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }] }, options: { cutout: '80%' } });
        }

        window.salvarRegistro = async () => {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data-reg').value, t = document.getElementById('tipo').value;
            if(!v || !dt) return alert("Preencha Valor e Data");
            const mesAlvo = window.mesesNomes[parseInt(dt.split('-')[1]) - 1];
            const ref = window.f_doc(window.db, "usuarios", user.uid, "meses", mesAlvo);
            const snap = await window.f_getDoc(ref);
            let lista = snap.exists() ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            await window.f_setDoc(ref, { transacoes: lista });
            window.fecharModal(); window.carregarDados();
        };

        window.perguntarIA = async () => {
            const prompt = document.getElementById('ia-input').value;
            const chat = document.getElementById('chat-content');
            if(!prompt) return;
            chat.innerHTML += `<div class="msg user">${prompt}</div>`;
            document.getElementById('ia-input').value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `O Henrique é gestor comercial e trader. Responda brevemente como Finan: ${prompt}` }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ia">${aiText}</div>`;
            } catch (e) { 
                chat.innerHTML += `<div class="msg ia">Desculpe Henrique, tive um erro na rede. Tente de novo!</div>`; 
            }
            chat.scrollTop = chat.scrollHeight;
        };

        window.abrirModal = () => document.getElementById('modal').style.display = 'flex';
        window.fecharModal = () => document.getElementById('modal').style.display = 'none';
        window.abrirIA = () => document.getElementById('modalIA').style.display = 'flex';
        window.fecharIA = () => document.getElementById('modalIA').style.display = 'none';
        window.toggleTheme = () => document.body.classList.toggle('light-mode');
    </script>
</body>
</html>
