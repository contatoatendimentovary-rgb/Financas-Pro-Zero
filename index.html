<section id="lancamento" class="aba-content">
    <div class="card-form">
        <h2>Novo Registro</h2>
        <div class="group">
            <label>O que foi?</label>
            <input type="text" id="desc" placeholder="Ex: Salário, Aluguel, Mercado...">
        </div>
        
        <div class="row" style="display: flex; gap: 10px;">
            <div class="group" style="flex: 2;">
                <label>Valor</label>
                <input type="number" id="valor" step="0.01" placeholder="R$ 0,00">
            </div>
            <div class="group" style="flex: 1.5;">
                <label>Data</label>
                <input type="date" id="data">
            </div>
        </div>

        <div class="group">
            <label>Categoria (Gasto ou Receita)</label>
            <select id="cat">
                <option value="Essencial">Essencial (50%)</option>
                <option value="Lazer">Lazer (30%)</option>
                <option value="Investimento">Investir (20%)</option>
                <option value="Receita">É uma Entrada / Salário</option>
            </select>
        </div>
        <button onclick="salvarInteligente()" class="btn-save">Confirmar Registro</button>
    </div>
</section>
