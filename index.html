<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #00e676;
            --red: #ff5252;
            --yellow: #ffd740;
            --blue: #448aff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Loader que não bloqueia o clique após sumir */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .hidden { display: none !important; pointer-events: none; }

        header {
            background: var(--card);
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .balance { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 5px 0; }
        
        /* Barra 50/30/20 */
        .progress-container {
            height: 12px; display: flex; border-radius: 6px;
            overflow: hidden; background: #333; margin: 15px 0;
        }
        .bar { height: 100%; transition: width 0.8s ease; }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #333; background: #1a1a1a; color: white; font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-main {
            background: var(--accent); color: #000; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }

        /* IA Chat UI */
        .chat-box {
            height: 220px; overflow-y: auto; background: #000;
            padding: 15px; border-radius: 12px; border: 1px solid #222;
            font-size: 0.95rem; margin-bottom: 12px;
        }
        .msg-user { color: var(--accent); margin-bottom: 10px; font-weight: bold; }
        .msg-ai { color: #ddd; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<div id="loader">
    <span class="material-icons" style="font-size: 50px; color: var(--accent); margin-bottom: 15px;">sync</span>
    <strong>Finan Pro</strong>
</div>

<header>
    <div id="auth-status"><span class="material-icons">account_circle</span></div>
    <strong>FINAN PRO</strong>
    <button onclick="logout()" style="background:none; border:none; color:white;"><span class="material-icons">logout</span></button>
</header>

<div class="container">
    <div id="login-screen" class="card" style="display: none; text-align: center;">
        <h2 style="margin-top:0">Acesso</h2>
        <p style="color: #888; margin-bottom: 25px;">Entre com sua conta Google para sincronizar seus dados.</p>
        <button onclick="loginGoogle()" class="btn-main" style="background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            LOGAR COM GOOGLE
        </button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="card" style="text-align: center;">
            <small style="color: #888;">SALDO TOTAL</small>
            <div class="balance" id="display-saldo">R$ 0,00</div>
            
            <div class="progress-container">
                <div id="b-ess" class="bar" style="background: var(--red); width: 0%;"></div>
                <div id="b-des" class="bar" style="background: var(--yellow); width: 0%;"></div>
                <div id="b-inv" class="bar" style="background: var(--blue); width: 0%;"></div>
            </div>
            <div style="display:flex; justify-content:space-around; font-size:0.6rem; color: #888;">
                <span>🔴 ESSENCIAL</span><span>🟡 LAZER</span><span>🔵 INVEST</span>
            </div>
        </div>

        <div class="card">
            <h3>Lançamento</h3>
            <input type="text" id="desc" placeholder="Ex: Compra de Material">
            <input type="number" id="valor" placeholder="Valor R$" step="0.01">
            <select id="cat">
                <option value="50">Essencial (50%)</option>
                <option value="30">Desejos (30%)</option>
                <option value="20">Investimento (20%)</option>
            </select>
            <button class="btn-main" onclick="salvarOperacao()">REGISTRAR</button>
        </div>

        <div class="card">
            <h3>Assistente de Gestão Comercial</h3>
            <div id="chat-box" class="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ia-prompt" placeholder="Margem de lucro? Trading?">
                <button onclick="perguntarIA()" style="width:55px; background:var(--accent); border-radius:12px; border:none; cursor:pointer;">
                    <span class="material-icons">send</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIGURAÇÃO FIREBASE ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_DOMINIO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const GEMINI_KEY = "AQ.Ab8RN6I0HBcnj_r4GU5euHnkGszaF6janYmUoxfyF_lKvbQteg";

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- 2. LÓGICA DE LOGIN REVISADA ---

    // Força a persistência local
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Usando Redirect para garantir compatibilidade com PWA
        auth.signInWithRedirect(provider);
    }

    // Gerenciamento de Estado
    auth.onAuthStateChanged(async (user) => {
        const loader = document.getElementById('loader');
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');

        if (user) {
            loginScreen.style.display = 'none';
            mainApp.style.display = 'block';
            document.getElementById('auth-status').innerHTML = `<img src="${user.photoURL}" class="user-avatar">`;
            syncDados(user.uid);
            loader.classList.add('hidden');
        } else {
            // Se não estiver logado, verifica se está voltando de um redirecionamento
            try {
                const result = await auth.getRedirectResult();
                if (result.user) {
                    // Usuário acabou de logar via redirect
                    return; 
                }
            } catch (error) {
                console.error("Erro no redirect:", error);
            }
            
            loginScreen.style.display = 'block';
            mainApp.style.display = 'none';
            document.getElementById('auth-status').innerHTML = `<span class="material-icons">account_circle</span>`;
            loader.classList.add('hidden');
        }
    });

    function logout() {
        if(confirm("Sair do Finan Pro?")) auth.signOut();
    }

    // --- 3. PERSISTÊNCIA DE DADOS ---
    function salvarOperacao() {
        const user = auth.currentUser;
        const desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const cat = document.getElementById('cat').value;

        if(!desc || isNaN(valor)) return alert("Dados inválidos");

        db.collection("users").doc(user.uid).collection("financas").add({
            desc, valor, cat, data: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
        });
    }

    function syncDados(uid) {
        db.collection("users").doc(uid).collection("financas")
            .orderBy("data", "desc")
            .onSnapshot(snapshot => {
                let total = 0, e = 0, d = 0, i = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    total += data.valor;
                    if(data.cat === "50") e += data.valor;
                    if(data.cat === "30") d += data.valor;
                    if(data.cat === "20") i += data.valor;
                });

                document.getElementById('display-saldo').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                
                if(total !== 0) {
                    const abs = Math.abs(total);
                    document.getElementById('b-ess').style.width = (Math.abs(e)/abs*100) + "%";
                    document.getElementById('b-des').style.width = (Math.abs(d)/abs*100) + "%";
                    document.getElementById('b-inv').style.width = (Math.abs(i)/abs*100) + "%";
                }
            });
    }

    // --- 4. IA GEMINI (TESTE) ---
    async function perguntarIA() {
        const input = document.getElementById('ia-prompt');
        const box = document.getElementById('chat-box');
        const text = input.value;
        if(!text) return;

        box.innerHTML += `<div class="msg-user">Você: ${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        const context = `Atue como consultor comercial e de trading para o Henrique. 
                         Saldo atual: ${document.getElementById('display-saldo').innerText}. 
                         Use conceitos de Price Action e Gestão se necessário.
                         Pergunta: ${text}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
            });
            const data = await res.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg-ai"><b>IA:</b> ${aiResponse}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg-ai">Erro na conexão com o cérebro da IA.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
