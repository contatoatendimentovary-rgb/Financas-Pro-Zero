<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO AI - Gestão & Trade</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC; --header-bg: #FFFFFF; --card: #FFFFFF; --text-main: #1E293B;
            --text-sub: #64748B; --border: #E2E8F0; --accent: #4F46E5;
            --green: #10B981; --orange: #F59E0B; --red: #EF4444; 
            --ai-gradient: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }
        body.dark-mode {
            --bg: #0F172A; --header-bg: #1E293B; --card: #1E293B; --text-main: #F1F5F9;
            --text-sub: #94A3B8; --border: #334155; --accent: #6366F1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 110px; transition: 0.3s; overflow-x: hidden; }
        
        .glass-header { background: var(--header-bg); padding: 50px 20px 40px; border-radius: 0 0 30px 30px; border-bottom: 1px solid var(--border); text-align: center; }
        .header-content { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ai-badge { background: var(--ai-gradient); color: white; padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; border: none; cursor: pointer; }
        .user-pill { background: var(--accent); color: white; border: none; padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 0.7rem; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; margin: 8px 0; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-top: -25px; position: relative; z-index: 10; }
        .stat-card { background: var(--card); padding: 18px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .ai-popup { display: none; position: fixed; bottom: 100px; left: 15px; right: 15px; background: var(--card); border: 1px solid var(--accent); border-radius: 28px; padding: 22px; z-index: 3000; flex-direction: column; max-height: 70vh; }
        .chat-area { flex: 1; overflow-y: auto; margin: 15px 0; font-size: 0.85rem; }
        .chat-bubble { margin-bottom: 10px; padding: 12px; border-radius: 15px; max-width: 85%; }
        .ai-bubble { background: rgba(79, 70, 229, 0.1); align-self: flex-start; }
        .user-bubble { background: var(--accent); color: white; align-self: flex-end; margin-left: auto; }

        .tab-content { display: none; padding-top: 20px; } .tab-content.active { display: block; }
        .viz-card { background: var(--card); margin: 0 20px 20px; padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .entry-card { background: var(--card); padding: 15px; border-radius: 20px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--header-bg); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; flex: 1; }
        .nav-btn.active { color: var(--accent); font-weight: 800; }
        
        .floating-btn { position: fixed; bottom: 105px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--ai-gradient); color: white; border: none; font-size: 24px; z-index: 999; box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 4000; align-items: flex-end; backdrop-filter: blur(4px); }
        .modal-sheet { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; }
        .input-grid input, .input-grid select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text-main); }
        
        .progress-container { background: var(--bg); height: 8px; border-radius: 4px; overflow: hidden; margin: 5px 0 15px; }
        .bar { height: 100%; transition: 0.5s; }
    </style>
</head>
<body class="dark-mode">

    <div id="ai-modal" class="ai-popup">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:0.9rem;">✨ Consultor FinançasPRO</b>
            <button onclick="window.fecharAI()" style="background:none; border:none; font-size:1.5rem; color:var(--text-sub);">&times;</button>
        </div>
        <div class="chat-area" id="chat-historico">
            <div class="chat-bubble ai-bubble">Olá Henrique! Como está sua meta de trade hoje?</div>
        </div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="ai-input" placeholder="Dúvida técnica ou financeira..." style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text-main); outline:none;">
            <button onclick="window.perguntarIA()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:12px; font-weight:800;">ENVIAR</button>
        </div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <button onclick="window.toggleTheme()" style="background:none; border:none; font-size:1.2rem;">🌓</button>
            <button class="ai-badge" onclick="window.abrirAI()">✨ IA ASSISTENTE</button>
            <button id="btnAuth" class="user-pill" onclick="window.loginGoogle()">ENTRAR</button>
        </div>
        <div class="main-balance">
            <small style="color:var(--text-sub); font-weight:700;">SALDO TOTAL</small>
            <h1 id="saldo">R$ 0,00</h1>
        </div>
    </header>

    <div class="stats-row">
        <div class="stat-card">
            <small style="color:var(--text-sub); font-size:0.6rem; font-weight:800;">PROFIT</small>
            <b id="resumo-receita" style="color:var(--green); display:block; font-size:1.1rem;">R$ 0,00</b>
        </div>
        <div class="stat-card">
            <small style="color:var(--text-sub); font-size:0.6rem; font-weight:800;">DESPESAS</small>
            <b id="resumo-despesa" style="color:var(--red); display:block; font-size:1.1rem;">R$ 0,00</b>
        </div>
    </div>

    <main>
        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card"><canvas id="graficoPizza" style="max-height: 180px;"></canvas></div>
            <div id="metas-container" style="padding: 0 20px;"></div>
        </section>

        <section id="aba-invest" class="tab-content">
            <div class="viz-card"><canvas id="graficoBarras" style="max-height: 180px;"></canvas></div>
            <div id="lista-invest"></div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 0 20px 15px;">
                <select id="filtroMes" class="input-grid" onchange="window.carregarDados()">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril">Abril</option>
                    <option value="maio">Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
                </select>
            </div>
            <div id="lista-geral"></div>
        </section>
    </main>

    <button class="floating-btn" onclick="window.abrirModalLançamento()">+</button>

    <nav class="bottom-tab-bar">
        <button onclick="window.switchTab('aba-dashboard', this)" class="nav-btn active"><span>📊</span>DASH</button>
        <button onclick="window.switchTab('aba-invest', this)" class="nav-btn"><span>📈</span>TRADE</button>
        <button onclick="window.switchTab('aba-extrato', this)" class="nav-btn"><span>📜</span>HISTÓRICO</button>
    </nav>

    <div id="modal" class="modal-overlay" onclick="if(event.target==this) window.fecharModal()">
        <div class="modal-sheet">
            <div class="input-grid">
                <input type="text" id="desc" placeholder="Ex: Lucro Par EUR/USD">
                <input type="number" step="0.01" id="valor" placeholder="Valor R$">
                <input type="date" id="data-reg">
                <select id="tipo">
                    <option value="fixo">Essencial (50%)</option>
                    <option value="lazer">Lazer (30%)</option>
                    <option value="investimento">Investimento (20%)</option>
                    <option value="entrada">Receita / Profit (+)</option>
                </select>
                <button onclick="window.salvarRegistro()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:800;">SALVAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CHAVE GEMINI
        const Gemini_API_Key = "AIzaSyAqK8CAFTdzgVeobrz0phGBXAaXLnMpLRI"; 

        window.mesesNomes = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        window.chartP = null; window.chartB = null;
        window.dadosFinanceiros = { rec:0, f:0, l:0, i:0, saldo:0 };

        window.loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
        
        window.switchTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); 
            btn.classList.add('active');
        };

        window.abrirModalLançamento = () => {
            document.getElementById('data-reg').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal').style.display = 'flex';
        };
        window.fecharModal = () => document.getElementById('modal').style.display = 'none';
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.abrirAI = () => document.getElementById('ai-modal').style.display = 'flex';
        window.fecharAI = () => document.getElementById('ai-modal').style.display = 'none';

        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        window.carregarDados = async () => {
            if (!auth.currentUser) return;
            const mesSel = document.getElementById('filtroMes').value;
            let investAnual = Array(12).fill(0), saldoTotal = 0, f = 0, l = 0, i = 0, rec = 0;
            let htmlGeral = "", htmlInvest = "";

            const promises = window.mesesNomes.map(m => getDoc(doc(db, "usuarios", auth.currentUser.uid, "meses", m)));
            const snaps = await Promise.all(promises);

            snaps.forEach((snap, idx) => {
                const mesNome = window.mesesNomes[idx];
                if (snap.exists()) {
                    const trans = snap.data().transacoes || [];
                    trans.forEach((t, tIdx) => {
                        const v = parseFloat(t.valor);
                        if (t.tipo === 'investimento') investAnual[idx] += v;
                        if (mesNome === mesSel) {
                            if (t.tipo === 'entrada') { saldoTotal += v; rec += v; }
                            else { saldoTotal -= v; if(t.tipo==='fixo') f+=v; else if(t.tipo==='lazer') l+=v; else i+=v; }
                            
                            const card = `<div class="entry-card">
                                <div><b>${t.descricao}</b><br><small>${t.data.split('-').reverse().join('/')}</small></div>
                                <div style="text-align:right">
                                    <span style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}; font-weight:800">${fmt(v)}</span><br>
                                    <button onclick="window.apagar('${mesNome}', ${tIdx})" style="border:none; background:none; color:var(--red); font-size:0.6rem; font-weight:800; cursor:pointer;">APAGAR</button>
                                </div>
                            </div>`;
                            htmlGeral += card;
                            if(t.tipo === 'investimento') htmlInvest += card;
                        }
                    });
                }
            });

            window.dadosFinanceiros = { rec, f, l, i, saldo: saldoTotal };
            document.getElementById('saldo').innerText = fmt(saldoTotal);
            document.getElementById('resumo-receita').innerText = fmt(rec);
            document.getElementById('resumo-despesa').innerText = fmt(f+l+i);
            document.getElementById('lista-geral').innerHTML = htmlGeral || '<p style="text-align:center; padding:40px; opacity:0.3;">Nenhum registro encontrado.</p>';
            document.getElementById('lista-invest').innerHTML = htmlInvest || '<p style="text-align:center; padding:40px; opacity:0.3;">Sem aportes este mês.</p>';
            renderCharts(f, l, i, investAnual, rec);
        };

        window.perguntarIA = async () => {
            const input = document.getElementById('ai-input');
            const pergunta = input.value;
            const historico = document.getElementById('chat-historico');
            if(!pergunta) return;

            historico.innerHTML += `<div class="chat-bubble user-bubble">${pergunta}</div>`;
            input.value = "";
            historico.scrollTop = historico.scrollHeight;

            const promptIA = `Henrique (Estudante de Gestão) tem: Receita ${fmt(window.dadosFinanceiros.rec)}, Gastos ${fmt(window.dadosFinanceiros.f+window.dadosFinanceiros.l)}, Aportes ${fmt(window.dadosFinanceiros.i)}, Saldo ${fmt(window.dadosFinanceiros.saldo)}. Responda de forma técnica e curta: ${pergunta}`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${Gemini_API_Key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptIA }] }] })
                });
                const data = await resp.json();
                const respostaIA = data.candidates[0].content.parts[0].text;
                historico.innerHTML += `<div class="chat-bubble ai-bubble">${respostaIA}</div>`;
                historico.scrollTop = historico.scrollHeight;
            } catch (e) {
                historico.innerHTML += `<div class="chat-bubble ai-bubble">Erro na conexão com a IA.</div>`;
            }
        };

        function renderCharts(f, l, i, barras, rec) {
            const ctxP = document.getElementById('graficoPizza').getContext('2d');
            if(window.chartP) window.chartP.destroy();
            window.chartP = new Chart(ctxP, { type:'doughnut', data:{ labels:['Fixo','Lazer','Invest'], datasets:[{ data:[f||1, l, i], backgroundColor:['#EF4444','#F59E0B','#4F46E5'], borderWidth:0 }] }, options:{ cutout:'85%', plugins:{ legend:{ display:false } } } });

            const ctxB = document.getElementById('graficoBarras').getContext('2d');
            if(window.chartB) window.chartB.destroy();
            window.chartB = new Chart(ctxB, { type:'bar', data:{ labels:['J','F','M','A','M','J','J','A','S','O','N','D'], datasets:[{ data:barras, backgroundColor:'#4F46E5', borderRadius:5 }] }, options:{ plugins:{ legend:{display:false} }, scales:{ y:{display:false}, x:{grid:{display:false}} } } });

            const base = rec || (f+l+i) || 1;
            const pct = (v) => Math.min(((v/base)*100), 100).toFixed(0);
            document.getElementById('metas-container').innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><small>Essencial (50%)</small> <small>${pct(f)}%</small></div>
                <div class="progress-container"><div class="bar" style="width:${pct(f)}%; background:var(--red)"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><small>Lazer (30%)</small> <small>${pct(l)}%</small></div>
                <div class="progress-container"><div class="bar" style="width:${pct(l)}%; background:var(--orange)"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><small>Investimento (20%)</small> <small>${pct(i)}%</small></div>
                <div class="progress-container"><div class="bar" style="width:${pct(i)}%; background:var(--accent)"></div></div>`;
        }

        window.salvarRegistro = async () => {
            const v = document.getElementById('valor').value, dt = document.getElementById('data-reg').value;
            if(!v || !dt) return alert("Preencha valor e data.");
            const mes = window.mesesNomes[parseInt(dt.split('-')[1]) - 1];
            const ref = doc(db, "usuarios", auth.currentUser.uid, "meses", mes);
            const snap = await getDoc(ref);
            let lista = snap.exists() ? snap.data().transacoes : [];
            lista.push({ descricao: document.getElementById('desc').value || "Sem nome", valor: parseFloat(v), tipo: document.getElementById('tipo').value, data: dt });
            await setDoc(ref, { transacoes: lista }); 
            window.fecharModal(); 
            window.carregarDados();
        };

        window.apagar = async (mes, idx) => {
            if(!confirm("Deseja apagar este registro?")) return;
            const ref = doc(db, "usuarios", auth.currentUser.uid, "meses", mes);
            const snap = await getDoc(ref);
            let lista = snap.data().transacoes; 
            lista.splice(idx, 1);
            await setDoc(ref, { transacoes: lista }); 
            window.carregarDados();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0].toUpperCase();
                document.getElementById('filtroMes').value = window.mesesNomes[new Date().getMonth()];
                window.carr
