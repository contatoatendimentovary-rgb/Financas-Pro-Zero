<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro - CFO Digital</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0F172A; --header-bg: #1E293B; --card: #1E293B; --text-main: #F1F5F9;
            --text-sub: #94A3B8; --border: #334155; --accent: #6366F1;
            --green: #10B981; --red: #EF4444; --orange: #F59E0B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 100px; overflow-x: hidden; }
        
        .glass-header { background: var(--header-bg); padding: 40px 20px; border-radius: 0 0 30px 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .main-balance h1 { font-size: 2.5rem; margin: 10px 0; }
        
        /* Layout */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-top: -20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .entry-card { background: var(--card); padding: 15px; border-radius: 15px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* Navegação */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--header-bg); display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-size: 0.7rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--accent); }
        
        /* Modal de Lançamento */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-content { background: var(--card); width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
        
        /* JANELA IA INTEGRADA */
        #ai-layer { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; padding: 20px; }
        .ai-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        #ai-chat-flow { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
        .msg-ai { background: var(--header-bg); color: var(--text-main); border: 1px solid var(--accent); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-input-bar { display: flex; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- CAMADA DA IA -->
    <div id="ai-layer">
        <div class="ai-header">
            <b style="color:var(--accent); letter-spacing: 1px;">MENTE FINANCEIRA</b>
            <button onclick="toggleAI(false)" style="background:none; border:none; color:white; font-size:2rem;">&times;</button>
        </div>
        <div id="ai-chat-flow"></div>
        <div class="ai-input-bar">
            <input type="text" id="ai-query" placeholder="Sua dúvida comercial..." style="margin:0;">
            <button onclick="callGroq()" style="background:var(--accent); border:none; padding:0 20px; border-radius:12px; color:white; font-weight:bold;">ENVIAR</button>
        </div>
    </div>

    <header class="glass-header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:800; color:var(--accent)">FINAN PRO</div>
            <button onclick="loginGoogle()" id="btnAuth" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:15px; font-weight:bold;">LOGIN</button>
        </div>
        <div class="main-balance"><small>SALDO EM CAIXA</small><h1 id="saldo">R$ 0,00</h1></div>
    </header>

    <div class="stats-row">
        <div class="stat-card"><small>ENTRADAS</small><b id="res-rec" style="color:var(--green); display:block;">R$ 0,00</b></div>
        <div class="stat-card"><small>SAÍDAS</small><b id="res-des" style="color:var(--red); display:block;">R$ 0,00</b></div>
    </div>

    <main style="margin-top:30px; padding-bottom: 20px;">
        <div id="aba-dash">
            <div style="margin: 0 20px;"><canvas id="chartJS" style="max-height: 180px;"></canvas></div>
            <div id="perc-labels" style="padding: 20px;"></div>
        </div>
        <div id="aba-extrato" style="display:none;">
            <div style="padding:0 20px 10px;"><select id="filtroMes" onchange="carregarDados()"></select></div>
            <div id="lista-transacoes"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showTab('aba-dash', this)"><span>📊</span>DASH</button>
        <button class="nav-btn" onclick="openModal()"><span>➕</span>NOVO</button>
        <button class="nav-btn" onclick="toggleAI(true)"><span>🧠</span>IA</button>
        <button class="nav-btn" onclick="showTab('aba-extrato', this)"><span>📜</span>EXTRATO</button>
    </nav>

    <!-- MODAL LANÇAMENTO -->
    <div class="modal" id="modalLanca">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center;">Registrar Movimentação</h3>
            <input type="text" id="desc" placeholder="Ex: Venda de Produto">
            <input type="number" id="valor" placeholder="Valor (R$)">
            <input type="date" id="data">
            <select id="tipo">
                <option value="entrada">💰 Receita (Entrada)</option>
                <option value="fixo">🏠 Custo Fixo</option>
                <option value="lazer">🍦 Lazer / Estudo</option>
                <option value="investimento">📈 Reserva de Emergência</option>
            </select>
            <button onclick="salvar()" id="btnSalvar" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold;">CONFIRMAR REGISTRO</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-sub); margin-top:10px;">Voltar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", 
            authDomain: "financaspro-1e0e8.firebaseapp.com", 
            projectId: "financaspro-1e0e8", 
            storageBucket: "financaspro-1e0e8.firebasestorage.app", 
            messagingSenderId: "659521706556", 
            appId: "1:659521706556:web:86f2174c4c8a89335ac139" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // CHAVE GROQ ATUALIZADA
        const GROQ_KEY = "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"; 
        
        const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
        let chart = null;
        let saldoGlobal = 0;

        const selectMes = document.getElementById('filtroMes');
        meses.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.text = m.charAt(0).toUpperCase() + m.slice(1); selectMes.add(opt); });
        selectMes.value = meses[new Date().getMonth()];

        async function loginGoogle() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) { console.error(e); } }
        function showTab(id, btn) { 
            document.getElementById('aba-dash').style.display = id === 'aba-dash' ? 'block' : 'none';
            document.getElementById('aba-extrato').style.display = id === 'aba-extrato' ? 'block' : 'none';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function openModal() { document.getElementById('data').value = new Date().toISOString().split('T')[0]; document.getElementById('modalLanca').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalLanca').style.display = 'none'; }
        
        function toggleAI(show) { 
            const layer = document.getElementById('ai-layer');
            layer.style.display = show ? 'flex' : 'none'; 
            if(show && document.getElementById('ai-chat-flow').innerHTML === "") {
                addMsg("ai", "Salve Henrique! Sou sua Mente Financeira. Como está o fluxo da Gestão Comercial hoje?");
            }
        }

        async function carregarDados() {
            if (!auth.currentUser) return;
            const mesSel = document.getElementById('filtroMes').value;
            const doc = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesSel).get();
            let sal = 0, ent = 0, sai = 0, f = 0, l = 0, i = 0, html = "";
            
            if (doc.exists) {
                const dados = doc.data().transacoes || [];
                dados.sort((a,b) => b.timestamp - a.timestamp);
                dados.forEach(t => {
                    const v = Number(t.valor);
                    if (t.tipo === 'entrada') { ent += v; sal += v; }
                    else { sai += v; sal -= v; if(t.tipo==='fixo') f+=v; else if(t.tipo==='lazer') l+=v; else i+=v; }
                    html += `<div class="entry-card"><div><b>${t.descricao}</b><br><small>${t.data}</small></div><span style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span></div>`;
                });
            }
            saldoGlobal = sal;
            document.getElementById('saldo').innerText = sal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('res-rec').innerText = ent.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('res-des').innerText = sai.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('lista-transacoes').innerHTML = html || "<p style='text-align:center;padding:20px;opacity:0.3;'>Sem dados.</p>";
            renderChart(f, l, i);
        }

        async function salvar() {
            if (!auth.currentUser) return alert("Login necessário.");
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data').value, tp = document.getElementById('tipo').value;
            if(!d || !v) return;

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.innerText = "GRAVANDO...";

            try {
                const mesNome = meses[new Date(dt + "T12:00:00").getMonth()];
                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesNome);
                await ref.set({
                    transacoes: firebase.firestore.FieldValue.arrayUnion({
                        descricao: d, valor: parseFloat(v), tipo: tp, data: dt, timestamp: Date.now()
                    })
                }, { merge: true });

                closeModal();
                await carregarDados(); 
                toggleAI(true);
                callGroq(`Henrique, acabei de registrar: ${d} no valor de R$ ${v}. Qual o impacto no meu jogo?`);
            } catch(e) { console.error(e); }
            finally { btn.disabled = false; btn.innerText = "CONFIRMAR REGISTRO"; document.getElementById('desc').value = ""; document.getElementById('valor').value = ""; }
        }

        function addMsg(role, text) {
            const flow = document.getElementById('ai-chat-flow');
            flow.innerHTML += `<div class="msg msg-${role}">${text}</div>`;
            flow.scrollTop = flow.scrollHeight;
        }

        async function callGroq(manualText = null) {
            const input = document.getElementById('ai-query');
            const texto = manualText || input.value;
            if(!texto) return;

            if(!manualText) addMsg("user", texto);
            input.value = "";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({ 
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Você é a Mente Financeira de Henrique, aluno de Gestão Comercial. Use termos como 'fluxo', 'estratégia' e 'ROI'. Foco em resultados. Saldo: R$" + saldoGlobal },
                            { role: "user", content: texto }
                        ]
                    })
                });
                const data = await res.json();
                addMsg("ai", data.choices[0].message.content);
            } catch(e) { addMsg("ai", "O sinal falhou, mas o foco continua. Tente de novo!"); }
        }

        function renderChart(f, l, i) {
            const ctx = document.getElementById('chartJS').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Fixo', 'Lazer', 'Invest'], datasets: [{ data: [f||1, l||0, i||0], backgroundColor: ['#EF4444', '#F59E0B', '#6366F1'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
            const total = (f + l + i) || 1;
            document.getElementById('perc-labels').innerHTML = `
                <small>Custos Fixos: ${((f/total)*100).toFixed(0)}%</small><div class="progress-bar"><div class="progress-fill" style="width:${(f/total)*100}%; background:var(--red)"></div></div>
                <small>Lazer/Variável: ${((l/total)*100).toFixed(0)}%</small><div class="progress-bar"><div class="progress-fill" style="width:${(l/total)*100}%; background:var(--orange)"></div></div>
            `;
        }

        auth.onAuthStateChanged(user => { if (user) { document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0]; carregarDados(); } });
    </script>
</body>
</html>
