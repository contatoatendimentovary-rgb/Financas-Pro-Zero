<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finan Pro IA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0F172A;
    --text-main: #E2E8F0;
    --text-sub: #64748B;
    --border: #1E293B;

    --green: #22C55E;
    --red: #EF4444;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text-main);
    font-family: Arial;
}

/* HEADER */
header {
    padding:30px;
    text-align:center;
}

#saldo {
    font-size:2.5rem;
    color:var(--green);
}

/* CARD */
.card {
    background:var(--card);
    margin:15px;
    padding:20px;
    border-radius:15px;
    border:1px solid var(--border);
}

/* BOTÃO */
button {
    background:var(--green);
    border:none;
    padding:12px;
    border-radius:10px;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#000;
    color:#fff;
}

/* LISTA */
.entry {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid var(--border);
}

/* IA */
#ai-box {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#000;
    padding:10px;
}

#chat {
    max-height:150px;
    overflow:auto;
}

.msg-ai { color:#22C55E; margin:5px 0; }
.msg-user { color:#fff; margin:5px 0; }

</style>
</head>

<body>

<header>
    <h1>💰 Finan Pro IA</h1>
    <div id="saldo">R$ 0</div>
</header>

<div class="card">
    <h3>📊 Movimentos</h3>
    <div id="lista"></div>
</div>

<div class="card">
    <h3>➕ Novo lançamento</h3>

    <input id="desc" placeholder="Descrição"><br><br>
    <input id="valor" type="number" placeholder="Valor"><br><br>

    <select id="tipo">
        <option value="entrada">💰 Receita</option>
        <option value="fixo">🏠 Fixo</option>
        <option value="lazer">🍔 Lazer</option>
        <option value="investimento">📈 Investimento</option>
    </select><br><br>

    <button onclick="salvar()">Salvar</button>
</div>

<div id="ai-box">
    <div id="chat"></div>
    <input id="msg" placeholder="Ex: gastei 50 com pizza">
    <button onclick="ia()">Enviar</button>
</div>

<script>

// 🔐 COLE SUA CHAVE AQUI
const GROQ_KEY = "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";

let dados = [];

// 🎨 EMOJIS
function emoji(tipo){
    return {
        entrada:"💰",
        fixo:"🏠",
        lazer:"🍔",
        investimento:"📈"
    }[tipo];
}

// 📊 RENDER
function render(){
    let saldo = 0;
    let html = "";

    dados.forEach(t => {
        if(t.tipo === "entrada") saldo += t.valor;
        else saldo -= t.valor;

        html += `
        <div class="entry">
            <span>${emoji(t.tipo)} ${t.desc}</span>
            <span>
                R$ ${t.valor}
                <button onclick="del(${t.id})">🗑️</button>
            </span>
        </div>`;
    });

    document.getElementById("saldo").innerText = "R$ " + saldo;
    document.getElementById("lista").innerHTML = html;

    // ALERTAS
    if(saldo < 0){
        addAI("🚨 Você está no negativo. Corte custos URGENTE.");
    }
}

// 💾 SALVAR
function salvar(){
    const desc = document.getElementById("desc").value;
    const valor = parseFloat(document.getElementById("valor").value);
    const tipo = document.getElementById("tipo").value;

    if(!desc || !valor){
        alert("Preencha os campos");
        return;
    }

    dados.push({
        id: Date.now(),
        desc,
        valor,
        tipo
    });

    render();

    // ALERTA INTELIGENTE
    if(tipo === "lazer" && valor > 100){
        addAI("⚠️ Gasto alto com lazer. Isso impacta sua evolução financeira.");
    }

    addAI(`✔️ Registrado: ${desc} R$${valor}`);
}

// 🗑️ DELETAR
function del(id){
    dados = dados.filter(t => t.id !== id);
    render();
}

// 🤖 CHAT
function addAI(msg){
    document.getElementById("chat").innerHTML += `<div class="msg-ai">${msg}</div>`;
}

function addUser(msg){
    document.getElementById("chat").innerHTML += `<div class="msg-user">${msg}</div>`;
}

// 🧠 IA
async function ia(){
    const texto = document.getElementById("msg").value;

    if(!texto) return;

    addUser(texto);
    document.getElementById("msg").value = "";

    // 💥 IA LANÇANDO DESPESA AUTOMÁTICA
    if(texto.toLowerCase().includes("gastei") || texto.toLowerCase().includes("paguei")){
        const valorMatch = texto.match(/\d+/);
        if(valorMatch){
            const valor = parseFloat(valorMatch[0]);
            const desc = texto.replace(valorMatch[0], "").replace("gastei","").replace("paguei","");

            dados.push({
                id: Date.now(),
                desc: desc.trim(),
                valor,
                tipo:"lazer"
            });

            render();
            addAI("✔️ Lancei automaticamente pra você.");
            return;
        }
    }

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + GROQ_KEY
            },
            body:JSON.stringify({
                model:"llama-3.1-8b-instant",
                messages:[
                    {
                        role:"system",
                        content:`Você é um mentor financeiro rígido.
- Dê bronca quando gastar mal
- Alerte sobre riscos
- Fale como gestor profissional`
                    },
                    { role:"user", content:texto }
                ]
            })
        });

        const data = await res.json();
        addAI(data.choices[0].message.content);

    } catch(e){
        addAI("Erro ao conectar com IA.");
    }
}

</script>

</body>
</html>
