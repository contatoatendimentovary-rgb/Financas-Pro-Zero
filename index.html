<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
            --blue: #3B82F6; --orange: #F59E0B; --purple: #8B5CF6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .header { padding: 45px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: var(--accent); color: #000; padding: 8px 16px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .month-bar { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; }
        .m-item { padding: 10px 18px; border-radius: 14px; background: #1A1A1A; border: 1px solid var(--border); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .hero { text-align: center; padding: 35px 20px 15px; }
        .hero span { font-size: 0.7rem; text-transform: uppercase; color: var(--subtext); font-weight: 800; letter-spacing: 1.5px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; margin-top: 5px; }

        .mini-stats { display: flex; gap: 12px; margin: 0 20px 25px; }
        .stat-card { flex: 1; background: var(--card); padding: 18px; border-radius: 22px; border: 1px solid var(--border); }
        .stat-card small { font-size: 0.6rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; display: block; margin-bottom: 6px; }

        .chart-box { background: var(--card); border-radius: 28px; border: 1px solid var(--border); margin: 0 20px 25px; padding: 30px; text-align: center; }
        .chart-container { width: 180px; height: 180px; margin: 0 auto; }

        .t-row { background: var(--card); padding: 16px; border-radius: 20px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-info { display: flex; align-items: center; gap: 14px; }
        .t-emoji { width: 44px; height: 44px; background: #1A1A1A; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .btn-del { background: rgba(239, 68, 68, 0.1); border: none; color: var(--red); width: 38px; height: 38px; border-radius: 12px; cursor: pointer; }

        .ai-fab { position: fixed; bottom: 105px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); z-index: 999; }
        
        .panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
        .msg-user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 700; }

        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 20px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.65rem; }
        .n-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="ai-modal" class="panel">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--accent)">ASSISTENTE IA</b>
            <button onclick="toggleIA()" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="chat-box" class="chat-area"></div>
        <div style="padding:25px; display:flex; gap:12px; background:var(--card);">
            <input type="text" id="ai-input" placeholder="O que você gastou hoje?" style="flex:1; padding:18px; border-radius:15px; border:1px solid var(--border); background:#000; color:#fff; outline:none;">
            <button onclick="processarIA()" style="background:var(--accent); border:none; padding:0 25px; border-radius:15px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b>FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" class="user-badge" onclick="login()">LOGIN</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div id="v-home">
        <div class="hero">
            <span>Saldo Total Disponível</span>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>
        <div class="mini-stats">
            <div class="stat-card"><small>Receitas Mês</small><b id="st-rec" style="color:var(--green)">R$ 0,00</b></div>
            <div class="stat-card"><small>Gastos Mês</small><b id="st-gas" style="color:var(--red)">R$ 0,00</b></div>
        </div>
        <div class="chart-box">
            <div class="chart-container"><canvas id="myChart"></canvas></div>
            <p style="margin-top:15px; font-size:0.7rem; font-weight:800; color:var(--subtext);">DIVISÃO DE CUSTOS</p>
        </div>
    </div>

    <div id="v-lista" style="display:none;"><div id="cont-lista" style="padding-top:20px;"></div></div>

    <button class="ai-fab" onclick="toggleIA()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="tab('home', this)">Home</button>
        <button class="n-btn" onclick="tab('lista', this)">Extrato</button>
    </nav>

    <script>
        const cfg = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null;

        function init() {
            const mCont = document.getElementById('month-list');
            MESES.forEach(m => {
                const d = document.createElement('div');
                d.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                d.innerText = m.charAt(0).toUpperCase() + m.slice(1);
                d.onclick = () => {
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    d.classList.add('active');
                    mesAtivo = m;
                    sync();
                };
                mCont.appendChild(d);
            });
            auth.onAuthStateChanged(u => { if(u){ sync(); } });
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function sync() {
            if(!auth.currentUser) return;
            
            let saldoPassado = 0;
            const indexAtual = MESES.indexOf(mesAtivo);

            // Soma histórica real (sem duplicar maio)
            for(let i=0; i < indexAtual; i++) {
                const s = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(MESES[i]).get();
                if(s.exists) {
                    (s.data().transacoes || []).forEach(t => {
                        const v = parseFloat(t.valor) || 0;
                        if(t.tipo.toLowerCase().includes('entrada')) saldoPassado += v;
                        else saldoPassado -= v;
                    });
                }
            }

            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo)
            .onSnapshot(doc => {
                let rMes = 0, gMes = 0, h = "";
                let cats = { Fixo: 0, Lazer: 0, Outros: 0 };
                const trans = doc.exists ? doc.data().transacoes || [] : [];
                
                trans.forEach((t, i) => {
                    const v = parseFloat(t.valor) || 0;
                    const tp = t.tipo.toLowerCase();
                    if(tp.includes('entrada')) rMes += v;
                    else {
                        gMes += v;
                        if(tp.includes('fixo')) cats.Fixo += v;
                        else if(tp.includes('lazer')) cats.Lazer += v;
                        else cats.Outros += v;
                    }
                    h += `<div class="t-row"><div class="t-info"><div class="t-emoji">${tp.includes('entrada')?'💵':'🍿'}</div><div class="t-details"><b>${t.descricao}</b><span>${t.tipo}</span></div></div><div style="display:flex; align-items:center; gap:12px;"><b style="color:${tp.includes('entrada')?'var(--green)':'#fff'}">R$ ${v.toFixed(2)}</b><button class="btn-del" onclick="del(${i})">🗑️</button></div></div>`;
                });

                const totalFinal = saldoPassado + rMes - gMes;
                document.getElementById('main-balance').innerText = totalFinal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('st-rec').innerText = `R$ ${rMes.toFixed(2)}`;
                document.getElementById('st-gas').innerText = `R$ ${gMes.toFixed(2)}`;
                document.getElementById('cont-lista').innerHTML = h;
                
                renderChart(cats, totalFinal);
            });
        }

        function renderChart(c, s) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Outros', 'Saldo'],
                    datasets: [{
                        data: [c.Fixo, c.Lazer, c.Outros, s > 0 ? s : 0],
                        backgroundColor: ['#3B82F6', '#F59E0B', '#EF4444', '#EAB308'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        async function processarIA() {
            const i = document.getElementById('ai-input'), b = document.getElementById('chat-box');
            if(!i.value) return;
            b.innerHTML += `<div class="msg msg-user">${i.value}</div>`;
            const prompt = i.value; i.value = "";

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                body:JSON.stringify({
                    model:"llama-3.1-8b-instant",
                    messages:[{role:"system", content:"Retorne APENAS JSON: {\"is\":true, \"d\":\"desc\", \"v\":0.0, \"t\":\"entrada/fixo/lazer\"}."}, {role:"user", content:prompt}],
                    response_format:{"type":"json_object"}
                })
            });
            const r = JSON.parse((await res.json()).choices[0].message.content);
            if(r.is) {
                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo);
                const snp = await ref.get();
                let l = snp.exists ? snp.data().transacoes || [] : [];
                l.push({ descricao: r.d, valor: r.v, tipo: r.t });
                await ref.set({ transacoes: l });
                b.innerHTML += `<div class="msg msg-ai">✅ Salvo: ${r.d} (R$ ${r.v})</div>`;
            }
        }

        async function del(idx) {
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo);
            const snp = await ref.get();
            let l = snp.data().transacoes;
            l.splice(idx, 1);
            await ref.set({ transacoes: l });
        }

        function tab(t, btn) {
            document.getElementById('v-home').style.display = t==='home'?'block':'none';
            document.getElementById('v-lista').style.display = t==='lista'?'block':'none';
            document.querySelectorAll('.n-btn').forEach(x => x.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleIA() { const m = document.getElementById('ai-modal'); m.style.display = m.style.display==='flex'?'none':'flex'; }

        init();
    </script>
</body>
</html>
