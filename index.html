<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>FinançasPRO // Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --header-bg: #000000; --card: #0A0A0A;
            --text-main: #FFFFFF; --text-sub: #A1A1AA; --border: #1F2937;
            --accent: #FDE047; --green: #22C55E; --orange: #F97316; --red: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; }
        
        .app-lock-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .glass-header { background: var(--header-bg); padding: 40px 20px 30px; border-radius: 0 0 35px 35px; border-bottom: 1px solid var(--border); text-align: center; }
        .main-balance small { text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-size: 0.7rem; font-weight: 700; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; margin: 5px 0; }

        .alert-box { background: rgba(249, 115, 22, 0.15); color: var(--orange); border: 1px solid var(--orange); padding: 15px; border-radius: 18px; margin: 15px 20px; font-size: 0.85rem; font-weight: 700; display: none; border-left: 5px solid var(--orange); }

        .viz-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 32px; border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .timeline-list { padding: 0 20px; }
        .entry-card { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .user-pill { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; margin-left: 10px; }

        .btn-export { background: #1DB954; color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        .floating-btn { position: fixed; bottom: 110px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); border: none; font-size: 32px; font-weight: 800; z-index: 999; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 700; }
        .nav-btn.active { color: var(--accent); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: #080808; width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; background: #000; color: #fff; border: 1px solid var(--border); }

        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="app-lock" class="app-lock-overlay">
        <div style="font-weight:800; font-size:1.5rem; margin-bottom:10px;">Finanças<span>PRO</span></div>
        <p style="color:var(--text-sub); margin-bottom:30px;">Identidade Protegida</p>
        <button onclick="autenticarBio()" class="user-pill">DESBLOQUEAR</button>
    </div>

    <div class="app-wrapper">
        <header class="glass-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-weight:800; font-size:1rem;">Finanças<span>PRO</span></div>
                <div id="user-area" style="display:flex; align-items:center;">
                    <button id="btnAuth" class="user-pill">Entrar</button>
                    <button id="btnLogout" class="btn-logout" style="display:none;" onclick="sair()">SAIR</button>
                </div>
            </div>
            <div class="main-balance">
                <small>Saldo Total</small>
                <h1 id="saldo">R$ 0,00</h1>
            </div>
        </header>

        <div id="alerta-economia" class="alert-box"></div>

        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card">
                <h3 style="margin-bottom:15px; font-size:0.9rem;">Distribuição Mensal</h3>
                <div style="width:100%; height:100%; position:relative;"><canvas id="graficoPizza"></canvas></div>
            </div>
        </section>

        <section id="aba-investimentos" class="tab-content">
            <div class="viz-card" style="height:400px;">
                <h3 style="margin-bottom:15px; font-size:0.9rem; color:var(--accent);">Crescimento de Patrimônio</h3>
                <div style="width:100%; height:100%; position:relative;"><canvas id="graficoBarras"></canvas></div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <button onclick="exportarCSV()" class="btn-export">📊 EXPORTAR PARA EXCEL</button>
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option><option value="junho">Junho</option>
                </select>
            </div>
            <div id="lista" class="timeline-list"></div>
        </section>

        <nav class="bottom-nav">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active"><span>📊</span>Home</button>
            <button onclick="switchTab('aba-investimentos', this)" class="nav-btn"><span>📈</span>Investir</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn"><span>📜</span>Extrato</button>
        </nav>

        <button onclick="abrirModal()" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="margin-bottom:20px;">Novo Lançamento</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Investimento (20%)</option>
                    </select>
                </div>
                <button onclick="salvar()" class="user-pill" style="width:100%; padding:20px; border-radius:18px; justify-content:center;">SALVAR</button>
                <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:var(--text-sub); padding:15px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                document.getElementById('btnLogout').style.display = 'block';
                window.carregarDados();
                window.renderInvestimentos();
            } else {
                document.getElementById('btnAuth').innerText = "Entrar";
                document.getElementById('btnLogout').style.display = 'none';
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        window.sair = () => signOut(window.auth).then(() => location.reload());
        document.getElementById('btnAuth').onclick = () => window.loginGoogle();
    </script>

    <script>
        let currentChart;
        let barChart;

        async function autenticarBio() {
            const lock = document.getElementById('app-lock');
            if (window.PublicKeyCredential) {
                try {
                    const options = {
                        publicKey: {
                            challenge: crypto.getRandomValues(new Uint8Array(32)),
                            rp: { name: "FinancasPRO" },
                            user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "user", displayName: "User" },
                            pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                            timeout: 60000
                        }
                    };
                    const cred = await navigator.credentials.create(options);
                    if (cred) { lock.style.opacity = '0'; setTimeout(() => lock.style.display = 'none', 500); }
                } catch (e) { alert("Autenticação necessária."); }
            } else { lock.style.display = 'none'; }
        }

        async function renderInvestimentos() {
            const user = window.auth.currentUser;
            const meses = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho'];
            let dadosInvest = [];

            for (let m of meses) {
                const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
                const snap = await window.getDoc(ref);
                let totalMês = 0;
                if (snap.exists()) {
                    snap.data().transacoes.forEach(t => {
                        if (t.tipo === 'investimento') totalMês += parseFloat(t.valor);
                    });
                }
                dadosInvest.push(totalMês);
            }

            const ctx = document.getElementById('graficoBarras').getContext('2d');
            if (barChart) barChart.destroy();
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
                    datasets: [{
                        label: 'R$ Investido',
                        data: dadosInvest,
                        backgroundColor: '#FDE047',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, grid: { color: '#1F2937' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        async function carregarDados() {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            let r = 0, f = 0, l = 0, i = 0, html = "";
            let trans = snap.exists() ? snap.data().transacoes : [];

            trans.forEach(t => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') r += v;
                else if(t.tipo === 'fixo') f += v;
                else if(t.tipo === 'lazer') l += v;
                else i += v;
                html += `<div class="entry-card">
                    <div><b>${t.descricao}</b><br><small>${t.data}</small></div>
                    <div style="color:${t.tipo==='entrada'?'#22C55E':'#EF4444'}; font-weight:800">
                        ${t.tipo==='entrada'?'+':'-'} R$ ${v.toFixed(2)}
                    </div>
                </div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(r - (f+l+i)).toFixed(2)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.5;">Vazio</p>';
            renderPizza(f, l, i);
        }

        function renderPizza(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Invest'],
                    datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            if (tabId === 'aba-investimentos') window.renderInvestimentos();
        }

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function salvar() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, t = document.getElementById('tipo').value, dt = document.getElementById('data-lancamento').value, m = document.getElementById('filtroMes').value;
            if (!d || !v || !dt) return;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
            const snap = await window.getDoc(ref);
            let trans = snap.exists() ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: parseFloat(v), tipo: t, data: dt });
            await window.setDoc(ref, { transacoes: trans });
            fecharModal();
            window.carregarDados();
            if (t === 'investimento') window.renderInvestimentos();
        }

        async function exportarCSV() {
            const user = window.auth.currentUser;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            if (!snap.exists()) return;
            let csv = "\uFEFFData,Descricao,Valor,Tipo\n";
            snap.data().transacoes.forEach(t => csv += `${t.data},${t.descricao},${t.valor},${t.tipo}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `finanças_${mes}.csv`;
            link.click();
        }
    </script>
</body>
</html>
