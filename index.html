<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinançasPRO - Corporate BI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">
    <div class="app-wrapper">
        <header class="main-header">
            <div class="header-top">
                <span class="brand">Finanças<span>PRO</span></span>
                <div class="header-actions">
                    <button id="toggleTheme" class="theme-btn">🌓</button>
                    <button id="btnAuth" class="login-pill">Carregando...</button>
                </div>
            </div>
            <div class="balance-card">
                <label>Patrimônio Líquido</label>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
        </header>

        <main class="content-area">
            <section class="chart-section">
                <div class="chart-container">
                    <canvas id="meuGrafico"></canvas>
                </div>
            </section>

            <section class="bi-dashboard">
                <div class="chart-item">
                    <div class="chart-labels"><span>Essencial (50%)</span><b id="txt-fixo">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-fixo" class="bar-fill green"></div></div>
                </div>
                <div class="chart-item">
                    <div class="chart-labels"><span>Lazer (30%)</span><b id="txt-lazer">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-lazer" class="bar-fill orange"></div></div>
                </div>
                <div class="chart-item">
                    <div class="chart-labels"><span>Investimento (20%)</span><b id="txt-invest">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-invest" class="bar-fill blue"></div></div>
                </div>
            </section>

            <div class="filter-row">
                <select id="filtroMes" class="corporate-select">
                    <option value="janeiro">Janeiro</option>
                    <option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option>
                    <option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option>
                    <option value="junho">Junho</option>
                    <option value="julho">Julho</option>
                    <option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option>
                    <option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option>
                    <option value="dezembro">Dezembro</option>
                </select>
            </div>

            <ul id="lista" class="entry-list"></ul>
        </main>

        <button id="abrirModal" class="btn-primary-action">Novo Lançamento</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-box">
                <h4>Nova Movimentação</h4>
                <div class="form-group">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <select id="tipo">
                        <option value="entrada">Receita (+) </option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Investimento (20%)</option>
                    </select>
                </div>
                <button id="btnSalvar" class="btn-save">Confirmar</button>
                <button id="btnFechar" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.auth = auth; window.db = db; window.doc = doc; 
        window.setDoc = setDoc; window.getDoc = getDoc;

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('btnAuth');
            if (user) {
                btn.innerText = "Sair (" + user.displayName.split(' ')[0] + ")";
                btn.onclick = window.logout;
                window.carregarDados();
            } else {
                btn.innerText = "Entrar";
                btn.onclick = window.loginGoogle;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
