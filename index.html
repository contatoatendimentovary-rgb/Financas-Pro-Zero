<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | IA Financial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0B0F1A;
            --card: #161B2C;
            --accent: #7C3AED;
            --text: #FFFFFF;
            --subtext: #94A3B8;
            --green: #10B981;
            --red: #EF4444;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* Estilo Apple-Like Header */
        .header { padding: 50px 24px 40px; background: linear-gradient(180deg, #1E1B4B 0%, var(--bg) 100%); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: -0.5px; color: var(--accent); }
        .user-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; font-size: 0.75rem; color: white; cursor: pointer; }

        .hero-balance { text-align: center; margin: 20px 0; }
        .hero-balance small { color: var(--subtext); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .hero-balance h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; margin-top: 5px; }

        /* Cards de Status */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; margin-top: -20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .stat-card span { font-size: 0.65rem; color: var(--subtext); font-weight: 700; display: block; margin-bottom: 4px; }
        .stat-card b { font-size: 1.1rem; letter-spacing: -0.5px; }

        /* Seções e Listas */
        .section-header { padding: 30px 24px 15px; font-size: 0.85rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; }
        .card-view { background: var(--card); margin: 0 24px; padding: 24px; border-radius: 28px; border: 1px solid var(--border); }
        
        .transaction { background: rgba(255,255,255,0.02); padding: 16px; border-radius: 20px; margin: 0 24px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-details b { display: block; font-size: 0.95rem; }
        .t-details small { color: var(--subtext); font-size: 0.7rem; }
        .t-val { font-weight: 800; font-size: 1rem; }

        /* Chat de IA Flutuante */
        .ai-btn { position: fixed; bottom: 110px; right: 24px; width: 60px; height: 60px; border-radius: 22px; background: linear-gradient(135deg, #7C3AED, #5B21B6); border: none; color: white; font-size: 26px; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4); z-index: 1000; cursor: pointer; }
        
        .ai-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-top { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 14px 18px; border-radius: 22px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; }
        .b-ai { background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .b-user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-input-box { padding: 20px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .ai-input-box input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 18px; color: white; outline: none; }

        /* Barra de Navegação */
        .navbar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(22, 27, 44, 0.98); backdrop-filter: blur(15px); display: flex; border-top: 1px solid var(--border); padding-bottom: 25px; }
        .nav-item { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 1.5rem; margin-bottom: 4px; }

        /* Modal Registro */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 3000; align-items: flex-end; }
        .modal-sheet { background: var(--card); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--accent); }
        input, select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; font-size: 1rem; }
        .btn-action { width: 100%; padding: 20px; border-radius: 20px; background: var(--accent); color: white; border: none; font-weight: 800; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ai-modal" class="ai-modal">
        <div class="ai-top">
            <b style="color: var(--accent)">✨ FIN PRO INTELIGENTE</b>
            <button onclick="toggleAI()" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
        </div>
        <div class="chat-history" id="chat-content">
            <div class="bubble b-ai">Olá Henrique! Analisei seus dados e estou pronto para otimizar sua gestão financeira hoje.</div>
        </div>
        <div class="ai-input-box">
            <input type="text" id="ai-input" placeholder="Pergunte qualquer coisa...">
            <button onclick="askFINPRO()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:15px; font-weight:bold;">ENVIAR</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <div class="logo">FINAN PRO</div>
            <button id="btnUser" class="user-pill" onclick="login()">ACESSAR CONTA</button>
        </div>
        <div class="hero-balance">
            <small>Saldo Disponível</small>
            <h1 id="total-balance">R$ 0,00</h1>
        </div>
    </header>

    <div class="status-grid">
        <div class="stat-card">
            <span>ENTRADAS</span>
            <b id="val-in" style="color: var(--green);">R$ 0,00</b>
        </div>
        <div class="stat-card">
            <span>SAÍDAS</span>
            <b id="val-out" style="color: var(--red);">R$ 0,00</b>
        </div>
    </div>

    <main id="tab-dash">
        <div class="section-header">Distribuição de Gastos</div>
        <div class="card-view">
            <canvas id="chartFin" style="max-height: 180px;"></canvas>
        </div>
    </main>

    <main id="tab-list" style="display:none;">
        <div class="section-header">Histórico Recente</div>
        <div id="items-list"></div>
    </main>

    <button class="ai-btn" onclick="toggleAI()">✨</button>

    <nav class="navbar">
        <button class="nav-item active" onclick="switchTab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-item" onclick="showModal()"><span>➕</span>ADICIONAR</button>
        <button class="nav-item" onclick="switchTab('list', this)"><span>📜</span>EXTRATO</button>
    </nav>

    <div id="reg-modal" class="modal-overlay" onclick="if(event.target==this) hideModal()">
        <div class="modal-sheet">
            <h3 style="text-align: center; margin-bottom: 25px;">Novo Registro</h3>
            <input type="text" id="f-desc" placeholder="Descrição">
            <input type="number" id="f-val" placeholder="Valor R$">
            <select id="f-tipo">
                <option value="fixo">🏠 Essencial (50%)</option>
                <option value="lazer">🍿 Lazer (30%)</option>
                <option value="investimento">💰 Reserva (20%)</option>
                <option value="entrada">💵 Receita (+)</option>
            </select>
            <input type="date" id="f-date">
            <button class="btn-action" onclick="saveEntry()">SALVAR</button>
        </div>
    </div>

    <script>
        // CHAVE E NOME SOLICITADOS
        const GROQAPY = "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";
        
        const firebaseConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let chartInstance = null;
        let globalData = { in:0, f:0, l:0, i:0, balance:0 };

        function toggleAI() { const m = document.getElementById('ai-modal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function showModal() { document.getElementById('f-date').value = new Date().toISOString().split('T')[0]; document.getElementById('reg-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('reg-modal').style.display = 'none'; }
        function switchTab(t, b) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + t).style.display = 'block';
            b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function sync() {
            if (!auth.currentUser) return;
            const mes = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"][new Date().getMonth()];
            const doc = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes).get();
            
            let tIn = 0, tf = 0, tl = 0, ti = 0, list = "";
            if (doc.exists) {
                (doc.data().transacoes || []).forEach(t => {
                    const v = parseFloat(t.valor);
                    if (t.tipo === 'entrada') tIn += v;
                    else { if(t.tipo==='fixo') tf+=v; else if(t.tipo==='lazer') tl+=v; else ti+=v; }
                    list += `<div class="transaction"><div class="t-details"><b>${t.descricao}</b><small>${t.tipo}</small></div><div class="t-val" style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${t.tipo==='entrada'?'+':'-'} ${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div></div>`;
                });
            }
            globalData = { in:tIn, f:tf, l:tl, i:ti, balance: tIn - (tf+tl+ti) };
            document.getElementById('total-balance').innerText = globalData.balance.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('val-in').innerText = tIn.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('val-out').innerText = (tf+tl+ti).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('items-list').innerHTML = list || "<p style='text-align:center;padding:50px;opacity:0.3;'>Vazio</p>";
            render(tf, tl, ti);
        }

        async function saveEntry() {
            const d = document.getElementById('f-desc').value, v = document.getElementById('f-val').value;
            const t = document.getElementById('f-tipo').value, dt = document.getElementById('f-date').value;
            const mes = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"][parseInt(dt.split('-')[1])-1];
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes);
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            await ref.set({ transacoes: lista });
            hideModal(); sync();
        }

        // IA FIN PRO ATUALIZADA (Llama 3.1 8b Instant)
        async function askFINPRO() {
            const inp = document.getElementById('ai-input'), box = document.getElementById('chat-content');
            if(!inp.value) return;
            const text = inp.value;
            box.innerHTML += `<div class="bubble b-user">${text}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const prompt = `Usuário: Henrique. Saldo: R$${globalData.balance}. Receitas: R$${globalData.in}. Gastos: Fixo R$${globalData.f}, Lazer R$${globalData.l}, Reserva R$${globalData.i}. Analise e responda como FIN PRO: ${text}`;
                
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQAPY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: "llama-3.1-8b-instant", // Modelo atualizado e funcional
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7 
                    })
                });

                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                
                const reply = data.choices[0].message.content;
                box.innerHTML += `<div class="bubble b-ai">${reply}</div>`;
            } catch (e) {
                box.innerHTML += `<div class="bubble b-ai" style="color:var(--red)">Erro de conexão. Verifique sua chave API.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        function render(f, l, i) {
            const ctx = document.getElementById('chartFin').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Essencial', 'Lazer', 'Reserva'],
                    datasets: [{ data: [f||1, l||0.1, i||0.1], backgroundColor: ['#7C3AED', '#F59E0B', '#10B981'], borderWidth: 0 }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        auth.onAuthStateChanged(u => { if(u) { document.getElementById('btnUser').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
