<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --text: #FFFFFF;
            --text-sub: #71717A;
            --border: #27272A;
            --gold: #EAB308;
            --gold-muted: #714D03;
            --green: #22C55E;
            --red: #EF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; overflow-x: hidden; }

        /* Header Estilo Imagem */
        .header { padding: 60px 24px 30px; text-align: center; }
        .logo-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 30px; }
        .logo-row b { font-size: 1.4rem; letter-spacing: -0.5px; }
        .logo-row span { color: var(--gold); }

        .balance-label { color: var(--text-sub); font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; }

        /* Cards e Gráficos */
        .container { padding: 0 20px; }
        .viz-card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Estilo das Barras de Progresso da Imagem */
        .prog-group { margin-top: 25px; }
        .prog-item { margin-bottom: 20px; }
        .prog-info { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
        .prog-info span:first-child { color: var(--text); }
        .prog-info span:last-child { color: var(--text-sub); }
        
        .bar-container { background: #262626; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease-out; }

        /* Transações Estilo Lista */
        .entry { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .entry-icon { width: 45px; height: 45px; background: #1A1A1A; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 1.2rem; }
        .entry-details b { display: block; font-size: 1rem; }
        .entry-details small { color: var(--text-sub); font-weight: 600; }
        .entry-amount { font-weight: 800; font-size: 1.05rem; }

        /* Navegação Inferior Idêntica à Imagem */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 10px 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 0.65rem; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { font-size: 1.4rem; }

        /* Botão Flutuante de Adicionar */
        .fab { width: 50px; height: 50px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.5rem; font-weight: 800; border: none; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Modal Escuro */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-body { width: 100%; background: #121212; border-radius: 30px 30px 0 0; padding: 40px 25px; border-top: 1px solid var(--border); }
        .input { width: 100%; background: #1A1A1A; border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: #fff; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .btn-add { width: 100%; background: var(--gold); color: #000; padding: 18px; border-radius: 15px; font-weight: 800; border: none; font-size: 1rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-row">
            <b>Finanças<span>PRO</span></b>
            <button onclick="loginGoogle()" id="userBtn" style="background:none; border:none; color:var(--gold); font-size:1.2rem;">👤</button>
        </div>
        <div class="balance-label">Balance</div>
        <div class="balance-value" id="totalBalance">R$ 0,00</div>
    </header>

    <div class="container">
        <section id="dash" class="tab-content active">
            <div class="viz-card" style="text-align: center;">
                <canvas id="chartPizza" style="max-height: 200px; margin: 0 auto;"></canvas>
            </div>
            
            <div class="prog-group">
                <div class="prog-item">
                    <div class="prog-info"><span>Fixos (50%)</span><span id="val-fixo">R$ 0,00</span></div>
                    <div class="bar-container"><div id="bar-fixo" class="bar-fill" style="background: var(--gold); width: 0%"></div></div>
                </div>
                <div class="prog-item">
                    <div class="prog-info"><span>Lazer (30%)</span><span id="val-lazer">R$ 0,00</span></div>
                    <div class="bar-container"><div id="bar-lazer" class="bar-fill" style="background: #22C55E; width: 0%"></div></div>
                </div>
                <div class="prog-item">
                    <div class="prog-info"><span>Investir (20%)</span><span id="val-invest">R$ 0,00</span></div>
                    <div class="bar-container"><div id="bar-invest" class="bar-fill" style="background: #525252; width: 0%"></div></div>
                </div>
            </div>
        </section>

        <section id="extrato" class="tab-content">
            <div id="lista-transacoes"></div>
        </section>

        <section id="invest" class="tab-content">
            <div class="viz-card">
                <canvas id="chartBarras" style="max-height: 220px;"></canvas>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="showTab('dash', this)"><i>📊</i>Dashboard</button>
        <button class="nav-btn" onclick="showTab('invest', this)"><i>📈</i>Investimentos</button>
        <button class="nav-btn" onclick="showTab('extrato', this)"><i>📜</i>Extrato</button>
        <button class="nav-btn" onclick="openModal()"><div class="fab">+</div>Lançar</button>
    </nav>

    <div id="modal" class="modal" onclick="if(event.target==this) closeModal()">
        <div class="modal-body">
            <input type="text" id="desc" class="input" placeholder="Descrição">
            <input type="number" id="valor" class="input" placeholder="Valor R$">
            <select id="tipo" class="input">
                <option value="fixo">Essencial (Fixo)</option>
                <option value="lazer">Lazer</option>
                <option value="investimento">Investimento</option>
                <option value="entrada">Receita (Entrada)</option>
            </select>
            <input type="date" id="data" class="input">
            <button class="btn-add" onclick="saveData()">SALVAR LANÇAMENTO</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        // Cole aqui sua configuração do Firebase anterior (initializeApp, auth, db)
        // Mantenha as funções carregarDados(), saveData(), etc.
        // Apenas certifique-se de que os IDs dos elementos batem com o novo HTML.
    </script>

    <script>
        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
