<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-theme">
    <div class="app-container">
        <header>
            <div class="top-bar">
                <button id="toggleTheme" class="icon-btn">🌓</button>
                <h1 class="logo">Finanças<span>PRO</span></h1>
                <button id="btnAuth" class="auth-btn">Login</button>
            </div>
            <div class="main-balance">
                <span>Saldo Disponível</span>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
        </header>

        <main>
            <section class="budget-dashboard">
                <div class="section-title">
                    <h3>Orçamento Projetado</h3>
                    <span class="badge">Regra 50-30-20</span>
                </div>

                <div class="budget-grid">
                    <div class="b-card fixed">
                        <div class="b-info">
                            <label>Essencial (50%)</label>
                            <b id="txt-fixo">R$ 0</b>
                        </div>
                        <div class="p-bar"><div id="bar-fixo" class="fill"></div></div>
                    </div>

                    <div class="b-card leisure">
                        <div class="b-info">
                            <label>Lazer (30%)</label>
                            <b id="txt-lazer">R$ 0</b>
                        </div>
                        <div class="p-bar"><div id="bar-lazer" class="fill"></div></div>
                    </div>

                    <div class="b-card invest">
                        <div class="b-info">
                            <label>Investir (20%)</label>
                            <b id="txt-invest">R$ 0</b>
                        </div>
                        <div class="p-bar"><div id="bar-invest" class="fill"></div></div>
                    </div>
                </div>
            </section>

            <div class="list-controls">
                <select id="filtroMes">
                    <option value="janeiro">Janeiro</option>
                    <option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option>
                    <option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option>
                    <option value="junho">Junho</option>
                    <option value="julho">Julho</option>
                    <option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option>
                    <option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option>
                    <option value="dezembro">Dezembro</option>
                </select>
            </div>

            <ul id="lista" class="transaction-list"></ul>
        </main>

        <button id="abrirModal" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-card">
                <h3>Novo Registro</h3>
                <div class="input-group">
                    <input type="text" id="desc" placeholder="Ex: Aluguel, Salário...">
                    <input type="number" id="valor" placeholder="R$ 0,00">
                    <select id="tipo">
                        <option value="entrada">📈 Receita (Entrada)</option>
                        <option value="fixo">🏠 Gasto Fixo (50%)</option>
                        <option value="lazer">🍹 Lazer/Variável (30%)</option>
                        <option value="investimento">💰 Investimento (20%)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button id="btnSalvar" class="save-btn">Confirmar</button>
                    <button id="btnFechar" class="cancel-btn">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MANTENDO SUAS CONFIGURAÇÕES ORIGINAIS DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;
        const provider = new GoogleAuthProvider();

        window.loginGoogle = () => signInWithPopup(window.auth, provider).then(() => location.reload());

        onAuthStateChanged(window.auth, (user) => {
            const btn = document.getElementById('btnAuth');
            if (user) {
                btn.innerText = "Sair";
                btn.onclick = () => window.auth.signOut().then(() => location.reload());
                if(window.carregarDados) window.carregarDados();
            } else {
                btn.innerText = "Login";
                btn.onclick = window.loginGoogle;
            }
        });
    </script>
</body>
</html>
