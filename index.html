<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <link rel="manifest" href="manifest.json">
    <title>FinançasPRO MVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <div class="app-wrapper">
        <header class="main-header">
            <div class="header-top">
                <span class="brand">Finanças<span>PRO</span></span>
                <button id="btnAuth" class="login-pill">Entrar</button>
            </div>
            <div class="balance-card">
                <label>Saldo Disponível</label>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="card-section">
                <h4 class="section-title">Composição de Gastos</h4>
                <div class="chart-container">
                    <canvas id="graficoPizza"></canvas>
                </div>
            </div>
            <div class="card-section">
                <h4 class="section-title">Receitas vs Despesas</h4>
                <div class="chart-container">
                    <canvas id="graficoBarrasGeral"></canvas>
                </div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div class="filter-row">
                <select id="filtroMes" class="corporate-select">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
                </select>
            </div>
            <ul id="lista" class="entry-list"></ul>
        </section>

        <section id="aba-metas" class="tab-content">
            <div class="bi-dashboard">
                <div class="chart-item">
                    <div class="chart-labels"><span>Essencial (50%)</span><b id="txt-fixo">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-fixo" class="bar-fill green"></div></div>
                </div>
                <div class="chart-item">
                    <div class="chart-labels"><span>Lazer (30%)</span><b id="txt-lazer">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-lazer" class="bar-fill orange"></div></div>
                </div>
                <div class="chart-item">
                    <div class="chart-labels"><span>Investimento (20%)</span><b id="txt-invest">R$ 0</b></div>
                    <div class="progress-track"><div id="bar-invest" class="bar-fill blue"></div></div>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <button onclick="switchTab('aba-dashboard')" class="nav-item active">📊 <span>Dash</span></button>
            <button onclick="switchTab('aba-extrato')" class="nav-item">📜 <span>Extrato</span></button>
            <button onclick="switchTab('aba-metas')" class="nav-item">🎯 <span>Metas</span></button>
        </nav>

        <button id="abrirModal" class="fab-add">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-box">
                <h4>Nova Transação</h4>
                <div class="form-group">
                    <input type="text" id="desc" placeholder="Ex: Salário, Aluguel...">
                    <input type="number" id="valor" placeholder="R$ 0,00">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Investimento (20%)</option>
                    </select>
                </div>
                <button id="btnSalvar" class="btn-save">Salvar</button>
                <button id="btnFechar" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;
        const provider = new GoogleAuthProvider();

        window.loginGoogle = () => signInWithPopup(window.auth, provider);
        window.logout = () => signOut(window.auth).then(() => location.reload());

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = "Sair";
                document.getElementById('btnAuth').onclick = window.logout;
                window.carregarDados();
            } else {
                document.getElementById('btnAuth').innerText = "Entrar";
                document.getElementById('btnAuth').onclick = window.loginGoogle;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
