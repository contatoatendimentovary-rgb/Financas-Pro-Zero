<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Oficial Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #F3F4F6; --card: #FAFAFA; --accent: #2563EB; --text: #1E293B;
            --subtext: #64748B; --green: #10B981; --red: #EF4444; --border: #E2E8F0;
            --shadow: rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg: #0B0F1A; --card: #161B2C; --accent: #3B82F6; --text: #F8FAFC;
            --subtext: #94A3B8; --border: rgba(255, 255, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; transition: background 0.3s; overflow-x: hidden; }

        /* HEADER E NAVEGAÇÃO */
        .header { padding: 45px 24px 25px; background: var(--card); border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; box-shadow: 0 10px 30px var(--shadow); position: relative; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .theme-btn { background: var(--bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
        .user-pill { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }

        .month-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
        .m-btn { padding: 10px 22px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .m-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .hero { text-align: center; margin: 25px 0; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; }

        /* GRID E EXTRATO */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; margin-top: -10px; position: relative; z-index: 10; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 12px var(--shadow); }
        .stat-card span { font-size: 0.65rem; color: var(--subtext); font-weight: 800; display: block; margin-bottom: 4px; }

        .t-item { background: var(--card); padding: 18px; border-radius: 22px; margin: 0 24px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px var(--shadow); }
        .t-info { display: flex; flex-direction: column; gap: 4px; }
        .t-date { font-size: 0.6rem; font-weight: 800; color: var(--accent); background: rgba(37, 99, 235, 0.1); padding: 3px 8px; border-radius: 6px; width: fit-content; }
        .t-info b { font-size: 0.95rem; margin-right: 5px; }
        .t-info small { color: var(--subtext); font-weight: 700; background: var(--bg); padding: 2px 6px; border-radius: 4px; margin-left: 4px; }

        .btn-del { color: var(--red); background: rgba(239, 68, 68, 0.08); border: none; width: 42px; height: 42px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* IA PANEL */
        .ai-fab { position: fixed; bottom: 110px; right: 24px; width: 62px; height: 62px; border-radius: 22px; background: var(--accent); color: white; border: none; font-size: 26px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 500; cursor: pointer; }
        .ai-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-head { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; }
        .m-ai { background: var(--card); border: 1px solid var(--border); }
        .m-user { background: var(--accent); color: white; align-self: flex-end; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 25px; z-index: 1000; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab span { font-size: 1.6rem; margin-bottom: 4px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 3000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; }
        input, select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 15px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 600; outline: none; }
        .btn-go { width: 100%; padding: 20px; border-radius: 15px; background: var(--accent); color: white; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ai-panel" class="ai-panel">
        <div class="ai-head"><b>✨ IA INTELIGENTE</b> <button onclick="closeAI()" style="border:none;background:none;font-size:2rem;color:var(--text);">&times;</button></div>
        <div class="chat-view" id="chat-box"><div class="msg m-ai">Fala Henrique! Mande seus gastos ou ganhos aqui. Ex: "Gastei 50 no mercado" ou "Recebi meu salário de 3000".</div></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card); border-top: 1px solid var(--border);">
            <input type="text" id="ai-in" placeholder="Diga o que aconteceu...">
            <button onclick="askIA()" style="background:var(--accent); color:white; border:none; padding:0 25px; border-radius:15px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b class="logo">FINAN PRO</b> 
            <div class="header-actions">
                <button class="theme-btn" onclick="toggleTheme()" id="t-icon">☀️</button>
                <button id="user-btn" class="user-pill" onclick="login()">ENTRAR</button>
            </div>
        </div>
        <div class="month-scroll" id="m-list"></div>
        <div class="hero"><small id="m-label">SALDO TOTAL</small><h1 id="v-bal">R$ 0,00</h1></div>
    </header>

    <div class="grid">
        <div class="stat-card"><span>RECEBIDO</span><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-card"><span>GASTO</span><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <main id="v-dash">
        <div style="margin:20px 24px; padding:25px; background:var(--card); border-radius:30px; border:1px solid var(--border);">
            <canvas id="pChart"></canvas>
        </div>
    </main>

    <main id="v-list" style="display:none; padding-top:20px;">
        <div id="list-cont"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="navbar">
        <button class="nav-tab active" onclick="tab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-tab" onclick="openAdd()"><span>➕</span>ADD</button>
        <button class="nav-tab" onclick="tab('list', this)"><span>📜</span>LISTA</button>
    </nav>

    <div id="m-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="margin-bottom:20px; text-align:center;">Lançamento Manual</h3>
            <input type="text" id="in-desc" placeholder="Ex: Aluguel">
            <input type="number" id="in-val" placeholder="R$ 0,00">
            <select id="in-tipo">
                <option value="fixo">🏠 Fixo</option>
                <option value="lazer">🍿 Lazer</option>
                <option value="investimento">💰 Reserva</option>
                <option value="entrada">💵 Receita</option>
            </select>
            <input type="date" id="in-date">
            <button class="btn-go" onclick="save()">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const GROQAPY = "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";
        const fbConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null;

        function toggleTheme() {
            const doc = document.documentElement;
            const target = doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            doc.setAttribute('data-theme', target);
            document.getElementById('t-icon').innerText = target === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('finTheme', target);
            sync();
        }

        function init() {
            const saved = localStorage.getItem('finTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('t-icon').innerText = saved === 'dark' ? '☀️' : '🌙';

            const list = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-btn ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); mesAtivo = m; sync();
                };
                list.appendChild(b);
            });
        }

        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }
        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        
        function tab(v, b) {
            document.querySelectorAll('main').forEach(m => m.style.display='none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('v-'+v).style.display='block';
            b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            document.getElementById('m-label').innerText = `GESTÃO - ${mesAtivo.toUpperCase()}`;
            
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let sin=0, sf=0, sl=0, si=0, html="";
                if(doc.exists) {
                    const trans = doc.data().transacoes || [];
                    [...trans].reverse().forEach((t, idx) => {
                        const v = parseFloat(t.valor);
                        const d = t.data ? t.data.split('-').reverse().slice(0,2).join('/') : '--/--';
                        if(t.tipo==='entrada') sin+=v; else { if(t.tipo==='fixo') sf+=v; else if(t.tipo==='lazer') sl+=v; else si+=v; }
                        html += `<div class="t-item"><div class="t-info"><span class="t-date">${d}</span><b>${t.descricao}</b><small>${t.tipo}</small></div>
                                 <div style="display:flex;align-items:center;gap:15px;"><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                                 <button class="btn-del" onclick="delTrans(${trans.length - 1 - idx})">🗑️</button></div></div>`;
                    });
                }
                const bal = sin-(sf+sl+si);
                document.getElementById('v-bal').innerText = bal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ "+sin.toFixed(2);
                document.getElementById('v-out').innerText = "R$ "+(sf+sl+si).toFixed(2);
                document.getElementById('list-cont').innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:20px;'>Vazio.</p>";
                render(sf, sl, si, sin);
            });
        }

        async function save() {
            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value, dt = document.getElementById('in-date').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: dt });
            await ref.set({ transacoes: lista });
            closeAdd();
        }

        async function delTrans(index) {
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.data().transacoes;
            lista.splice(index, 1);
            await ref.set({ transacoes: lista });
        }

        function render(f, l, i, s) {
            const ctx = document.getElementById('pChart').getContext('2d');
            const cardC = getComputedStyle(document.documentElement).getPropertyValue('--card').trim();
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Reserva', 'Livre'],
                    datasets: [{ data: [f||0.1, l||0.1, i||0.1, (s-(f+l+i))||0.1], backgroundColor: ['#EF4444', '#F59E0B', '#10B981', '#3B82F6'], borderWidth: 5, borderColor: cardC }]
                },
                options: { cutout: '78%', plugins: { legend: { display: false } } }
            });
        }

        async function askIA() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const txt = inp.value; box.innerHTML += `<div class="msg m-user">${txt}</div>`;
            inp.value = "";
            try {
                // PROMPT ULTRA REVISADO PARA NÃO ERRAR ENTRADA/SAÍDA
                const prompt = `Analise: "${txt}". 
                REGRAS CRÍTICAS:
                1. Se o usuário diz "Gastei", "Paguei", "Comprei", "Pix enviado" -> tipo é obrigatoriamente "lazer" ou "fixo".
                2. Se o usuário diz "Ganhei", "Recebi", "Salário", "Bônus", "Pix recebido" -> tipo é "entrada".
                3. Retorne JSON: {"desc":"(Emoji) NomeLimpo","valor":0,"tipo":"fixo/lazer/investimento/entrada"}.
                Emojis Sugeridos: Mercado🛒, Combustível⛽, Comida🍽️, Salário💰, Farmácia💊.`;
                
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':`Bearer ${GROQAPY}`,'Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:prompt}], response_format:{"type":"json_object"}})
                });
                const r = JSON.parse((await res.json()).choices[0].message.content);
                if(r.valor) {
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                    const snap = await ref.get();
                    let lista = snap.exists ? snap.data().transacoes : [];
                    lista.push({ descricao: r.desc, valor: r.valor, tipo: r.tipo, data: new Date().toISOString().split('T')[0] });
                    await ref.set({ transacoes: lista });
                    box.innerHTML += `<div class="msg m-ai">✅ Entendi! Lancei <b>${r.desc}</b> no valor de R$ ${r.valor} como ${r.tipo}.</div>`;
                } else { box.innerHTML += `<div class="msg m-ai">${r.msg}</div>`; }
            } catch(e) { box.innerHTML += `<div class="msg m-ai">Houve um erro técnico. Tente novamente!</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        init();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-btn').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
