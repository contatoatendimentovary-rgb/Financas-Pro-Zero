<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO // CYBER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-theme">
    <div class="glitch-overlay"></div>
    
    <div class="app-container">
        <header class="neon-header">
            <div class="top-bar">
                <div class="status-blink">ACTIVE // SYSTEM</div>
                <h1 class="logo">FPRO::<span>CYBER</span></h1>
                <button id="btnAuth" class="auth-btn_neon">LOG_IN</button>
            </div>
            
            <div class="balance-pod">
                <div class="pod-label">TOTAL_LIQUIDITY</div>
                <h2 id="saldo" class="neon-text_green">$$ 0.00</h2>
                <div class="pod-scan"></div>
            </div>
        </header>

        <main>
            <section class="cyber-dashboard">
                <div class="dash-title">
                    <h3>ORÇAMENTO_PROJETADO</h3>
                    <div class="dash-protocol">50.30.20 // PROTOCOL</div>
                </div>

                <div class="data-grids">
                    <div class="d-card essential_tech">
                        <div class="d-info">
                            <label>ESSENCIAL [50%]</label>
                            <b id="txt-fixo" class="neon-text_green">0 / 0</b>
                        </div>
                        <div class="energy-bar"><div id="bar-fixo" class="energy-fill_green"></div></div>
                    </div>

                    <div class="d-card leisure_tech">
                        <div class="d-info">
                            <label>LAZER [30%]</label>
                            <b id="txt-lazer" class="neon-text_orange">0 / 0</b>
                        </div>
                        <div class="energy-bar"><div id="bar-lazer" class="energy-fill_orange"></div></div>
                    </div>

                    <div class="d-card invest_tech">
                        <div class="d-info">
                            <label>INVESTIR [20%]</label>
                            <b id="txt-invest" class="neon-text_blue">0 / 0</b>
                        </div>
                        <div class="energy-bar"><div id="bar-invest" class="energy-fill_blue"></div></div>
                    </div>
                </div>
            </section>

            <div class="list-controls_cyber">
                <select id="filtroMes">
                    <option value="janeiro">JANEIRO</option>
                    <option value="fevereiro">FEVEREIRO</option>
                    <option value="março">MARÇO</option>
                    <option value="abril" selected>ABRIL</option>
                    <option value="maio">MAIO</option>
                    <option value="junho">JUNHO</option>
                    <option value="julho">JULHO</option>
                    <option value="agosto">AGOSTO</option>
                    <option value="setembro">SETEMBRO</option>
                    <option value="outubro">OUTUBRO</option>
                    <option value="novembro">NOVEMBRO</option>
                    <option value="dezembro">DEZEMBRO</option>
                </select>
                <div class="select-glow"></div>
            </div>

            <ul id="lista" class="cyber-list">
                </ul>
        </main>

        <button id="abrirModal" class="fab_neon">+</button>

        <div id="modal" class="modal-overlay_cyber">
            <div class="modal-card_cyber">
                <h3>// NOVO_REGISTRO</h3>
                <div class="input-scanner">
                    <input type="text" id="desc" placeholder="> DESCR_">
                    <input type="number" id="valor" placeholder="> R$_VAL_">
                    <select id="tipo">
                        <option value="entrada">:: RECEITA_IN_</option>
                        <option value="fixo">:: GASTO_FIXO_50_</option>
                        <option value="lazer">:: LAZER_VAR_30_</option>
                        <option value="investimento">:: INVEST_20_</option>
                    </select>
                </div>
                <div class="modal-footer_cyber">
                    <button id="btnSalvar" class="save-btn_neon">CONFIRM // EXEC</button>
                    <button id="btnFechar" class="cancel-btn_neon">ABORT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    </body>
</html>
