<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B0F1A">
    <link rel="manifest" href="data:application/manifest+json,{'name':'Finan Pro','short_name':'FinanPro','start_url':'/','display':'standalone','background_color':'#0B0F1A','theme_color':'#3B82F6','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/2488/2488749.png','sizes':'512x512','type':'image/png'}]}">
    
    <title>Finan Pro | Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #F3F4F6; --card: #FAFAFA; --accent: #2563EB; --text: #1E293B;
            --subtext: #64748B; --green: #10B981; --red: #EF4444; --border: #E2E8F0;
        }
        [data-theme="dark"] {
            --bg: #0B0F1A; --card: #161B2C; --accent: #3B82F6; --text: #F8FAFC;
            --subtext: #94A3B8; --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        .header { padding: 50px 24px 30px; background: var(--card); border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .month-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .m-btn { padding: 12px 24px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); color: var(--subtext); font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .m-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }

        .hero { text-align: center; margin: 30px 0; }
        .hero h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 24px; margin-top: -20px; position: relative; z-index: 110; }
        .stat-card { background: var(--card); padding: 22px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .stat-card b { font-size: 1.1rem; display: block; margin-top: 5px; }

        .t-item { background: var(--card); padding: 20px; border-radius: 24px; margin: 0 24px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-info b { font-size: 1rem; display: block; margin-bottom: 2px; }
        .t-info small { color: var(--subtext); font-weight: 800; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; }

        .btn-del { color: var(--red); background: rgba(239, 68, 68, 0.1); border: none; width: 45px; height: 45px; border-radius: 15px; font-size: 1.2rem; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 95px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 20px; z-index: 1000; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab span { font-size: 1.8rem; margin-bottom: 4px; }

        .ai-fab { position: fixed; bottom: 115px; right: 24px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); color: white; border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); z-index: 900; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 5000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 40px 40px 0 0; padding: 40px 30px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="ai-panel" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:6000; flex-direction:column;">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--card);">
            <b>✨ FINAN PRO IA</b> <button onclick="closeAI()" style="border:none;background:none;font-size:2.5rem;color:var(--text);">&times;</button>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:25px; display:flex; flex-direction:column; gap:15px;"></div>
        <div style="padding:25px; display:flex; gap:12px; background:var(--card); border-top:1px solid var(--border);">
            <input type="text" id="ai-in" placeholder="Ex: Gastei 100 no mercado" style="width:100%; padding:18px; border-radius:15px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
            <button onclick="askIA()" style="background:var(--accent); color:white; border:none; padding:0 30px; border-radius:15px; font-weight:900;">ENVIAR</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1.4rem; letter-spacing: -1px; color: var(--accent);">FINAN PRO</b>
            <div style="display:flex; gap:10px;">
                <button class="theme-btn" style="background:var(--bg); border:1px solid var(--border); width:42px; height:42px; border-radius:12px; color:var(--text);" onclick="toggleTheme()">🌓</button>
                <button id="user-btn" onclick="login()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:12px; font-weight:800; font-size:0.75rem;">LOGIN</button>
            </div>
        </div>
        <div class="month-scroll" id="m-list"></div>
        <div class="hero"><small id="m-label" style="font-weight:800; opacity:0.6; text-transform:uppercase;">SALDO DISPONÍVEL</small><h1 id="v-bal">R$ 0,00</h1></div>
    </header>

    <div class="grid">
        <div class="stat-card"><span>RECEITAS</span><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-card"><span>DESPESAS</span><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <main id="v-dash" style="padding-top:30px;">
        <div style="margin:0 24px; padding:30px; background:var(--card); border-radius:35px; border:1px solid var(--border);">
            <canvas id="pChart"></canvas>
        </div>
    </main>

    <main id="v-list" style="display:none; padding-top:20px;">
        <div id="list-cont"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="navbar">
        <button class="nav-tab active" onclick="tab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-tab" onclick="openAdd()"><span>➕</span>NOVO</button>
        <button class="nav-tab" onclick="tab('list', this)"><span>📜</span>EXTRATO</button>
    </nav>

    <div id="m-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="text-align:center; margin-bottom:25px;">Novo Lançamento</h3>
            <input type="text" id="in-desc" placeholder="O que é?">
            <input type="number" id="in-val" placeholder="R$ 0,00">
            <select id="in-tipo">
                <option value="fixo">🏠 Gasto Fixo</option>
                <option value="lazer">🍿 Lazer / Variável</option>
                <option value="investimento">💰 Reserva</option>
                <option value="entrada">💵 Receita / Pix</option>
            </select>
            <input type="date" id="in-date" style="margin-bottom:20px;">
            <button style="width:100%; padding:22px; border-radius:18px; background:var(--accent); color:white; border:none; font-weight:900; font-size:1.1rem;" onclick="save()">SALVAR AGORA</button>
        </div>
    </div>

    <script>
        // SERVICE WORKER INLINE PARA PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", (e) => {});'));
        }

        const GROQAPY = "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";
        const fbConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null;

        function init() {
            const list = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-btn ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active'); mesAtivo = m; sync();
                };
                list.appendChild(b);
                if(m === mesAtivo) b.scrollIntoView({ inline: 'center' });
            });
            sync();
        }

        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }
        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        function tab(v, b) {
            document.querySelectorAll('main').forEach(m => m.style.display='none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('v-'+v).style.display='block'; b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            document.getElementById('m-label').innerText = `GESTÃO - ${mesAtivo.toUpperCase()}`;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let sin=0, sf=0, sl=0, si=0, html="";
                if(doc.exists) {
                    const trans = doc.data().transacoes || [];
                    [...trans].reverse().forEach((t, idx) => {
                        const v = parseFloat(t.valor);
                        if(t.tipo==='entrada') sin+=v; else { if(t.tipo==='fixo') sf+=v; else if(t.tipo==='lazer') sl+=v; else si+=v; }
                        html += `<div class="t-item"><div class="t-info"><b>${t.descricao}</b><small>${t.tipo}</small></div>
                                 <div style="display:flex;align-items:center;gap:15px;"><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                                 <button class="btn-del" onclick="delTrans(${trans.length - 1 - idx})">🗑️</button></div></div>`;
                    });
                }
                document.getElementById('v-bal').innerText = (sin-(sf+sl+si)).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ "+sin.toFixed(2);
                document.getElementById('v-out').innerText = "R$ "+(sf+sl+si).toFixed(2);
                document.getElementById('list-cont').innerHTML = html || "<p style='text-align:center; padding:40px; opacity:0.5;'>Nenhum dado este mês.</p>";
                render(sf, sl, si, sin);
            });
        }

        async function save() {
            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: document.getElementById('in-date').value });
            await ref.set({ transacoes: lista }); closeAdd();
        }

        async function delTrans(index) {
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.data().transacoes; lista.splice(index, 1);
            await ref.set({ transacoes: lista });
        }

        function render(f, l, i, s) {
            const ctx = document.getElementById('pChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Reserva', 'Livre'],
                    datasets: [{ data: [f||0.1, l||0.1, i||0.1, (s-(f+l+i))||0.1], backgroundColor: ['#EF4444', '#F59E0B', '#10B981', '#3B82F6'], borderWidth: 5, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--card') }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        async function askIA() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const userTxt = inp.value;
            box.innerHTML += `<div style="background:var(--accent); color:white; padding:18px; border-radius:20px; align-self:flex-end; max-width:85%;">${userTxt}</div>`;
            inp.value = "";
            try {
                // PROMPT HÍBRIDO ULTRA-RÍGIDO
                const prompt = `Analise a frase: "${userTxt}". 
                AÇÃO OBRIGATÓRIA: Se houver palavras como "gastei", "paguei", "mercado", "lanche", "pix enviado", o "tipo" deve ser "lazer" ou "fixo". NUNCA use "entrada" para gastos.
                Retorne apenas JSON: {"desc":"(Emoji) NomeLimpo","valor":100,"tipo":"entrada/fixo/lazer/investimento"}`;
                
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':`Bearer ${GROQAPY}`,'Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:prompt}], response_format:{"type":"json_object"}})
                });
                const r = JSON.parse((await res.json()).choices[0].message.content);
                
                if(r.valor) {
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                    const snap = await ref.get();
                    let lista = snap.exists ? snap.data().transacoes : [];
                    lista.push({ descricao: r.desc, valor: r.valor, tipo: r.tipo, data: new Date().toISOString().split('T')[0] });
                    await ref.set({ transacoes: lista });
                    box.innerHTML += `<div style="background:var(--card); border:1px solid var(--border); padding:18px; border-radius:20px; max-width:85%;">🚀 <b>${r.desc}</b> lançado com sucesso!</div>`;
                }
            } catch(e) { box.innerHTML += `<div>Erro técnico. Verifique a internet.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        init();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-btn').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
