<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #00e676;
            --secondary: #2979ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Estilo App */
        header {
            background: var(--card);
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            cursor: pointer;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* Botão de Login Google */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        /* Utilitários */
        .hidden { display: none !important; }
        .balance { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 10px 0; }
        
        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
        }

        .btn-main {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 14px rgba(0, 230, 118, 0.3);
        }
    </style>
</head>
<body>

<header>
    <div id="auth-status">
        <span class="material-icons" id="login-icon">account_circle</span>
    </div>
    <div style="text-align: center;">
        <strong style="letter-spacing: 1px;">FINAN PRO</strong>
    </div>
    <button onclick="toggleTheme()" style="background:none; border:none; color:white;">
        <span class="material-icons">dark_mode</span>
    </button>
</header>

<div class="container">
    <div id="login-screen" class="card">
        <h2 style="text-align:center">Bem-vindo</h2>
        <p style="text-align:center; color:#888;">Acesse sua conta para sincronizar seus dados financeiros.</p>
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Entrar com Google
        </button>
    </div>

    <div id="main-app" class="hidden">
        <div class="card" style="text-align: center;">
            <small style="color: #888; text-transform: uppercase;">Saldo Disponível</small>
            <div class="balance" id="display-saldo">R$ 0,00</div>
        </div>

        <div class="card">
            <h3>Lançamento Rápido</h3>
            <input type="text" id="desc" placeholder="O que você comprou/vendeu?">
            <input type="number" id="valor" placeholder="Valor (0,00)" step="0.01">
            <select id="cat">
                <option value="50">Essencial (50%)</option>
                <option value="30">Desejos (30%)</option>
                <option value="20">Investimento (20%)</option>
            </select>
            <button class="btn-main" onclick="salvarOperacao()">Adicionar</button>
        </div>
    </div>
</div>

<script>
    // --- SUA CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_DOMINIO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID_SENDER",
        appId: "SEU_APP_ID"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- LÓGICA DE AUTH REFEITA ---
    
    // 1. Função de Login com Redirecionamento (Melhor para PWA/Mobile)
    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Usar signInWithPopup para desktop ou signInWithRedirect para mobile
        auth.signInWithPopup(provider).catch(err => alert("Erro ao logar: " + err.message));
    }

    // 2. Observador de Estado (O Coração do App)
    auth.onAuthStateChanged(user => {
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const authStatus = document.getElementById('auth-status');

        if (user) {
            // Usuário Logado
            loginScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            authStatus.innerHTML = `<img src="${user.photoURL}" class="user-avatar" onclick="logout()">`;
            
            // Iniciar escuta de dados em tempo real
            syncDados(user.uid);
        } else {
            // Usuário Deslogado
            loginScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
            authStatus.innerHTML = `<span class="material-icons">account_circle</span>`;
        }
    });

    function logout() {
        if(confirm("Deseja sair da conta?")) auth.signOut();
    }

    // --- LÓGICA DE DADOS (FIRESTORE) ---

    function salvarOperacao() {
        const user = auth.currentUser;
        if (!user) return;

        const dados = {
            descricao: document.getElementById('desc').value,
            valor: parseFloat(document.getElementById('valor').value),
            categoria: document.getElementById('cat').value,
            data: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!dados.descricao || isNaN(dados.valor)) return alert("Preencha os campos corretamente");

        db.collection("users").doc(user.uid).collection("financas").add(dados)
            .then(() => {
                document.getElementById('desc').value = "";
                document.getElementById('valor').value = "";
            });
    }

    function syncDados(uid) {
        db.collection("users").doc(uid).collection("financas")
            .orderBy("data", "desc")
            .onSnapshot(snapshot => {
                let total = 0;
                snapshot.forEach(doc => {
                    total += doc.data().valor;
                });
                document.getElementById('display-saldo').innerText = 
                    total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            });
    }
</script>

</body>
</html>
