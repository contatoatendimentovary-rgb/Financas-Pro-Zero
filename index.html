<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/552/552791.png">

    <title>FinançasPRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* Cabeçalho e Meses */
        .header { padding: 50px 20px 25px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { background: var(--border); padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; color: var(--accent); border: 1px solid var(--accent); }

        .month-bar { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0; scrollbar-width: none; }
        .month-bar::-webkit-scrollbar { display: none; }
        .m-item { padding: 10px 20px; border-radius: 14px; background: transparent; color: var(--subtext); border: 1px solid var(--border); font-weight: 600; font-size: 0.85rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3); }

        /* Saldo Hero */
        .hero { text-align: center; padding: 30px 20px; }
        .hero span { font-size: 0.75rem; color: var(--subtext); font-weight: 700; letter-spacing: 1px; }
        .hero h1 { font-size: 2.8rem; font-weight: 800; margin-top: 5px; }

        /* Grid de Status */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
        .stat-box { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-box small { font-size: 0.65rem; font-weight: 800; color: var(--subtext); display: block; margin-bottom: 5px; }
        .stat-box b { font-size: 1.1rem; }

        /* Lista de Transações */
        .t-card { background: var(--card); padding: 18px; border-radius: 20px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-details b { display: block; font-size: 0.95rem; margin-bottom: 2px; }
        .t-details span { font-size: 0.65rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; }
        
        /* Floating IA Button */
        .ai-trigger { position: fixed; bottom: 110px; right: 20px; width: 60px; height: 60px; border-radius: 18px; background: var(--accent); color: #000; border: none; font-size: 24px; box-shadow: 0 8px 20px rgba(234, 179, 8, 0.4); z-index: 999; }

        /* Navbar Inferior */
        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 15px; z-index: 1000; }
        .nav-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 1.5rem; margin-bottom: 4px; }

        /* Modal Sheet */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 2px solid var(--accent); animation: slide 0.3s ease-out; }
        @keyframes slide { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        input, select { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-weight: 600; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; background: var(--accent); color: #000; border: none; font-weight: 800; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="ai-panel" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:3000; flex-direction:column;">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b>✨ INTELIGÊNCIA FINANPRO</b>
            <button onclick="closeAI()" style="background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-in" placeholder="Ex: Gastei 15 na padaria" style="margin-bottom:0;">
            <button onclick="askIA()" style="background:var(--accent); border:none; padding:0 20px; border-radius:12px; font-weight:800;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1.2rem; letter-spacing: -0.5px;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-area" onclick="login()" class="user-badge">ENTRAR</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div class="hero">
        <span>SALDO EM CONTA</span>
        <h1 id="v-total">R$ 0,00</h1>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><small>RECEBIDOS</small><b id="v-receitas" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-box"><small>GASTOS</small><b id="v-gastos" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <div id="view-dash" style="padding:30px 20px;">
        <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div id="view-list" style="display:none; padding-top:20px;">
        <div id="items-cont"></div>
    </div>

    <button class="ai-trigger" onclick="openAI()">✨</button>

    <nav class="nav-bot">
        <button class="nav-btn active" onclick="switchTab('dash', this)"><i>📊</i>Home</button>
        <button class="nav-btn" onclick="openAdd()"><i>➕</i>Novo</button>
        <button class="nav-btn" onclick="switchTab('list', this)"><i>📜</i>Lista</button>
    </nav>

    <div id="modal-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="margin-bottom:20px;">Novo Registro</h3>
            <input type="text" id="add-desc" placeholder="Descrição">
            <input type="number" id="add-val" placeholder="Valor R$">
            <select id="add-tipo">
                <option value="entrada">💵 Entrada / Pix</option>
                <option value="fixo">🏠 Gasto Fixo</option>
                <option value="lazer" selected>🍿 Gasto Variável</option>
            </select>
            <input type="date" id="add-date">
            <button class="btn-main" onclick="manualSave()">SALVAR</button>
        </div>
    </div>

    <script>
        // SERVICE WORKER PARA HABILITAR INSTALAÇÃO PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", (e) => {});'));
            });
        }

        const CONFIG = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };
        
        firebase.initializeApp(CONFIG);
        const auth = firebase.auth(), db = firebase.firestore();
        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesGlobal = MESES[new Date().getMonth()];
        let chartObj = null;

        function initApp() {
            const container = document.getElementById('month-list');
            MESES.forEach(m => {
                const btn = document.createElement('button');
                btn.className = `m-item ${m === mesGlobal ? 'active' : ''}`;
                btn.innerText = m;
                btn.onclick = () => {
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    btn.classList.add('active'); mesGlobal = m; updateData();
                };
                container.appendChild(btn);
                if(m === mesGlobal) btn.scrollIntoView({ inline: 'center' });
            });
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function updateData() {
            if(!auth.currentUser) return;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesGlobal.toLowerCase())
            .onSnapshot(doc => {
                let rec=0, gas=0, fix=0, laz=0, inv=0, html="";
                if(doc.exists) {
                    const dados = doc.data().transacoes || [];
                    [...dados].reverse().forEach((t, i) => {
                        const val = parseFloat(t.valor);
                        if(t.tipo === 'entrada') rec += val;
                        else { 
                            gas += val;
                            if(t.tipo === 'fixo') fix += val; else if(t.tipo === 'lazer') laz += val; else inv += val;
                        }
                        html += `<div class="t-card"><div class="t-details"><b>${t.descricao}</b><span>${t.tipo}</span></div>
                                 <b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${val.toFixed(2)}</b></div>`;
                    });
                }
                document.getElementById('v-total').innerText = (rec - gas).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                document.getElementById('v-receitas').innerText = "R$ " + rec.toFixed(2);
                document.getElementById('v-gastos').innerText = "R$ " + gas.toFixed(2);
                document.getElementById('items-cont').innerHTML = html || "<p style='text-align:center; opacity:0.5; margin-top:50px;'>Sem registros.</p>";
                drawChart(fix, laz, inv, rec-gas);
            });
        }

        function drawChart(f, l, i, rem) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Variável', 'Reserva', 'Livre'],
                    datasets: [{
                        data: [f||1, l||1, i||1, rem > 0 ? rem : 1],
                        backgroundColor: ['#EF4444', '#EAB308', '#22C55E', '#3B82F6'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        async function askIA() {
            const input = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            if(!input.value) return;
            const msg = input.value;
            box.innerHTML += `<div style="background:var(--accent); color:#000; padding:12px; border-radius:15px; align-self:flex-end;">${msg}</div>`;
            input.value = "";

            try {
                const prompt = `Analise: "${msg}". 
                REGRA ABSOLUTA: Se a frase indica gasto (paguei, gastei, comprei, mercado), o tipo DEVE ser "lazer" ou "fixo". NUNCA use "entrada" para gastos. 
                Retorne apenas JSON: {"desc":"(Emoji) Nome","valor":00.00,"tipo":"entrada/fixo/lazer"}`;
                
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:prompt}], response_format:{"type":"json_object"}})
                });
                
                let r = JSON.parse((await res.json()).choices[0].message.content);

                // CAMADA DE SEGURANÇA LOCAL (Se a IA falhar, o código corrige)
                const despesaKeywords = ["gastei", "paguei", "mercado", "comi", "lanche", "padaria", "comprado"];
                if(despesaKeywords.some(k => msg.toLowerCase().includes(k)) && r.tipo === "entrada") {
                    r.tipo = "lazer";
                }

                if(r.valor) {
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesGlobal.toLowerCase());
                    const snap = await ref.get();
                    let lista = snap.exists ? snap.data().transacoes : [];
                    lista.push({ ...r, data: new Date().toISOString().split('T')[0] });
                    await ref.set({ transacoes: lista });
                    box.innerHTML += `<div style="background:var(--border); padding:12px; border-radius:15px;">✅ Lançado: ${r.desc} (${r.tipo})</div>`;
                }
            } catch(e) { box.innerHTML += `<div>Erro na conexão.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        function switchTab(t, b) {
            document.getElementById('view-dash').style.display = t === 'dash' ? 'block' : 'none';
            document.getElementById('view-list').style.display = t === 'list' ? 'block' : 'none';
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
        }

        function openAdd() { document.getElementById('add-date').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-add').style.display='flex'; }
        function closeAdd() { document.getElementById('modal-add').style.display='none'; }
        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }

        initApp();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-area').innerText = u.displayName.split(' ')[0]; updateData(); } });
    </script>
</body>
</html>
