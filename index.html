<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #00e676;
            --essential: #f44336;
            --lifestyle: #ffeb3b;
            --invest: #2979ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: var(--card);
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .balance { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 5px 0; }
        
        .progress-container {
            height: 10px; display: flex; border-radius: 5px;
            overflow: hidden; background: #333; margin: 15px 0;
        }
        .progress-bar { height: 100%; transition: width 0.5s ease; }

        input, select {
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px;
            border: 1px solid #333; background: #222; color: white; box-sizing: border-box;
        }

        .btn-main {
            background: var(--accent); color: black; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem;
            cursor: pointer; margin-top: 10px;
        }

        .chat-box {
            height: 180px; overflow-y: auto; background: #000;
            padding: 10px; border-radius: 12px; border: 1px solid #222;
            font-size: 0.9rem; margin-bottom: 10px;
        }
        .msg-user { color: var(--accent); margin-bottom: 8px; }
        .msg-ai { color: #ccc; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        .hidden { display: none !important; }
        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">Carregando Finan Pro...</div>

<header>
    <div id="auth-status"><span class="material-icons">account_circle</span></div>
    <strong>FINAN PRO</strong>
    <button onclick="logout()" style="background:none; border:none; color:white;">
        <span class="material-icons">logout</span>
    </button>
</header>

<div class="container">
    <div id="login-screen" class="card hidden">
        <h2 style="text-align:center">Acesso</h2>
        <p style="text-align:center; color: #888;">Entre com sua conta Google para gerenciar suas finanças.</p>
        <button class="btn-main" style="background:white" onclick="loginGoogle()">
            LOGAR COM GOOGLE
        </button>
    </div>

    <div id="main-app" class="hidden">
        <div class="card" style="text-align: center;">
            <small style="color: #888;">SALDO EM CONTA</small>
            <div class="balance" id="display-saldo">R$ 0,00</div>
            
            <div class="progress-container">
                <div id="b-ess" class="progress-bar" style="background: var(--essential);"></div>
                <div id="b-des" class="progress-bar" style="background: var(--lifestyle);"></div>
                <div id="b-inv" class="progress-bar" style="background: var(--invest);"></div>
            </div>
            <div style="display:flex; justify-content:space-around; font-size:0.7rem;">
                <span>🔴 Essencial</span><span>🟡 Lazer</span><span>🔵 Invest</span>
            </div>
        </div>

        <div class="card">
            <h3>Novo Lançamento</h3>
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor R$" step="0.01">
            <select id="cat">
                <option value="50">Essencial (50%)</option>
                <option value="30">Desejos (30%)</option>
                <option value="20">Investimento (20%)</option>
            </select>
            <button class="btn-main" onclick="salvarOperacao()">ADICIONAR</button>
        </div>

        <div class="card">
            <h3>Consultor IA</h3>
            <div id="chat-box" class="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ia-prompt" placeholder="Sua dúvida...">
                <button onclick="perguntarIA()" style="width:50px; background:var(--accent); border-radius:12px; border:none;">
                    <span class="material-icons" style="vertical-align:middle">send</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO FIREBASE (INSIRA SEUS DADOS AQUI) ---
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "ID_APP"
    };

    const GEMINI_KEY = "AQ.Ab8RN6I0HBcnj_r4GU5euHnkGszaF6janYmUoxfyF_lKvbQteg";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Configura a persistência para garantir que o login dure
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    // --- LÓGICA DE LOGIN (REVISADA) ---
    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Usamos Redirect em vez de Popup para evitar bloqueios em PWA/Mobile
        auth.signInWithRedirect(provider);
    }

    // Captura o resultado do redirect ao carregar a página
    auth.getRedirectResult().catch(error => {
        if(error.code !== "auth/redirect-cancelled-by-user") {
            alert("Erro na autenticação: " + error.message);
        }
    });

    auth.onAuthStateChanged(user => {
        document.getElementById('loader').classList.add('hidden');
        if (user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('auth-status').innerHTML = `<img src="${user.photoURL}" class="user-avatar">`;
            syncDados(user.uid);
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('auth-status').innerHTML = `<span class="material-icons">account_circle</span>`;
        }
    });

    function logout() {
        if(confirm("Deseja sair?")) auth.signOut();
    }

    // --- DADOS E IA (MESMA LÓGICA ROBUSTA) ---
    function salvarOperacao() {
        const user = auth.currentUser;
        const desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const cat = document.getElementById('cat').value;

        if(!desc || isNaN(valor)) return;

        db.collection("users").doc(user.uid).collection("financas").add({
            desc, valor, cat, data: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
        });
    }

    function syncDados(uid) {
        db.collection("users").doc(uid).collection("financas")
            .orderBy("data", "desc")
            .onSnapshot(snapshot => {
                let total = 0, e = 0, d = 0, i = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    total += data.valor;
                    if(data.cat === "50") e += data.valor;
                    if(data.cat === "30") d += data.valor;
                    if(data.cat === "20") i += data.valor;
                });

                document.getElementById('display-saldo').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                
                if(total !== 0) {
                    const absTotal = Math.abs(total);
                    document.getElementById('b-ess').style.width = (Math.abs(e)/absTotal*100) + "%";
                    document.getElementById('b-des').style.width = (Math.abs(d)/absTotal*100) + "%";
                    document.getElementById('b-inv').style.width = (Math.abs(i)/absTotal*100) + "%";
                }
            });
    }

    async function perguntarIA() {
        const prompt = document.getElementById('ia-prompt').value;
        const box = document.getElementById('chat-box');
        if(!prompt) return;

        box.innerHTML += `<div class="msg-user"><b>Você:</b> ${prompt}</div>`;
        document.getElementById('ia-prompt').value = "";

        const context = `Contexto: Usuário Henrique, Gestão Comercial/Trader. Saldo: ${document.getElementById('display-saldo').innerText}. Pergunta: ${prompt}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg-ai"><b>IA:</b> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (e) {
            box.innerHTML += `<div class="msg-ai">Erro na IA.</div>`;
        }
    }
</script>
</body>
</html>
