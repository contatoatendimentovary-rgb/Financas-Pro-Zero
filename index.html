<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #00e676;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }

        .hidden { display: none !important; }

        header {
            background: var(--card);
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .balance { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 5px 0; }
        
        .progress-container {
            height: 12px; display: flex; border-radius: 6px;
            overflow: hidden; background: #333; margin: 15px 0;
        }
        .bar { height: 100%; transition: width 0.8s ease; }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box;
        }

        .btn-main {
            background: var(--accent); color: #000; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer;
        }

        .chat-box {
            height: 220px; overflow-y: auto; background: #000;
            padding: 15px; border-radius: 12px; border: 1px solid #222;
            font-size: 0.95rem; margin-bottom: 12px;
        }
        .msg-user { color: var(--accent); margin-bottom: 10px; font-weight: bold; }
        .msg-ai { color: #ddd; margin-bottom: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="loader">
    <span class="material-icons" style="font-size: 50px; color: var(--accent); margin-bottom: 15px;">refresh</span>
    <strong id="loader-text">Sincronizando...</strong>
</div>

<header>
    <div id="auth-status"><span class="material-icons">account_circle</span></div>
    <strong>FINAN PRO</strong>
    <button onclick="logout()" style="background:none; border:none; color:white;"><span class="material-icons">logout</span></button>
</header>

<div class="container">
    <div id="login-screen" class="card" style="display: none; text-align: center;">
        <h2>Acesso Requerido</h2>
        <p style="color: #888; margin-bottom: 25px;">Olá Henrique, entre para gerenciar seus ativos.</p>
        <button id="login-click" onclick="loginGoogle()" class="btn-main" style="background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="card" style="text-align: center;">
            <small style="color: #888;">SALDO TOTAL</small>
            <div class="balance" id="display-saldo">R$ 0,00</div>
            <div class="progress-container">
                <div id="b-ess" class="bar" style="background: #ff5252; width: 0%;"></div>
                <div id="b-des" class="bar" style="background: #ffd740; width: 0%;"></div>
                <div id="b-inv" class="bar" style="background: #448aff; width: 0%;"></div>
            </div>
        </div>

        <div class="card">
            <h3>Lançamento</h3>
            <input type="text" id="desc" placeholder="Ex: Lucro Operação">
            <input type="number" id="valor" placeholder="Valor R$" step="0.01">
            <select id="cat">
                <option value="50">Essencial (50%)</option>
                <option value="30">Desejos (30%)</option>
                <option value="20">Investimento (20%)</option>
            </select>
            <button class="btn-main" onclick="salvarOperacao()">REGISTRAR</button>
        </div>

        <div class="card">
            <h3>Consultor IA</h3>
            <div id="chat-box" class="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="ia-prompt" placeholder="Como está minha gestão?">
                <button onclick="perguntarIA()" style="width:55px; background:var(--accent); border:none; border-radius:12px;"><span class="material-icons">send</span></button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO_ID",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const GEMINI_KEY = "AQ.Ab8RN6I0HBcnj_r4GU5euHnkGszaF6janYmUoxfyF_lKvbQteg";

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 1. Persistência e Recuperação de Login
    async function initAuth() {
        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        
        try {
            const result = await auth.getRedirectResult();
            if (result.user) console.log("Login via redirect concluído");
        } catch (error) {
            console.error("Erro no retorno do login:", error.message);
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('auth-status').innerHTML = `<img src="${user.photoURL}" class="user-avatar">`;
                syncDados(user.uid);
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });
    }

    function loginGoogle() {
        document.getElementById('login-click').innerText = "Carregando...";
        document.getElementById('login-click').disabled = true;
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function logout() { if(confirm("Sair?")) auth.signOut(); }

    function salvarOperacao() {
        const user = auth.currentUser;
        const desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const cat = document.getElementById('cat').value;

        if(!desc || isNaN(valor)) return;

        db.collection("users").doc(user.uid).collection("financas").add({
            desc, valor, cat, data: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
        });
    }

    function syncDados(uid) {
        db.collection("users").doc(uid).collection("financas")
            .orderBy("data", "desc")
            .onSnapshot(snapshot => {
                let total = 0, e = 0, d = 0, i = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    total += data.valor;
                    if(data.cat === "50") e += data.valor;
                    if(data.cat === "30") d += data.valor;
                    if(data.cat === "20") i += data.valor;
                });
                document.getElementById('display-saldo').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                if(total !== 0) {
                    const abs = Math.abs(total);
                    document.getElementById('b-ess').style.width = (Math.abs(e)/abs*100) + "%";
                    document.getElementById('b-des').style.width = (Math.abs(d)/abs*100) + "%";
                    document.getElementById('b-inv').style.width = (Math.abs(i)/abs*100) + "%";
                }
            });
    }

    async function perguntarIA() {
        const input = document.getElementById('ia-prompt');
        const box = document.getElementById('chat-box');
        if(!input.value) return;
        
        const q = input.value;
        box.innerHTML += `<div class="msg-user">Você: ${q}</div>`;
        input.value = "";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Atue como consultor comercial do Henrique. Saldo: ${document.getElementById('display-saldo').innerText}. Pergunta: ${q}` }] }] })
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg-ai"><b>IA:</b> ${data.candidates[0].content.parts[0].text}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg-ai">Erro na IA.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    initAuth();
</script>
</body>
</html>
