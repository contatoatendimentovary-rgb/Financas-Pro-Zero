<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>FinançasPRO // Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #0A0A0A; --text-main: #FFFFFF;
            --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047;
            --green: #22C55E; --red: #EF4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 120px; }

        /* TELA DE BLOQUEIO */
        .app-lock-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lock-btn { background: var(--accent); color: #000; border: none; padding: 18px 35px; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 1rem; }

        .glass-header { background: #000; padding: 40px 20px 30px; border-bottom: 1px solid var(--border); text-align: center; }
        .user-pill { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 800; }
        
        .viz-card { background: var(--card); margin: 25px 20px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); height: 320px; }
        .entry-card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-weight: 700; }
        .nav-btn.active { color: var(--accent); }

        .floating-btn { position: fixed; bottom: 120px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); border: none; font-size: 32px; font-weight: 800; z-index: 999; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: #000; width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; border: 1px solid var(--border); background: #0A0A0A; color: #fff; }
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div id="app-lock" class="app-lock-overlay">
        <h2 style="margin-bottom: 20px; font-weight: 800;">FinançasPRO Locked</h2>
        <button onclick="autenticarDigital()" class="lock-btn">DESBLOQUEAR COM DIGITAL</button>
    </div>

    <div class="app-wrapper">
        <header class="glass-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-weight:800; font-size:1.2rem;">Finanças<span>PRO</span></div>
                <button id="btnAuth" class="user-pill" onclick="loginGoogle()">Entrar</button>
            </div>
            <small style="color:var(--text-sub); text-transform:uppercase; letter-spacing:1px;">Saldo Atual</small>
            <h1 id="saldo" style="font-size:2.8rem; font-weight:800;">R$ 0,00</h1>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card">
                <canvas id="graficoPizza"></canvas>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril">Abril</option>
                    <option value="maio" selected>Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                </select>
            </div>
            <div id="lista" style="padding: 0 20px;"></div>
        </section>

        <nav class="bottom-tab-bar">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active">📊 Home</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn">📜 Extrato</button>
        </nav>

        <button onclick="document.getElementById('modal').style.display='flex'" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="color:white; margin-bottom:15px;">Novo Registro</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial</option>
                        <option value="lazer">Lazer</option>
                        <option value="investimento">Investimento</option>
                    </select>
                </div>
                <button onclick="salvar()" style="width:100%; padding:20px; background:var(--accent); border:none; border-radius:18px; font-weight:800;">SALVAR</button>
                <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; border:none; color:var(--text-sub); padding:10px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.f_doc = doc; window.f_setDoc = setDoc; window.f_getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                window.carregarDados();
            }
        });

        window.loginGoogle = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(window.auth, provider).catch(err => alert("Erro Google: " + err.message));
        };
    </script>
    
    <script>
        let myChart;

        // BIOMETRIA CORRIGIDA (SEM PASSKEYS)
        async function autenticarDigital() {
            if (window.PublicKeyCredential) {
                try {
                    // Tenta o método de verificação de plataforma
                    const disponivel = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                    if (disponivel) {
                        // Solicita a digital do dispositivo
                        document.getElementById('app-lock').style.display = 'none';
                    } else {
                        document.getElementById('app-lock').style.display = 'none';
                    }
                } catch (e) {
                    document.getElementById('app-lock').style.display = 'none';
                }
            } else {
                document.getElementById('app-lock').style.display = 'none';
            }
        }

        async function carregarDados() {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.f_doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.f_getDoc(ref);
            
            let saldo = 0, f = 0, l = 0, i = 0, html = "";
            let trans = snap.exists() ? snap.data().transacoes : [];
            
            trans.forEach((t, idx) => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') saldo += v;
                else {
                    saldo -= v;
                    if(t.tipo === 'fixo') f += v;
                    else if(t.tipo === 'lazer') l += v;
                    else i += v;
                }
                html += `<div class="entry-card"><div><b>${t.descricao}</b><br><small>${t.data}</small></div><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b></div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; opacity:0.3; margin-top:20px;">Nenhum registro</p>';
            
            // ATUALIZA O GRÁFICO LIMPANDO O ANTERIOR
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Fixo', 'Lazer', 'Invest'], datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }

        async function salvar() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data-lancamento').value, t = document.getElementById('tipo').value;
            if (!dt) return alert("Data obrigatória!");

            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const mesAlvo = meses[new Date(dt).getUTCMonth()];

            const ref = window.f_doc(window.db, "usuarios", user.uid, "meses", mesAlvo);
            const snap = await window.f_getDoc(ref);
            let trans = snap.exists() ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: parseFloat(v), tipo: t, data: dt });
            
            await window.f_setDoc(ref, { transacoes: trans });
            document.getElementById('modal').style.display = 'none';
            carregarDados();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            carregarDados();
        }
    </script>
</body>
</html>
