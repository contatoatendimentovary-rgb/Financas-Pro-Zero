<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | IA Inteligente</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0B0F1A; --card: #161B2C; --accent: #7C3AED; --text: #FFFFFF;
            --subtext: #94A3B8; --green: #10B981; --red: #EF4444; --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        
        .header { padding: 60px 24px 40px; background: linear-gradient(180deg, #1E1B4B 0%, var(--bg) 100%); text-align: center; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; font-size: 0.75rem; color: white; cursor: pointer; font-weight: bold; }
        
        .hero h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; margin-top: 5px; }
        .hero small { color: var(--subtext); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; margin-top: -20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .stat-card span { font-size: 0.65rem; color: var(--subtext); font-weight: 700; display: block; margin-bottom: 4px; }

        .section-label { padding: 30px 24px 15px; font-size: 0.8rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; }
        .chart-box { background: var(--card); margin: 0 24px; padding: 25px; border-radius: 28px; border: 1px solid var(--border); }
        
        .t-card { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 22px; margin: 0 24px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        /* IA MODAL HUMANO */
        .ai-fab { position: fixed; bottom: 110px; right: 24px; width: 64px; height: 64px; border-radius: 22px; background: linear-gradient(135deg, #7C3AED, #5B21B6); border: none; color: white; font-size: 28px; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4); z-index: 1000; cursor: pointer; transition: 0.3s; }
        .ai-fab:active { transform: scale(0.9); }
        
        .ai-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 16px 20px; border-radius: 24px; max-width: 85%; font-size: 0.95rem; line-height: 1.6; }
        .msg-ai { background: var(--card); border-bottom-left-radius: 4px; border: 1px solid var(--border); color: #E2E8F0; }
        .msg-user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai-footer { padding: 20px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .ai-footer input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 18px; color: white; outline: none; }
        .ai-footer button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 18px; font-weight: 800; }

        .navbar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(22, 27, 44, 0.98); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border); padding-bottom: 25px; z-index: 500; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .nav-tab.active { color: var(--accent); }
        .nav-tab span { font-size: 1.6rem; margin-bottom: 4px; }

        .modal-up { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 2px solid var(--accent); }
        input, select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
        .btn-main { width: 100%; padding: 20px; border-radius: 20px; background: var(--accent); color: white; border: none; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="ai-panel" class="ai-panel">
        <div class="ai-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:1.5rem;">✨</span>
                <b style="letter-spacing:1px; color:var(--accent);">FIN PRO</b>
            </div>
            <button onclick="closeAI()" style="background:none; border:none; color:var(--subtext); font-size:1.8rem;">&times;</button>
        </div>
        <div class="chat-scroll" id="chat-box">
            <div class="msg msg-ai">Fala Henrique! Sou o FIN PRO. <br><br>Diz aí, o que você quer saber sobre sua grana hoje? 🚀</div>
        </div>
        <div class="ai-footer">
            <input type="text" id="ai-in" placeholder="Ex: Quanto sobrou esse mês?">
            <button onclick="askFINPRO()">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <div style="font-weight:900; color:var(--accent);">FINAN PRO</div>
            <button id="user-display" class="user-pill" onclick="doLogin()">CONECTAR</button>
        </div>
        <div class="hero">
            <small>Dinheiro em Conta</small>
            <h1 id="main-val">R$ 0,00</h1>
        </div>
    </header>

    <div class="status-grid">
        <div class="stat-card"><span>GANHOS</span><b id="val-ganho" style="color:var(--green);">R$ 0,00</b></div>
        <div class="stat-card"><span>GASTOS</span><b id="val-gasto" style="color:var(--red);">R$ 0,00</b></div>
    </div>

    <main id="view-home">
        <div class="section-label">Onde está seu dinheiro</div>
        <div class="chart-box"><canvas id="finChart" style="max-height: 180px;"></canvas></div>
    </main>

    <main id="view-list" style="display:none;">
        <div class="section-label">Sua Linha do Tempo</div>
        <div id="entries-container"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="navbar">
        <button class="nav-tab active" onclick="goTab('home', this)"><span>🏠</span>HOME</button>
        <button class="nav-tab" onclick="openSheet()"><span>➕</span>NOVO</button>
        <button class="nav-tab" onclick="goTab('list', this)"><span>📜</span>EXTRATO</button>
    </nav>

    <div id="modal-sheet" class="modal-up" onclick="if(event.target==this) closeSheet()">
        <div class="sheet">
            <h3 style="text-align:center; margin-bottom:25px; letter-spacing:1px;">REGISTRAR</h3>
            <input type="text" id="f-desc" placeholder="O que foi?">
            <input type="number" id="f-val" placeholder="Quanto custou?">
            <select id="f-tipo">
                <option value="fixo">🏠 Contas Fixas (50%)</option>
                <option value="lazer">🍿 Lazer/Vontades (30%)</option>
                <option value="investimento">💰 Reserva/Futuro (20%)</option>
                <option value="entrada">💵 Dinheiro que Entrou (+)</option>
            </select>
            <input type="date" id="f-date">
            <button class="btn-main" onclick="saveData()">SALVAR AGORA</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES E CHAVE SOLICITADA
        const GROQAPY = "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";
        const firebaseConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let myChart = null;
        let userData = { balance:0, in:0, f:0, l:0, i:0 };

        function openAI() { document.getElementById('ai-panel').style.display = 'flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display = 'none'; }
        function openSheet() { document.getElementById('f-date').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-sheet').style.display = 'flex'; }
        function closeSheet() { document.getElementById('modal-sheet').style.display = 'none'; }
        
        function goTab(view, btn) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + view).style.display = 'block';
            btn.classList.add('active');
        }

        async function doLogin() { try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } catch(e) { alert("Erro ao conectar."); } }

        async function updateEverything() {
            if (!auth.currentUser) return;
            const mes = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"][new Date().getMonth()];
            const snap = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes).get();
            
            let sin = 0, sf = 0, sl = 0, si = 0, html = "";
            if (snap.exists) {
                (snap.data().transacoes || []).forEach(t => {
                    const v = parseFloat(t.valor);
                    if (t.tipo === 'entrada') sin += v;
                    else { if(t.tipo==='fixo') sf+=v; else if(t.tipo==='lazer') sl+=v; else si+=v; }
                    html += `<div class="t-card"><div><b>${t.descricao}</b><br><small style="color:var(--subtext)">${t.tipo}</small></div><div style="font-weight:800; color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${t.tipo==='entrada'?'+':'-'} R$ ${v.toFixed(2)}</div></div>`;
                });
            }
            userData = { balance: sin - (sf+sl+si), in: sin, f: sf, l: sl, i: si };
            document.getElementById('main-val').innerText = userData.balance.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('val-ganho').innerText = "R$ " + sin.toFixed(2);
            document.getElementById('val-gasto').innerText = "R$ " + (sf+sl+si).toFixed(2);
            document.getElementById('entries-container').innerHTML = html || "<p style='text-align:center;padding:50px;opacity:0.3'>Nada registrado ainda.</p>";
            drawChart(sf, sl, si);
        }

        async function saveData() {
            const d = document.getElementById('f-desc').value, v = document.getElementById('f-val').value;
            const t = document.getElementById('f-tipo').value, dt = document.getElementById('f-date').value;
            const mes = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"][parseInt(dt.split('-')[1])-1];
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mes);
            const snap = await ref.get();
            let trans = snap.exists ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: v, tipo: t, data: dt });
            await ref.set({ transacoes: trans });
            closeSheet(); updateEverything();
        }

        // IA FIN PRO: HUMANA, DIRETA E ROBUSTA
        async function askFINPRO() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const userMsg = inp.value;
            box.innerHTML += `<div class="msg msg-user">${userMsg}</div>`;
            inp.value = "";
            box.scrollTop = box.scrollHeight;

            const loadId = "ld-" + Date.now();
            box.innerHTML += `<div class="msg msg-ai" id="${loadId}">Pensando...</div>`;

            try {
                const prompt = `Henrique (estudante). Saldo R$${userData.balance}. Ganhos R$${userData.in}. Gastos: Fixos R$${userData.f}, Lazer R$${userData.l}, Reserva R$${userData.i}. Pergunta: ${userMsg}. Instrução: Seja o FIN PRO, direto, use emojis e responda em tópicos curtos.`;
                
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQAPY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{ role: "user", content: prompt }], temperature: 0.8 })
                });

                const data = await res.json();
                document.getElementById(loadId).remove();
                let aiTxt = data.choices[0].message.content.replace(/\n/g, '<br>');
                box.innerHTML += `<div class="msg msg-ai">${aiTxt}</div>`;
            } catch (e) {
                document.getElementById(loadId).innerText = "Erro na conexão. Tenta de novo? 😅";
            }
            box.scrollTop = box.scrollHeight;
        }

        function drawChart(f, l, i) {
            const ctx = document.getElementById('finChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Fixo', 'Lazer', 'Reserva'], datasets: [{ data: [f||1, l||0.1, i||0.1], backgroundColor: ['#7C3AED', '#F59E0B', '#10B981'], borderWidth: 0 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        }

        auth.onAuthStateChanged(user => { if(user) { document.getElementById('user-display').innerText = user.displayName.split(' ')[0].toUpperCase(); updateEverything(); } });
    </script>
</body>
</html>
