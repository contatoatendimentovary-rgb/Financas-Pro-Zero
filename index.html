<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EAB308">
    <title>FinançasPRO | Gold Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 110px; overflow-x: hidden; }

        /* Header */
        .header { padding: 50px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .month-bar { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
        .month-bar::-webkit-scrollbar { display: none; }
        .m-item { padding: 10px 18px; border-radius: 12px; background: #1A1A1A; color: var(--subtext); border: 1px solid var(--border); font-weight: 700; white-space: nowrap; font-size: 0.8rem; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Hero */
        .hero { text-align: center; padding: 30px 20px 20px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; }
        .hero span { color: var(--subtext); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Cards de Resumo */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; margin-bottom: 20px; }
        .s-card { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .s-card small { font-size: 0.6rem; font-weight: 900; color: var(--subtext); display: block; margin-bottom: 4px; }
        .s-card b { font-size: 1.1rem; }

        /* Gráfico Ajustado */
        .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto; }

        /* Lista de Transações */
        .t-row { background: var(--card); padding: 16px; border-radius: 18px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-info b { display: block; font-size: 0.9rem; }
        .t-info span { font-size: 0.6rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; }
        .btn-del { background: #27272A; border: none; color: var(--red); width: 35px; height: 35px; border-radius: 10px; margin-left: 10px; font-size: 0.9rem; }

        /* Bottom Nav */
        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 15px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.65rem; }
        .n-btn.active { color: var(--accent); }
        .n-btn i { font-size: 1.4rem; margin-bottom: 4px; }

        /* FAB IA */
        .ai-fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: var(--accent); color: #000; border: none; font-size: 22px; box-shadow: 0 8px 20px rgba(234,179,8,0.3); z-index: 900; }

        /* Modais */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .sheet { background: var(--bg); width: 100%; border-radius: 25px 25px 0 0; padding: 25px; border-top: 3px solid var(--accent); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #fff; font-weight: 700; }
        .btn-save { width: 100%; padding: 16px; border-radius: 12px; background: var(--accent); color: #000; border: none; font-weight: 900; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="ai-panel" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:5000; flex-direction:column;">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b>✨ INTELIGÊNCIA FINANCEIRA</b>
            <button onclick="toggleAI()" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-in" placeholder="Ex: Paguei 30 no Uber" style="margin-bottom:0;">
            <button onclick="askIA()" style="background:var(--accent); border:none; padding:0 20px; border-radius:12px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1rem; letter-spacing: -0.5px;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-info" onclick="login()" style="background:var(--accent); color:#000; padding:6px 14px; border-radius:10px; font-size:0.65rem; font-weight:900;">LOGIN</div>
        </div>
        <div class="month-bar" id="m-list"></div>
    </header>

    <div class="hero">
        <span>Meu Saldo</span>
        <h1 id="v-bal">R$ 0,00</h1>
    </div>

    <div class="stats">
        <div class="s-card"><small>RECEITAS</small><b id="v-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="s-card"><small>DESPESAS</small><b id="v-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <div id="v-dash" style="padding:10px 20px;">
        <div style="background:var(--card); padding:30px; border-radius:25px; border:1px solid var(--border); text-align:center;">
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
            <p style="margin-top:15px; font-size:0.7rem; color:var(--subtext); font-weight:700;">DISTRIBUIÇÃO MENSAL</p>
        </div>
    </div>

    <div id="v-list" style="display:none; padding-top:10px;">
        <div id="t-cont"></div>
    </div>

    <button class="ai-fab" onclick="toggleAI()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="tab('dash', this)"><i>📊</i>Home</button>
        <button class="n-btn" onclick="openAdd()"><i>➕</i>Lançar</button>
        <button class="n-btn" onclick="tab('list', this)"><i>📜</i>Extrato</button>
    </nav>

    <div id="m-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="margin-bottom:15px;">Novo Registro</h3>
            <input type="text" id="in-desc" placeholder="O que foi?">
            <input type="number" id="in-val" placeholder="0.00">
            <select id="in-tipo">
                <option value="entrada">Faturamento / Pix</option>
                <option value="fixo">Gasto Fixo</option>
                <option value="lazer" selected>Gasto Variável</option>
            </select>
            <input type="date" id="in-date">
            <button class="btn-save" onclick="save()">CONFIRMAR</button>
        </div>
    </div>

    <script>
        const FB = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(FB);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null;

        function init() {
            const list = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('div');
                b.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => { document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active')); b.classList.add('active'); mesAtivo = m; sync(); };
                list.appendChild(b);
                if(m === mesAtivo) b.scrollIntoView({ inline: 'center' });
            });
            sync();
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let r=0, g=0, html="";
                if(doc.exists) {
                    const trans = doc.data().transacoes || [];
                    trans.forEach((t, i) => {
                        const v = parseFloat(t.valor);
                        if(t.tipo==='entrada') r+=v; else g+=v;
                        html += `<div class="t-row"><div class="t-info"><b>${t.descricao || 'Lançamento'}</b><span>${t.tipo}</span></div>
                                 <div style="display:flex;align-items:center;"><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                                 <button class="btn-del" onclick="del(${i})">🗑️</button></div></div>`;
                    });
                }
                document.getElementById('v-bal').innerText = (r-g).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('v-in').innerText = "R$ "+r.toFixed(2);
                document.getElementById('v-out').innerText = "R$ "+g.toFixed(2);
                document.getElementById('t-cont').innerHTML = html || "<p style='text-align:center;padding:50px;opacity:0.3;'>Sem dados.</p>";
                render(r, g);
            });
        }

        async function save() {
            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let list = snap.exists ? snap.data().transacoes : [];
            list.push({ descricao: d, valor: v, tipo: t, data: document.getElementById('in-date').value });
            await ref.set({ transacoes: list }); closeAdd();
        }

        async function del(index) {
            if(!confirm("Deseja apagar?")) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let list = snap.data().transacoes; list.splice(index, 1);
            await ref.set({ transacoes: list });
        }

        async function askIA() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            const txt = inp.value; if(!txt) return;
            box.innerHTML += `<div style="background:var(--accent); color:#000; padding:12px; border-radius:15px; align-self:flex-end; font-weight:700;">${txt}</div>`;
            inp.value = "";
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:`Analise: "${txt}". Responda APENAS JSON: {"desc":"Nome","valor":0.0,"tipo":"entrada/fixo/lazer"}`}], response_format:{"type":"json_object"}})
                });
                let r = JSON.parse((await res.json()).choices[0].message.content);
                
                if(!r.desc || r.desc === "undefined") r.desc = txt;
                if(txt.toLowerCase().includes("gastei") || txt.toLowerCase().includes("paguei")) r.tipo = "lazer";

                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                const snap = await ref.get();
                let list = snap.exists ? snap.data().transacoes : [];
                list.push({ ...r, data: new Date().toISOString().split('T')[0] });
                await ref.set({ transacoes: list });
                box.innerHTML += `<div style="background:#27272A; padding:12px; border-radius:15px;">✅ Lançado: ${r.desc}</div>`;
            } catch(e) { box.innerHTML += `<div>Erro na conexão.</div>`; }
        }

        function render(inVal, outVal) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type:'doughnut', 
                data:{ datasets:[{data:[outVal||0.1, inVal||0.1], backgroundColor:['#EF4444','#EAB308'], borderWidth:0}]}, 
                options:{ cutout:'88%', plugins: { legend: { display: false } } } 
            });
        }

        function tab(v, b) {
            document.getElementById('v-dash').style.display = v==='dash'?'block':'none';
            document.getElementById('v-list').style.display = v==='list'?'block':'none';
            document.querySelectorAll('.n-btn').forEach(n => n.classList.remove('active')); b.classList.add('active');
        }

        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        function toggleAI() { const p = document.getElementById('ai-panel'); p.style.display = p.style.display==='none'?'flex':'none'; }

        init();
        auth.onAuthStateChanged(u => { if(u){ document.getElementById('user-info').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
