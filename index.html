<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro Turbo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0B0F1A; --card: #161B2C; --accent: #7C3AED; --text: #FFFFFF;
            --subtext: #94A3B8; --green: #10B981; --red: #EF4444; --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* Toast Turbo */
        .fin-toast { position: fixed; top: -100px; left: 20px; right: 20px; background: var(--accent); color: white; padding: 18px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 5000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .fin-toast.show { top: 20px; }

        .header { padding: 50px 24px 30px; background: linear-gradient(180deg, #1E1B4B 0%, var(--bg) 100%); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        .user-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; font-size: 0.75rem; color: white; font-weight: bold; }

        /* Seletor de Meses Turbo */
        .month-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .month-scroll::-webkit-scrollbar { display: none; }
        .m-btn { padding: 10px 22px; border-radius: 50px; border: 1px solid var(--border); background: var(--card); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; transition: 0.2s; }
        .m-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }

        .hero { text-align: center; margin: 30px 0; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; }
        .hero small { color: var(--subtext); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 24px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .stat-card span { font-size: 0.65rem; color: var(--subtext); font-weight: 800; display: block; margin-bottom: 5px; }

        .section-label { padding: 30px 24px 15px; font-size: 0.85rem; font-weight: 800; color: var(--subtext); text-transform: uppercase; }
        .chart-box { background: var(--card); margin: 0 24px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); position: relative; }

        .t-item { background: var(--card); padding: 18px; border-radius: 22px; margin: 0 24px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-del { color: var(--red); background: rgba(239, 68, 68, 0.1); border: none; width: 35px; height: 35px; border-radius: 12px; cursor: pointer; }

        /* IA FAB */
        .ai-fab { position: fixed; bottom: 110px; right: 24px; width: 64px; height: 64px; border-radius: 22px; background: linear-gradient(135deg, #7C3AED, #5B21B6); color: white; border: none; font-size: 28px; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4); z-index: 1000; }
        
        .ai-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .ai-head { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 16px 20px; border-radius: 22px; max-width: 85%; font-size: 0.95rem; }
        .m-ai { background: var(--card); border: 1px solid var(--border); }
        .m-user { background: var(--accent); color: white; align-self: flex-end; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(22, 27, 44, 0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; padding-bottom: 25px; }
        .nav-tab { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .nav-tab.active { color: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 3000; align-items: flex-end; }
        .sheet { background: var(--card); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 2px solid var(--accent); }
        input, select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 1px solid var(--border); background: var(--bg); color: white; }
        .btn-go { width: 100%; padding: 20px; border-radius: 20px; background: var(--accent); color: white; border: none; font-weight: 800; }
    </style>
</head>
<body>

    <div id="ai-panel" class="ai-panel">
        <div class="ai-head"><b style="color:var(--accent)">✨ FIN PRO TURBO</b> <button onclick="closeAI()" style="background:none; border:none; color:white; font-size:1.8rem;">&times;</button></div>
        <div class="chat-view" id="chat-box"><div class="msg m-ai">Fala Henrique! O sistema tá no modo Turbo. O que vamos analisar hoje?</div></div>
        <div style="padding:20px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-input" placeholder="Dúvida rápida...">
            <button onclick="askIA()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:15px; font-weight:bold;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top"><div class="logo">FINAN PRO</div><button id="user-btn" class="user-pill" onclick="login()">LOGIN</button></div>
        <div class="month-scroll" id="month-list"></div>
        <div class="hero"><small id="month-title">Mês Atual</small><h1 id="total-bal">R$ 0,00</h1></div>
    </header>

    <div class="grid">
        <div class="stat-card"><span>GANHOS</span><b id="total-in" style="color:var(--green)">R$ 0,00</b></div>
        <div class="stat-card"><span>GASTOS</span><b id="total-out" style="color:var(--red)">R$ 0,00</b></div>
    </div>

    <main id="tab-dash">
        <div class="section-label">Gráfico Acumulativo</div>
        <div class="chart-box"><canvas id="pizChart" style="max-height: 200px;"></canvas></div>
    </main>

    <main id="tab-list" style="display:none;">
        <div class="section-label">Extrato Detalhado</div>
        <div id="list-view"></div>
    </main>

    <button class="ai-fab" onclick="openAI()">✨</button>

    <nav class="nav-bar">
        <button class="nav-tab active" onclick="tab('dash', this)"><span>📊</span>HOME</button>
        <button class="nav-tab" onclick="openAdd()"><span>➕</span>ADD</button>
        <button class="nav-tab" onclick="tab('list', this)"><span>📜</span>LISTA</button>
    </nav>

    <div id="modal-add" class="modal" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="text-align:center; margin-bottom:25px;">Novo Registro</h3>
            <input type="text" id="add-desc" placeholder="Ex: Mercado">
            <input type="number" id="add-val" placeholder="Valor (R$)">
            <select id="add-tipo">
                <option value="fixo">🏠 Essencial (50%)</option>
                <option value="lazer">🍿 Lazer (30%)</option>
                <option value="investimento">💰 Reserva (20%)</option>
                <option value="entrada">💵 Receita (+)</option>
            </select>
            <input type="date" id="add-date">
            <button class="btn-go" onclick="save()">SALVAR NO FIREBASE</button>
        </div>
    </div>

    <script>
        const GROQAPY = "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";
        const fbConfig = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null;
        let cacheData = { bal:0, in:0, f:0, l:0, i:0 };

        function init() {
            const list = document.getElementById('month-list');
            MESES.forEach(m => {
                const b = document.createElement('button');
                b.className = `m-btn ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => {
                    document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    mesAtivo = m; sync();
                };
                list.appendChild(b);
            });
        }

        function toast(tipo, val) {
            const t = document.createElement('div'); t.className = 'fin-toast';
            t.innerHTML = `<span>✨</span> ${tipo === 'entrada' ? 'Grana na conta!' : 'Gasto registrado!'}`;
            document.body.appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),400); }, 3000);
        }

        function openAI() { document.getElementById('ai-panel').style.display='flex'; }
        function closeAI() { document.getElementById('ai-panel').style.display='none'; }
        function openAdd() { document.getElementById('add-date').value = new Date().toISOString().split('T')[0]; document.getElementById('modal-add').style.display='flex'; }
        function closeAdd() { document.getElementById('modal-add').style.display='none'; }
        function tab(v, b) {
            document.querySelectorAll('main').forEach(m => m.style.display='none');
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-'+v).style.display='block'; b.classList.add('active');
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        // SINCRONIZAÇÃO TURBO: Listener em tempo real
        function sync() {
            if(!auth.currentUser) return;
            document.getElementById('month-title').innerText = `Gestão Comercial - ${mesAtivo}`;
            
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let sin=0, sf=0, sl=0, si=0, html="";
                if(doc.exists) {
                    const trans = doc.data().transacoes || [];
                    trans.forEach((t, idx) => {
                        const v = parseFloat(t.valor);
                        if(t.tipo==='entrada') sin+=v;
                        else { if(t.tipo==='fixo') sf+=v; else if(t.tipo==='lazer') sl+=v; else si+=v; }
                        html += `<div class="t-item"><div><b>${t.descricao}</b><br><small>${t.tipo}</small></div>
                                 <div style="display:flex;align-items:center;gap:12px;"><b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">R$ ${v.toFixed(2)}</b>
                                 <button class="btn-del" onclick="del(${idx})">🗑️</button></div></div>`;
                    });
                }
                cacheData = { bal: sin-(sf+sl+si), in: sin, f: sf, l: sl, i: si };
                document.getElementById('total-bal').innerText = cacheData.bal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('total-in').innerText = "R$ "+sin.toFixed(2);
                document.getElementById('total-out').innerText = "R$ "+(sf+sl+si).toFixed(2);
                document.getElementById('list-view').innerHTML = html || "<p style='text-align:center;opacity:0.3;padding:40px'>Vazio</p>";
                render(sf, sl, si, sin);
            });
        }

        async function save() {
            const d = document.getElementById('add-desc').value, v = document.getElementById('add-val').value, t = document.getElementById('add-tipo').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.exists ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: document.getElementById('add-date').value });
            await ref.set({ transacoes: lista });
            closeAdd(); toast(t, v);
        }

        async function del(idx) {
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let lista = snap.data().transacoes;
            lista.splice(idx, 1);
            await ref.set({ transacoes: lista });
        }

        function render(f, l, i, s) {
            const ctx = document.getElementById('pizChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Essencial', 'Lazer', 'Reserva', 'Livre'],
                    datasets: [{ data: [f||0.1, l||0.1, i||0.1, (s-(f+l+i))||0.1], backgroundColor: ['#EF4444', '#F59E0B', '#10B981', '#7C3AED'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } }, animation: { duration: 500 } }
            });
        }

        async function askIA() {
            const inp = document.getElementById('ai-input'), box = document.getElementById('chat-box');
            if(!inp.value) return;
            const text = inp.value; box.innerHTML += `<div class="msg m-user">${text}</div>`;
            inp.value = ""; box.scrollTop = box.scrollHeight;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':`Bearer ${GROQAPY}`,'Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:`Henrique. Saldo R$${cacheData.bal}. Pergunta: ${text}. FIN PRO: direta e emojis.`}]})
                });
                const data = await res.json();
                box.innerHTML += `<div class="msg m-ai">${data.choices[0].message.content}</div>`;
            } catch(e) { box.innerHTML += `<div class="msg m-ai">Erro.</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        init();
        auth.onAuthStateChanged(u => { if(u) { document.getElementById('user-btn').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
