<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EAB308">
    <title>Finan Pro | Master</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }

        .header { padding: 50px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Menu Dropdown */
        .menu-container { position: relative; }
        .menu-btn { background: var(--border); border: none; color: #fff; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
        .menu-content { display: none; position: absolute; right: 0; top: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 160px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .menu-content button { width: 100%; padding: 12px; background: none; border: none; color: #fff; text-align: left; font-size: 0.8rem; border-bottom: 1px solid var(--border); cursor: pointer; }
        .menu-content button:last-child { border: none; }

        .user-badge { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        .month-bar { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; padding-bottom: 5px; }
        .m-item { padding: 10px 16px; border-radius: 12px; background: #1A1A1A; border: 1px solid var(--border); color: var(--subtext); font-size: 0.75rem; white-space: nowrap; cursor: pointer; }
        .m-item.active { background: var(--accent); color: #000; font-weight: 800; border-color: var(--accent); }

        .hero { text-align: center; padding: 35px 20px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; }

        .stat-card { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); margin: 0 20px 15px; display: flex; justify-content: space-between; text-align: center; }
        .stat-card.column { flex-direction: column; text-align: left; gap: 15px; }
        .stat-card small { font-size: 0.6rem; color: var(--subtext); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 5px; }

        .progress-bg { width: 100%; height: 8px; background: #27272A; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: 1s ease-in-out; }

        .chart-box { background: var(--card); border-radius: 25px; border: 1px solid var(--border); margin: 0 20px 25px; padding: 25px; display: flex; justify-content: center; }
        .chart-container { width: 160px; height: 160px; }

        .t-row { background: var(--card); padding: 16px; border-radius: 18px; margin: 0 20px 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .t-info b { font-size: 0.95rem; display: block; }
        .t-info small { color: var(--subtext); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; }
        .t-actions { display: flex; align-items: center; gap: 15px; }
        .btn-del { background: rgba(239, 68, 68, 0.1); border: none; color: var(--red); padding: 10px; border-radius: 12px; font-size: 1rem; cursor: pointer; }

        .ai-fab { position: fixed; bottom: 105px; right: 20px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); border: none; font-size: 30px; z-index: 999; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); }
        .panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; }
        .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
        .msg-user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 800; }

        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 95px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 25px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; }
        .n-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <!-- MODAL IA -->
    <div id="ai-modal" class="panel">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b style="color:var(--accent)">ASSISTENTE FINAN PRO ✨</b>
            <button onclick="toggleIA()" style="background:none; border:none; color:#fff; font-size:2rem;">✕</button>
        </div>
        <div id="chat-box" class="chat-area"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-input" placeholder="Perdi 200... Ganhei 100..." style="flex:1; padding:18px; border-radius:15px; border:1px solid var(--border); background:#000; color:#fff; outline:none; font-size:1rem;">
            <button onclick="processarIA()" style="background:var(--accent); border:none; padding:0 20px; border-radius:15px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <div class="menu-container">
                <button class="menu-btn" onclick="toggleMenu()">MENU ☰</button>
                <div id="menu-dropdown" class="menu-content">
                    <button onclick="tab('saude')">🩺 Saúde Financeira</button>
                    <button onclick="tab('metas')">🎯 Minhas Metas</button>
                    <button onclick="exportarRelatorio()">📄 Gerar Relatório</button>
                </div>
            </div>
            <div id="user-display" class="user-badge" onclick="login()">CONECTAR</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <!-- ABA HOME -->
    <div id="v-home">
        <div class="hero">
            <small style="letter-spacing:1px; opacity:0.6;">SALDO DISPONÍVEL</small>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>
        <div class="stat-card">
            <div><small>RECEITAS</small><b id="st-rec" style="color:var(--green)">R$ 0,00</b></div>
            <div style="width:1px; background:var(--border); height:30px; align-self:center;"></div>
            <div><small>DESPESAS</small><b id="st-gas" style="color:var(--red)">R$ 0,00</b></div>
        </div>
        <div class="chart-box"><div class="chart-container"><canvas id="myChart"></canvas></div></div>
    </div>

    <!-- ABA SAÚDE FINANCEIRA -->
    <div id="v-saude" style="display:none; padding: 20px;">
        <h2 style="margin-bottom:20px;">Saúde 50/30/20</h2>
        <div class="stat-card column">
            <div class="health-box">
                <small>Sobrevivência (50%)</small>
                <b id="val-fixo">R$ 0,00 / R$ 0,00</b>
                <div class="progress-bg"><div id="bar-fixo" class="progress-fill" style="background:var(--accent)"></div></div>
            </div>
            <div class="health-box">
                <small>Alegria (30%)</small>
                <b id="val-lazer">R$ 0,00 / R$ 0,00</b>
                <div class="progress-bg"><div id="bar-lazer" class="progress-fill" style="background:#3B82F6"></div></div>
            </div>
            <div class="health-box">
                <small>Futuro (20%)</small>
                <b id="val-invest">R$ 0,00 / R$ 0,00</b>
                <div class="progress-bg"><div id="bar-invest" class="progress-fill" style="background:var(--green)"></div></div>
            </div>
        </div>
        <div id="status-feedback" style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);"></div>
    </div>

    <!-- ABA METAS -->
    <div id="v-metas" style="display:none; padding: 20px;">
        <h2 style="margin-bottom:20px;">Metas de Curto Prazo</h2>
        <div id="lista-metas"></div>
        <button onclick="addMeta()" style="width:100%; padding:15px; border-radius:15px; border:1px dashed var(--accent); background:none; color:var(--accent); font-weight:800; margin-top:10px;">+ ADICIONAR NOVA META</button>
    </div>

    <!-- ABA EXTRATO -->
    <div id="v-lista" style="display:none; padding-top:20px;"><div id="cont-lista"></div></div>

    <button class="ai-fab" onclick="toggleIA()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" id="btn-home" onclick="tab('home')">RESUMO</button>
        <button class="n-btn" id="btn-lista" onclick="tab('lista')">EXTRATO</button>
    </nav>

    <script>
        const cfg = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null;
        let unsubscribe = null;
        let dadosAtuais = { rec: 0, gas: 0, cats: {} };

        function init() {
            const mCont = document.getElementById('month-list');
            MESES.forEach(m => {
                const d = document.createElement('div');
                d.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                d.innerText = m.charAt(0).toUpperCase() + m.slice(1);
                d.onclick = () => { 
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active')); 
                    d.classList.add('active'); 
                    mesAtivo = m; 
                    sync(); 
                };
                mCont.appendChild(d);
            });
            auth.onAuthStateChanged(u => { if(u){ document.getElementById('user-display').innerText = u.displayName.split(' ')[0]; sync(); syncMetas(); } });
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function sync() {
            if(!auth.currentUser) return;
            if(unsubscribe) unsubscribe();

            unsubscribe = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo)
            .onSnapshot(doc => {
                let recMes = 0, gasMes = 0, html = "";
                let cats = { fixo: 0, lazer: 0, invest: 0, outros: 0 };
                const trans = doc.exists ? doc.data().transacoes || [] : [];
                
                trans.forEach((t, i) => {
                    const v = Number(t.valor) || 0;
                    const tp = t.tipo.toLowerCase().trim();
                    if(tp === 'entrada') recMes += v;
                    else {
                        gasMes += v;
                        if(tp.includes('fixo') || tp.includes('sobrevivencia')) cats.fixo += v;
                        else if(tp.includes('lazer') || tp.includes('alegria')) cats.lazer += v;
                        else if(tp.includes('invest') || tp.includes('futuro')) cats.invest += v;
                        else cats.outros += v;
                    }
                    html += `<div class="t-row">
                        <div class="t-info"><b>${t.descricao}</b><small>${t.tipo.toUpperCase()}</small></div>
                        <div class="t-actions">
                            <b style="color:${tp === 'entrada'?'var(--green)':'#fff'}">R$ ${v.toFixed(2)}</b>
                            <button class="btn-del" onclick="apagar(${i})">✕</button>
                        </div>
                    </div>`;
                });

                dadosAtuais = { rec: recMes, gas: gasMes, cats: cats, trans: trans };
                document.getElementById('main-balance').innerText = (recMes - gasMes).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                document.getElementById('st-rec').innerText = `R$ ${recMes.toFixed(2)}`;
                document.getElementById('st-gas').innerText = `R$ ${gasMes.toFixed(2)}`;
                document.getElementById('cont-lista').innerHTML = html || '<p style="text-align:center; opacity:0.3; margin-top:50px;">Sem registros.</p>';
                
                renderChart(cats, recMes - gasMes);
                calcSaude(cats, recMes);
            });
        }

        // --- FUNÇÕES DE METAS ---
        async function syncMetas() {
            const snap = await db.collection("usuarios").doc(auth.currentUser.uid).collection("metas").onSnapshot(s => {
                let h = "";
                s.forEach(doc => {
                    const m = doc.data();
                    const perc = Math.min((m.atual / m.alvo) * 100, 100);
                    h += `<div class="stat-card column" style="margin:0 0 15px 0">
                        <div style="display:flex; justify-content:space-between">
                            <b>${m.nome}</b>
                            <small onclick="deletarMeta('${doc.id}')" style="color:var(--red)">EXCLUIR</small>
                        </div>
                        <small>R$ ${m.atual.toFixed(2)} de R$ ${m.alvo.toFixed(2)}</small>
                        <div class="progress-bg"><div class="progress-fill" style="width:${perc}%; background:var(--accent)"></div></div>
                    </div>`;
                });
                document.getElementById('lista-metas').innerHTML = h;
            });
        }

        async function addMeta() {
            const nome = prompt("Nome da Meta (ex: Viagem):");
            const alvo = Number(prompt("Valor total do objetivo:"));
            if(nome && alvo) {
                await db.collection("usuarios").doc(auth.currentUser.uid).collection("metas").add({ nome, alvo, atual: 0 });
            }
        }

        async function deletarMeta(id) { if(confirm("Remover meta?")) await db.collection("usuarios").doc(auth.currentUser.uid).collection("metas").doc(id).delete(); }

        // --- SAÚDE E RELATÓRIO ---
        function calcSaude(c, rec) {
            const mFixo = rec * 0.5, mLazer = rec * 0.3, mInvest = rec * 0.2;
            document.getElementById('val-fixo').innerText = `R$ ${c.fixo.toFixed(2)} / R$ ${mFixo.toFixed(2)}`;
            document.getElementById('val-lazer').innerText = `R$ ${c.lazer.toFixed(2)} / R$ ${mLazer.toFixed(2)}`;
            document.getElementById('val-invest').innerText = `R$ ${c.invest.toFixed(2)} / R$ ${mInvest.toFixed(2)}`;
            document.getElementById('bar-fixo').style.width = (Math.min(c.fixo/mFixo, 1)*100 || 0) + '%';
            document.getElementById('bar-lazer').style.width = (Math.min(c.lazer/mLazer, 1)*100 || 0) + '%';
            document.getElementById('bar-invest').style.width = (Math.min(c.invest/mInvest, 1)*100 || 0) + '%';
        }

        function exportarRelatorio() {
            const r = dadosAtuais;
            const texto = `RELATÓRIO FINAN PRO - ${mesAtivo.toUpperCase()}\n\nReceitas: R$ ${r.rec.toFixed(2)}\nDespesas: R$ ${r.gas.toFixed(2)}\nSaldo: R$ ${(r.rec - r.gas).toFixed(2)}\n\nDIVISÃO:\nSobrevivência: R$ ${r.cats.fixo.toFixed(2)}\nAlegria: R$ ${r.cats.lazer.toFixed(2)}\nFuturo: R$ ${r.cats.invest.toFixed(2)}`;
            alert("Relatório gerado! Copie o texto abaixo:\n\n" + texto);
            console.log(texto);
        }

        // --- IA E NAVEGAÇÃO ---
        async function processarIA() {
            const inp = document.getElementById('ai-input'), box = document.getElementById('chat-box');
            if(!inp.value || !auth.currentUser) return;
            const userMsg = inp.value;
            box.innerHTML += `<div class="msg msg-user">${userMsg}</div>`;
            inp.value = ""; box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({
                        model:"llama-3.1-8b-instant",
                        messages:[{
                            role:"system", 
                            content: "Você é o Finan Pro AI. Interprete ganhos e gastos. Se o usuário falar em guardar para uma meta, use tipo 'invest'. Categorias: sobrevivencia, alegria, futuro. Retorne JSON: {\"is_launch\":true,\"desc\":\"...\",\"valor\":0.0,\"tipo\":\"entrada/sobrevivencia/alegria/futuro\"} ou apenas converse."
                        }, {role:"user", content: userMsg}]
                    })
                });
                const d = await res.json();
                const aiMsg = d.choices[0].message.content;

                if(aiMsg.includes("{")) {
                    const r = JSON.parse(aiMsg.substring(aiMsg.indexOf("{"), aiMsg.lastIndexOf("}") + 1));
                    const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo);
                    const s = await ref.get();
                    let list = s.exists ? s.data().transacoes || [] : [];
                    list.push({ descricao: r.desc, valor: Number(r.valor), tipo: r.tipo });
                    await ref.set({ transacoes: list });
                    box.innerHTML += `<div class="msg msg-ai">✅ Lançado! Entendi que foi um gasto de <b>${r.tipo}</b>. Tudo atualizado!</div>`;
                } else {
                    box.innerHTML += `<div class="msg msg-ai">${aiMsg}</div>`;
                }
            } catch(e) { box.innerHTML += `<div class="msg msg-ai">Tive um erro, pode repetir?</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        function tab(t) {
            const ids = ['v-home', 'v-saude', 'v-metas', 'v-lista'];
            ids.forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('v-' + t).style.display = 'block';
            document.getElementById('menu-dropdown').style.display = 'none';
            
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
            if(t === 'home') document.getElementById('btn-home').classList.add('active');
            if(t === 'lista') document.getElementById('btn-lista').classList.add('active');
        }

        function toggleMenu() { const m = document.getElementById('menu-dropdown'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function toggleIA() { const m = document.getElementById('ai-modal'); m.style.display = m.style.display==='flex'?'none':'flex'; }
        function renderChart(c, saldo) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Sobrevivência', 'Alegria', 'Futuro', 'Outros', 'Saldo'],
                    datasets: [{
                        data: [c.fixo, c.lazer, c.invest, c.outros, saldo > 0 ? saldo : 0],
                        backgroundColor: ['#EAB308', '#3B82F6', '#22C55E', '#EF4444', '#1A1A1A'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        init();
    </script>
</body>
</html>
