<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO Black</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

<header>
    <div class="header-content">
        <h1>Finanças<span>PRO</span></h1>
        <div id="statusOrcamento" class="badge-status">Dashboard</div>
    </div>
</header>

<div class="container">
    <section id="extrato" class="aba-content active">
        <div class="card-balanco">
            <div class="seletor-container">
                <select id="filtroMes" onchange="carregarDados()"></select>
            </div>
            <div class="main-balance">
                <small>Saldo Disponível</small>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
            <div class="sub-balanco">
                <div class="item-balanco">
                    <small>Entradas</small>
                    <span id="receita" class="text-green">R$ 0,00</span>
                </div>
                <div class="item-balanco">
                    <small>Saídas</small>
                    <span id="despesa" class="text-red">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div class="card-chart">
            <div class="chart-container">
                <canvas id="graficoPizza"></canvas>
            </div>
        </div>

        <div class="lista-header"><h3>Histórico</h3></div>
        <div id="lista" class="historico-lista"></div>
    </section>

    <section id="lancamento" class="aba-content">
        <div class="card-form">
            <h2>Novo Registro</h2>
            <div class="group">
                <label>Descrição (Ex: Salário, Aluguel...)</label>
                <input type="text" id="desc" placeholder="O que foi?">
            </div>
            <div class="group">
                <label>Valor</label>
                <input type="number" id="valor" step="0.01" placeholder="R$ 0,00">
            </div>
            <div class="group">
                <label>Categoria do Gasto</label>
                <select id="cat">
                    <option value="Essencial">Essencial (50%)</option>
                    <option value="Lazer">Lazer (30%)</option>
                    <option value="Investimento">Investir (20%)</option>
                    <option value="Receita">É uma Entrada/Salário</option>
                </select>
            </div>
            <button onclick="salvarInteligente()" class="btn-save">Confirmar Registro</button>
        </div>
    </section>

    <section id="metas" class="aba-content">
        <div class="card-balanco">
            <h3 style="margin-top:0">Saúde Financeira (50/30/20)</h3>
            <div id="painelMetas">
                </div>
        </div>
    </section>
</div>

<nav class="nav-bottom">
    <button class="nav-item active" onclick="abrirAba(event, 'extrato')">📊<br>Extrato</button>
    <button class="nav-item" onclick="abrirAba(event, 'lancamento')">➕<br>Lançar</button>
    <button class="nav-item" onclick="abrirAba(event, 'metas')">🎯<br>Metas</button>
</nav>

<script src="./script.js"></script>
</body>
</html>
