<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças PRO Black</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
</head>
<body>

<header>
    <h1>Finanças<span>PRO</span></h1>
</header>

<div class="container">
    <section id="extrato" class="aba-content active">
        <div class="card-balanco">
            <div class="seletor-mes">
                <select id="filtroMes" onchange="carregarDados()"></select>
            </div>
            <div class="main-balance">
                <small>Saldo Disponível</small>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
            <div class="sub-balanco">
                <div class="item-balanco">
                    <small>Receitas</small>
                    <span id="receita" class="text-green">R$ 0,00</span>
                </div>
                <div class="item-balanco">
                    <small>Despesas</small>
                    <span id="despesa" class="text-red">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div class="card-chart">
            <canvas id="grafico"></canvas>
        </div>

        <div id="lista" class="historico-lista">
            </div>
    </section>

    <section id="lancamento" class="aba-content">
        <div class="card-form">
            <h2>Novo Registro</h2>
            <div class="input-group">
                <input type="text" id="desc" placeholder="Descrição (ex: Venda de Produto)">
                <input type="number" id="valor" step="0.01" placeholder="Valor R$">
                <input type="date" id="data">
                <select id="tipo">
                    <option value="receita">Entrada (+)</option>
                    <option value="despesa" selected>Saída (-)</option>
                </select>
                <select id="cat">
                    <option value="Essencial">Essencial</option>
                    <option value="Lazer">Lazer / Marketing</option>
                    <option value="Investimento">Investimento</option>
                </select>
                <button onclick="salvarDado()" class="btn-save">Confirmar Lançamento</button>
            </div>
        </div>
    </section>

    <section id="config" class="aba-content">
        <div class="card-form">
            <h2>Ferramentas</h2>
            <button onclick="exportarCSV()" class="btn-tool">Exportar para Excel (CSV)</button>
            <button onclick="limparBanco()" class="btn-danger">Limpar Todos os Dados</button>
        </div>
    </section>
</div>

<nav class="nav-bottom">
    <button class="nav-item active" onclick="abrirAba(event, 'extrato')">📊<br>Início</button>
    <button class="nav-item" onclick="abrirAba(event, 'lancamento')">➕<br>Lançar</button>
    <button class="nav-item" onclick="abrirAba(event, 'config')">⚙️<br>Menu</button>
</nav>

<script src="script.js"></script>
</body>
</html>
