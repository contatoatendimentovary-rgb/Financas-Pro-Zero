<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO // Premium</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFFFFF; --card: #F4F4F5; --text-main: #09090B; --text-sub: #71717A;
            --border: #E4E4E7; --accent: #FDE047; --green: #22C55E; --red: #EF4444;
        }

        body.dark-mode {
            --bg: #000000; --card: #0A0A0A; --text-main: #FFFFFF; --text-sub: #A1A1AA; --border: #1F2937;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; }
        
        .app-lock-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; }
        
        .glass-header { background: var(--bg); padding: 40px 20px 30px; border-radius: 0 0 35px 35px; border-bottom: 1px solid var(--border); text-align: center; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; margin: 5px 0; }

        .viz-card { background: var(--card); margin: 20px; padding: 25px; border-radius: 32px; border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; align-items: center; }
        
        .entry-card { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: var(--red); color: white; border: none; width: 28px; height: 28px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-left: 10px; display: flex; align-items: center; justify-content: center; }
        
        .user-pill { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 8px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        .btn-logout { background: none; color: var(--red); border: 1px solid var(--red); padding: 5px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; margin-left: 10px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.65rem; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: var(--bg); width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--border); }
        .input-grid input, .input-grid select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; background: var(--card); color: var(--text-main); border: 1px solid var(--border); font-size: 1rem; }

        .floating-btn { position: fixed; bottom: 110px; right: 25px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); border: none; font-size: 28px; font-weight: 800; z-index: 999; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body class="dark-mode">

    <div id="app-lock" class="app-lock-overlay">
        <div style="font-weight:800; font-size:1.5rem; margin-bottom:10px;">Finanças<span>PRO</span></div>
        <button onclick="autenticarBio()" class="user-pill">DESBLOQUEAR APP</button>
    </div>

    <div class="app-wrapper">
        <header class="glass-header">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">☀️</button>
                <div style="display:flex; align-items:center;">
                    <button id="btnAuth" class="user-pill" onclick="loginGoogle()">Entrar</button>
                    <button id="btnLogout" class="btn-logout" style="display:none;" onclick="sair()">SAIR</button>
                </div>
            </div>
            <div class="main-balance">
                <small style="color:var(--text-sub)">Saldo Atual</small>
                <h1 id="saldo">R$ 0,00</h1>
            </div>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="viz-card">
                <h3 style="margin-bottom:20px; font-size:0.9rem;">Regra 50/30/20</h3>
                <div style="width:100%; height:100%;"><canvas id="graficoPizza"></canvas></div>
            </div>
        </section>

        <section id="aba-investimentos" class="tab-content">
            <div class="viz-card">
                <h3 style="margin-bottom:20px; font-size:0.9rem;">Evolução de Investimentos (Anual)</h3>
                <div style="width:100%; height:100%;"><canvas id="graficoBarras"></canvas></div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <button onclick="exportarCSV()" class="user-pill" style="width:100%; margin-bottom:15px; background:#1DB954; color:white;">EXPORTAR PLANILHA</button>
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option>
                    <option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option>
                    <option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option>
                    <option value="junho">Junho</option>
                    <option value="julho">Julho</option>
                    <option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option>
                    <option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option>
                    <option value="dezembro">Dezembro</option>
                </select>
            </div>
            <div id="lista" class="timeline-list"></div>
        </section>

        <nav class="bottom-nav">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active"><span>📊</span>Resumo</button>
            <button onclick="switchTab('aba-investimentos', this)" class="nav-btn"><span>📈</span>Aportes</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn"><span>📜</span>Extrato</button>
        </nav>

        <button onclick="abrirModal()" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="margin-bottom:20px;">Novo Registro</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Ex: Salário, Aluguel...">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Investimento (20%)</option>
                    </select>
                </div>
                <button onclick="salvar()" class="user-pill" style="width:100%; padding:20px; border-radius:18px;">SALVAR AGORA</button>
                <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:var(--text-sub); padding:15px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                document.getElementById('btnLogout').style.display = 'block';
                window.carregarDados();
            } else {
                document.getElementById('btnLogout').style.display = 'none';
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        window.sair = () => signOut(window.auth).then(() => location.reload());
    </script>

    <script>
        let currentChart, barChart;

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            icon.innerText = isDark ? '☀️' : '🌙';
            window.carregarDados(); // Recarrega para atualizar cores do gráfico
        }

        async function autenticarBio() {
            const lock = document.getElementById('app-lock');
            try {
                const cred = await navigator.credentials.create({
                    publicKey: {
                        challenge: crypto.getRandomValues(new Uint8Array(32)),
                        rp: { name: "FinancasPRO" },
                        user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "user", displayName: "User" },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { userVerification: "required" },
                        timeout: 60000
                    }
                });
                if (cred) { lock.style.opacity = '0'; setTimeout(() => lock.style.display = 'none', 500); }
            } catch (e) { lock.style.display = 'none'; }
        }

        async function carregarDados() {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            let r = 0, f = 0, l = 0, i = 0, html = "";
            let trans = snap.exists() ? snap.data().transacoes : [];

            trans.forEach((t, index) => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') r += v;
                else if(t.tipo === 'fixo') f += v;
                else if(t.tipo === 'lazer') l += v;
                else i += v;
                html += `<div class="entry-card">
                    <div><b>${t.descricao}</b><br><small>${t.data}</small></div>
                    <div style="display:flex; align-items:center;">
                        <b style="color:${t.tipo==='entrada'?'var(--green)':'var(--red)'}">${t.tipo==='entrada'?'+':'-'} R$${v.toFixed(2)}</b>
                        <button class="btn-delete" onclick="excluir(${index})">✕</button>
                    </div>
                </div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(r - (f+l+i)).toFixed(2)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center; padding:30px; opacity:0.3;">Nenhum lançamento</p>';
            renderPizza(f, l, i);
        }

        async function excluir(index) {
            if(!confirm("Deseja apagar este item?")) return;
            const user = window.auth.currentUser;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            let trans = snap.data().transacoes;
            trans.splice(index, 1);
            await window.setDoc(ref, { transacoes: trans });
            window.carregarDados();
        }

        function renderPizza(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            const isDark = document.body.classList.contains('dark-mode');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo (50%)', 'Lazer (30%)', 'Invest (20%)'],
                    datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }]
                },
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: isDark ? '#fff' : '#000' } } 
                    } 
                }
            });
        }

        async function renderInvestimentos() {
            const user = window.auth.currentUser;
            const mesesLabels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            const mesesRefs = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            let dados = [];

            for (let m of mesesRefs) {
                const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
                const snap = await window.getDoc(ref);
                let total = 0;
                if(snap.exists()) snap.data().transacoes.forEach(t => { if(t.tipo==='investimento') total += t.valor; });
                dados.push(total);
            }

            const ctx = document.getElementById('graficoBarras').getContext('2d');
            const isDark = document.body.classList.contains('dark-mode');
            if(barChart) barChart.destroy();
            barChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: mesesLabels, datasets: [{ label:'Investido', data: dados, backgroundColor:'#FDE047', borderRadius: 8 }] },
                options: { 
                    scales: { 
                        y: { ticks: { color: isDark ? '#aaa' : '#666' }, grid: { color: isDark ? '#1f1f1f' : '#eee' } },
                        x: { ticks: { color: isDark ? '#aaa' : '#666' }, grid: { display: false } }
                    },
                    plugins: { legend: { display: false } } 
                }
            });
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            if(tabId === 'aba-investimentos') renderInvestimentos();
        }

        function abrirModal() { document.getElementById('modal').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modal').style.display = 'none'; }

        async function salvar() {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, t = document.getElementById('tipo').value, dt = document.getElementById('data-lancamento').value, m = document.getElementById('filtroMes').value;
            if(!d || !v || !dt) return alert("Preencha todos os campos!");
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
            const snap = await window.getDoc(ref);
            let trans = snap.exists() ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: parseFloat(v), tipo: t, data: dt });
            await window.setDoc(ref, { transacoes: trans });
            fecharModal(); window.carregarDados();
        }

        async function exportarCSV() {
            const user = window.auth.currentUser;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            if(!snap.exists()) return alert("Sem dados.");
            let csv = "\uFEFFData,Descrição,Valor,Tipo\n";
            snap.data().transacoes.forEach(t => csv += `${t.data},${t.descricao},${t.valor},${t.tipo}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `extrato_${mes}.csv`;
            link.click();
        }
    </script>
</body>
</html>
