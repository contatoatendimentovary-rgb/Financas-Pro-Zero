<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinançasPRO | Henrique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #0A0A0A; --text: #FFFFFF; --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047; }
        body.light-mode { --bg: #F9FAFB; --card: #FFFFFF; --text: #111827; --border: #E5E7EB; --accent: #EAB308; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 100px; }
        
        .header { padding: 30px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .viz-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        
        .floating-btn { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; font-size: 30px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .ia-btn { position: fixed; bottom: 30px; left: 20px; width: 60px; height: 60px; border-radius: 50%; background: #2563eb; border: none; font-size: 24px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: #fff; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; }

        #chat-box { height: 300px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .ia { background: #1e293b; align-self: flex-start; }
        .user { background: var(--accent); color: #000; align-self: flex-end; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight:800; font-size:1.2rem;">Finanças<span style="color:var(--accent)">PRO</span></div>
        <button id="btnAuth" onclick="window.loginGoogle()" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:10px 20px; border-radius:12px; font-weight:800;">ENTRAR</button>
    </header>

    <div class="viz-card">
        <small style="color:var(--accent); font-weight:bold; text-transform:uppercase;">Saldo Atual</small>
        <h1 id="saldoMain" style="font-size:3rem; margin:10px 0;">R$ 0,00</h1>
    </div>

    <button class="ia-btn" onclick="window.abrirModal('modalIA')">🤖</button>
    <button class="floating-btn" onclick="window.abrirModal('modalReg')">+</button>

    <div id="modalIA" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Falar com Finan</h3>
            <div id="chat-box">
                <div class="msg ia">Oi Henrique! Como estão os trades hoje?</div>
            </div>
            <input type="text" id="ia-input" placeholder="Pergunte algo...">
            <button class="btn-main" onclick="window.perguntarIA()">ENVIAR</button>
            <button onclick="window.fecharModal('modalIA')" style="background:none; border:none; color:gray; width:100%; margin-top:15px;">Fechar</button>
        </div>
    </div>

    <div id="modalReg" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Novo Registro</h3>
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor R$">
            <select id="tipo">
                <option value="entrada">Receita (+)</option>
                <option value="fixo">Essencial (-)</option>
                <option value="lazer">Lazer (-)</option>
                <option value="investimento">Investimento (-)</option>
            </select>
            <button class="btn-main" onclick="window.salvar()">SALVAR</button>
            <button onclick="window.fecharModal('modalReg')" style="background:none; border:none; color:gray; width:100%; margin-top:15px;">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Funções Globais
        window.loginGoogle = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => alert("Erro ao logar: " + err.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                atualizarSaldo();
            } else {
                document.getElementById('btnAuth').innerText = "ENTRAR";
            }
        });

        async function atualizarSaldo() {
            if (!auth.currentUser) return;
            const mes = "abril"; // Para teste fixo
            const docRef = doc(db, "usuarios", auth.currentUser.uid, "meses", mes);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                let total = 0;
                snap.data().transacoes.forEach(t => {
                    total += t.tipo === 'entrada' ? parseFloat(t.valor) : -parseFloat(t.valor);
                });
                document.getElementById('saldoMain').innerText = total.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            }
        }

        window.salvar = async () => {
            if (!auth.currentUser) return alert("Logue primeiro!");
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, t = document.getElementById('tipo').value;
            const docRef = doc(db, "usuarios", auth.currentUser.uid, "meses", "abril");
            const snap = await getDoc(docRef);
            let lista = snap.exists() ? snap.data().transacoes : [];
            lista.push({ descricao: d, valor: v, tipo: t, data: new Date().toISOString() });
            await setDoc(docRef, { transacoes: lista });
            window.fecharModal('modalReg');
            atualizarSaldo();
        };

        window.perguntarIA = async () => {
            const prompt = document.getElementById('ia-input').value;
            const chat = document.getElementById('chat-box');
            if(!prompt) return;
            chat.innerHTML += `<div class="msg user">${prompt}</div>`;
            document.getElementById('ia-input').value = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${firebaseConfig.apiKey}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Responda como Finan, assistente financeiro do Henrique: ${prompt}` }] }] })
                });
                const data = await res.json();
                const texto = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ia">${texto}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ia">Erro: Verifique sua chave de API ou conexão.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        };

        window.abrirModal = (id) => document.getElementById(id).style.display = 'flex';
        window.fecharModal = (id) => document.getElementById(id).style.display = 'none';
    </script>
</body>
</html>
