<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finan Pro | Correção Saldo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .header { padding: 45px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 100; }
        .month-bar { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; scrollbar-width: none; }
        .m-item { padding: 10px 18px; border-radius: 14px; background: #1A1A1A; border: 1px solid var(--border); color: var(--subtext); font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .hero { text-align: center; padding: 35px 20px; }
        .hero h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; }

        .mini-stats { display: flex; flex-direction: column; gap: 10px; margin: 0 20px 20px; }
        .stat-card { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-card small { font-size: 0.6rem; color: var(--subtext); text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 5px; }

        .chart-box { background: var(--card); border-radius: 28px; border: 1px solid var(--border); margin: 0 20px; padding: 30px; }
        .chart-container { width: 180px; height: 180px; margin: 0 auto; }

        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); font-weight: 800; font-size: 0.7rem; }
        .n-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b>FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-display" onclick="login()" style="background:var(--accent); color:#000; padding:5px 12px; border-radius:10px; font-size:0.7rem; font-weight:900;">LOGIN</div>
        </div>
        <div class="month-bar" id="month-list"></div>
    </header>

    <div id="v-home">
        <div class="hero">
            <span style="font-size:0.7rem; color:var(--subtext); font-weight:800; text-transform:uppercase;">Saldo Real Disponível</span>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>

        <div class="mini-stats">
            <div class="stat-card" style="border-left: 4px solid var(--accent);">
                <small>Acumulado Meses Anteriores</small>
                <b id="st-ant" style="color:var(--accent); font-size:1.2rem;">R$ 0,00</b>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="stat-card" style="flex:1;"><small>Entradas Mês</small><b id="st-rec" style="color:var(--green)">R$ 0,00</b></div>
                <div class="stat-card" style="flex:1;"><small>Saídas Mês</small><b id="st-gas" style="color:var(--red)">R$ 0,00</b></div>
            </div>
        </div>

        <div class="chart-box">
            <div class="chart-container"><canvas id="myChart"></canvas></div>
        </div>
    </div>

    <nav class="nav-bot">
        <button class="n-btn active">📊 HOME</button>
        <button class="n-btn">📜 EXTRATO</button>
    </nav>

    <script>
        const cfg = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let chart = null;

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        async function sync() {
            if(!auth.currentUser) return;
            
            let saldoAcumulado = 0;
            const indexAtual = MESES.indexOf(mesAtivo);

            // SOMA TUDO ATÉ O MÊS ANTERIOR
            for (let i = 0; i < indexAtual; i++) {
                const s = await db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(MESES[i]).get();
                if(s.exists) {
                    (s.data().transacoes || []).forEach(t => {
                        const v = parseFloat(t.valor) || 0;
                        if(t.tipo.toLowerCase().includes('entrada')) saldoAcumulado += v;
                        else saldoAcumulado -= v;
                    });
                }
            }

            document.getElementById('st-ant').innerText = saldoAcumulado.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

            // ESCUTA O MÊS ATUAL
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo)
            .onSnapshot(doc => {
                let recMes = 0, gasMes = 0;
                let cats = { Fixo: 0, Lazer: 0, Outros: 0 };
                const data = doc.exists ? doc.data().transacoes || [] : [];

                data.forEach(t => {
                    const v = parseFloat(t.valor) || 0;
                    const tp = t.tipo.toLowerCase();
                    if(tp.includes('entrada')) recMes += v;
                    else {
                        gasMes += v;
                        if(tp.includes('fixo')) cats.Fixo += v;
                        else if(tp.includes('lazer')) cats.Lazer += v;
                        else cats.Outros += v;
                    }
                });

                const totalReal = saldoAcumulado + recMes - gasMes;
                document.getElementById('main-balance').innerText = totalReal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('st-rec').innerText = `R$ ${recMes.toFixed(2)}`;
                document.getElementById('st-gas').innerText = `R$ ${gasMes.toFixed(2)}`;

                renderChart(cats, (saldoAcumulado + recMes - gasMes));
            });
        }

        function renderChart(c, sobra) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Fixo', 'Lazer', 'Outros', 'Saldo'],
                    datasets: [{
                        data: [c.Fixo, c.Lazer, c.Outros, sobra > 0 ? sobra : 0],
                        backgroundColor: ['#3B82F6', '#F59E0B', '#EF4444', '#EAB308'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function init() {
            const cont = document.getElementById('month-list');
            MESES.forEach(m => {
                const d = document.createElement('div');
                d.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                d.innerText = m.charAt(0).toUpperCase() + m.slice(1);
                d.onclick = () => { 
                    document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active'));
                    d.classList.add('active'); 
                    mesAtivo = m; sync(); 
                };
                cont.appendChild(d);
            });
            auth.onAuthStateChanged(u => { if(u){ sync(); } });
        }

        init();
    </script>
</body>
</html>
