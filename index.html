<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EAB308">
    <title>FinançasPRO | Edição Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #EAB308; --text: #FFFFFF;
            --subtext: #A1A1AA; --green: #22C55E; --red: #EF4444; --border: #27272A;
            --blue: #3B82F6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }

        /* Header e Navegação de Meses */
        .header { padding: 50px 20px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-bar { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; }
        .month-bar::-webkit-scrollbar { display: none; }
        .m-item { padding: 10px 18px; border-radius: 14px; background: #1A1A1A; color: var(--subtext); border: 1px solid var(--border); font-weight: 700; white-space: nowrap; font-size: 0.8rem; transition: 0.3s; }
        .m-item.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        /* Hero e Resumo */
        .hero { text-align: center; padding: 30px 20px 10px; }
        .hero h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1.5px; }
        .hero span { color: var(--subtext); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

        /* Gráfico Centralizado */
        .chart-box { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin: 0 20px; text-align: center; }
        .chart-container { position: relative; width: 150px; height: 150px; margin: 0 auto; }

        /* Lista de Extrato com Emojis */
        .t-row { background: var(--card); padding: 16px; border-radius: 20px; margin: 0 20px 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .t-info { display: flex; align-items: center; gap: 15px; }
        .t-emoji { width: 45px; height: 45px; background: #1A1A1A; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .t-details b { display: block; font-size: 0.95rem; letter-spacing: -0.3px; }
        .t-details span { font-size: 0.65rem; color: var(--subtext); font-weight: 800; text-transform: uppercase; }
        
        .t-actions { display: flex; align-items: center; gap: 12px; }
        .btn-del { background: rgba(239, 68, 68, 0.1); border: none; color: var(--red); width: 38px; height: 38px; border-radius: 12px; font-size: 1rem; cursor: pointer; }

        /* Aba Diagnóstico */
        .diag-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin: 0 20px 15px; }
        .progress-bg { background: #1A1A1A; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Balão da IA (Floating Action Button) */
        .ai-fab { position: fixed; bottom: 105px; right: 20px; width: 60px; height: 60px; border-radius: 20px; background: var(--accent); color: #000; border: none; font-size: 26px; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); z-index: 999; }

        /* Menu Inferior */
        .nav-bot { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: 20px; z-index: 1000; }
        .n-btn { flex: 1; border: none; background: none; color: var(--subtext); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 0.65rem; }
        .n-btn.active { color: var(--accent); }
        .n-btn i { font-size: 1.5rem; margin-bottom: 5px; }

        /* Modais e Paineis */
        .panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; flex-direction: column; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: flex-end; }
        .sheet { background: var(--bg); width: 100%; border-radius: 30px 30px 0 0; padding: 30px; border-top: 3px solid var(--accent); }
        input, select { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); color: #fff; font-weight: 700; }
    </style>
</head>
<body>

    <div id="ai-panel" class="panel">
        <div style="padding:25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b>✨ ASSISTENTE FINANCEIRO</b>
            <button onclick="toggleAI()" style="background:none; border:none; color:#fff; font-size:2rem;">&times;</button>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
        <div style="padding:25px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="ai-in" placeholder="Ex: Paguei 40 no lanche" style="margin:0;">
            <button onclick="askIA()" style="background:var(--accent); border:none; padding:0 25px; border-radius:14px; font-weight:900;">OK</button>
        </div>
    </div>

    <header class="header">
        <div class="nav-top">
            <b style="font-size: 1.1rem; letter-spacing: -0.5px;">FINANÇAS<span style="color:var(--accent)">PRO</span></b>
            <div id="user-info" onclick="login()" style="background:var(--accent); color:#000; padding:8px 18px; border-radius:12px; font-size:0.7rem; font-weight:900;">LOGIN</div>
        </div>
        <div class="month-bar" id="m-list"></div>
    </header>

    <div id="v-dash">
        <div class="hero"><span>Saldo Disponível</span><h1 id="v-bal">R$ 0,00</h1></div>
        <div class="chart-box">
            <div class="chart-container"><canvas id="chart"></canvas></div>
            <p style="margin-top:15px; font-size:0.7rem; color:var(--subtext); font-weight:800; letter-spacing:1px;">RESUMO MENSAL</p>
        </div>
    </div>

    <div id="v-list" style="display:none; padding-top:20px;">
        <div id="t-cont"></div>
    </div>

    <div id="v-diag" style="display:none; padding: 25px 0;">
        <div class="diag-card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:800;"><span>🏠 ESSENCIAIS (50%)</span><b id="p-fixo">0%</b></div>
            <div class="progress-bg"><div id="b-fixo" class="progress-fill" style="background: var(--blue); width: 0%;"></div></div>
        </div>
        <div class="diag-card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:800;"><span>🍿 LAZER (30%)</span><b id="p-lazer">0%</b></div>
            <div class="progress-bg"><div id="b-lazer" class="progress-fill" style="background: var(--accent); width: 0%;"></div></div>
        </div>
        <div class="diag-card">
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:800;"><span>💰 INVESTIMENTO (20%)</span><b id="p-inv">0%</b></div>
            <div class="progress-bg"><div id="b-inv" class="progress-fill" style="background: var(--green); width: 0%;"></div></div>
        </div>
        <div id="ai-diag-msg" style="margin:20px; padding:20px; background:rgba(234,179,8,0.1); border-radius:20px; font-size:0.85rem; border-left:4px solid var(--accent);">Carregando diagnóstico...</div>
    </div>

    <button class="ai-fab" onclick="toggleAI()">✨</button>

    <nav class="nav-bot">
        <button class="n-btn active" onclick="tab('dash', this)"><i>📊</i>Home</button>
        <button class="n-btn" onclick="openAdd()"><i>➕</i>Lançar</button>
        <button class="n-btn" onclick="tab('list', this)"><i>📜</i>Extrato</button>
        <button class="n-btn" onclick="tab('diag', this)"><i>❤️</i>Saúde</button>
    </nav>

    <div id="m-add" class="overlay" onclick="if(event.target==this) closeAdd()">
        <div class="sheet">
            <h3 style="margin-bottom:20px;">Novo Lançamento</h3>
            <input type="text" id="in-desc" placeholder="Ex: Aluguel, Mercado...">
            <input type="number" id="in-val" placeholder="0.00">
            <select id="in-tipo">
                <option value="entrada">💵 Receita / Pix</option>
                <option value="fixo">🏠 Gasto Fixo</option>
                <option value="lazer">🍿 Lazer / Variável</option>
                <option value="investimento">💰 Investimento</option>
            </select>
            <input type="date" id="in-date">
            <button class="btn-save" style="background:var(--accent); width:100%; padding:20px; border-radius:18px; border:none; font-weight:900; font-size:1.1rem;" onclick="save()">SALVAR AGORA</button>
        </div>
    </div>

    <script>
        const FB = { apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE", authDomain: "financaspro-1e0e8.firebaseapp.com", projectId: "financaspro-1e0e8", storageBucket: "financaspro-1e0e8.firebasestorage.app", messagingSenderId: "659521706556", appId: "1:659521706556:web:86f2174c4c8a89335ac139" };
        firebase.initializeApp(FB);
        const auth = firebase.auth(), db = firebase.firestore();

        const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        let mesAtivo = MESES[new Date().getMonth()];
        let myChart = null;

        function init() {
            const bar = document.getElementById('m-list');
            MESES.forEach(m => {
                const b = document.createElement('div');
                b.className = `m-item ${m === mesAtivo ? 'active' : ''}`;
                b.innerText = m;
                b.onclick = () => { document.querySelectorAll('.m-item').forEach(x => x.classList.remove('active')); b.classList.add('active'); mesAtivo = m; sync(); };
                bar.appendChild(b);
            });
            sync();
        }

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function sync() {
            if(!auth.currentUser) return;
            db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase())
            .onSnapshot(doc => {
                let r=0, f=0, l=0, i=0, html="";
                const emojis = { entrada: "💵", fixo: "🏠", lazer: "🍿", investimento: "💰" };

                if(doc.exists) {
                    const trans = (doc.data().transacoes || []).reverse();
                    trans.forEach((t, idx) => {
                        const v = parseFloat(t.valor);
                        if(t.tipo==='entrada') r+=v; 
                        else if(t.tipo==='fixo') f+=v;
                        else if(t.tipo==='investimento') i+=v;
                        else l+=v;

                        html += `<div class="t-row">
                                    <div class="t-info">
                                        <div class="t-emoji">${emojis[t.tipo] || "📝"}</div>
                                        <div class="t-details"><b>${t.descricao}</b><span>${t.tipo}</span></div>
                                    </div>
                                    <div class="t-actions">
                                        <b style="color:${t.tipo==='entrada'?'var(--green)':'#fff'}">R$ ${v.toFixed(2)}</b>
                                        <button class="btn-del" onclick="del(${trans.length-1-idx})">🗑️</button>
                                    </div>
                                 </div>`;
                    });
                }
                const totalGasto = f + l + i;
                document.getElementById('v-bal').innerText = (r - totalGasto).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                document.getElementById('t-cont').innerHTML = html || "<p style='text-align:center;padding:50px;opacity:0.3;'>Sem lançamentos.</p>";
                
                render(r, totalGasto);
                calcularSaude(r, f, l, i);
            });
        }

        function calcularSaude(receita, fixo, lazer, inv) {
            if(receita <= 0) { document.getElementById('ai-diag-msg').innerText = "Adicione uma receita para ver o diagnóstico."; return; }
            const pF = (fixo / receita * 100).toFixed(0);
            const pL = (lazer / receita * 100).toFixed(0);
            const pI = (inv / receita * 100).toFixed(0);

            document.getElementById('p-fixo').innerText = pF + "%";
            document.getElementById('b-fixo').style.width = Math.min(pF, 100) + "%";
            document.getElementById('p-lazer').innerText = pL + "%";
            document.getElementById('b-lazer').style.width = Math.min(pL, 100) + "%";
            document.getElementById('p-inv').innerText = pI + "%";
            document.getElementById('b-inv').style.width = Math.min(pI, 100) + "%";

            let msg = "✨ <b>Análise do Mês:</b> ";
            if(pF > 55) msg += "Cuidado! Seus custos fixos estão muito altos. Tente reduzir para 50%.";
            else if(pI < 15) msg += "Bom trabalho, mas tente investir pelo menos 20% do que ganha.";
            else msg += "Excelente! Você está dominando a regra 50/30/20 este mês.";
            document.getElementById('ai-diag-msg').innerHTML = msg;
        }

        async function save() {
            const d = document.getElementById('in-desc').value, v = document.getElementById('in-val').value, t = document.getElementById('in-tipo').value;
            if(!d || !v) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let list = snap.exists ? snap.data().transacoes : [];
            list.push({ descricao: d, valor: v, tipo: t, data: document.getElementById('in-date').value || new Date().toISOString().split('T')[0] });
            await ref.set({ transacoes: list }); closeAdd();
        }

        async function del(index) {
            if(!confirm("Deseja apagar este registro?")) return;
            const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
            const snap = await ref.get();
            let list = snap.data().transacoes; list.splice(index, 1);
            await ref.set({ transacoes: list });
        }

        async function askIA() {
            const inp = document.getElementById('ai-in'), box = document.getElementById('chat-box');
            const txt = inp.value; if(!txt) return;
            box.innerHTML += `<div style="background:var(--accent); color:#000; padding:15px; border-radius:18px; align-self:flex-end; font-weight:800;">${txt}</div>`;
            inp.value = "";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method:'POST', headers:{'Authorization':'Bearer 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','Content-Type':'application/json'},
                    body:JSON.stringify({ model:"llama-3.1-8b-instant", messages:[{role:"user", content:`Analise: "${txt}". Responda APENAS JSON: {"desc":"Nome","valor":0.0,"tipo":"entrada/fixo/lazer/investimento"}`}], response_format:{"type":"json_object"}})
                });
                let r = JSON.parse((await res.json()).choices[0].message.content);
                if(!r.desc || r.desc === "undefined") r.desc = txt;
                const ref = db.collection("usuarios").doc(auth.currentUser.uid).collection("meses").doc(mesAtivo.toLowerCase());
                const snap = await ref.get();
                let list = snap.exists ? snap.data().transacoes : [];
                list.push({ ...r, data: new Date().toISOString().split('T')[0] });
                await ref.set({ transacoes: list });
                box.innerHTML += `<div style="background:#27272A; padding:15px; border-radius:18px;">✅ Lançado com sucesso!</div>`;
            } catch(e) { box.innerHTML += `<div>Erro na IA.</div>`; }
        }

        function render(inVal, outVal) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type:'doughnut', 
                data:{ datasets:[{data:[outVal||0.1, inVal||0.1], backgroundColor:['#EF4444','#EAB308'], borderWidth:0}]}, 
                options:{ cutout:'88%', plugins: { legend: { display: false } } } 
            });
        }

        function tab(v, b) {
            document.getElementById('v-dash').style.display = v==='dash'?'block':'none';
            document.getElementById('v-list').style.display = v==='list'?'block':'none';
            document.getElementById('v-diag').style.display = v==='diag'?'block':'none';
            document.querySelectorAll('.n-btn').forEach(n => n.classList.remove('active')); b.classList.add('active');
        }

        function openAdd() { document.getElementById('in-date').value = new Date().toISOString().split('T')[0]; document.getElementById('m-add').style.display='flex'; }
        function closeAdd() { document.getElementById('m-add').style.display='none'; }
        function toggleAI() { const p = document.getElementById('ai-panel'); p.style.display = p.style.display==='none'?'flex':'none'; }

        init();
        auth.onAuthStateChanged(u => { if(u){ document.getElementById('user-info').innerText = u.displayName.split(' ')[0].toUpperCase(); sync(); } });
    </script>
</body>
</html>
