<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366F1">
    <link rel="manifest" href="manifest.json">
    <title>FinançasPRO // Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode">
    <div class="app-wrapper">
        <header class="glass-header">
            <div class="header-content">
                <div class="brand">Finanças<span>PRO</span></div>
                <div class="header-utils">
                    <button id="toggleTheme" class="theme-switch">🌓</button>
                    <button id="btnAuth" class="user-pill">Entrar</button>
                </div>
            </div>
            <div class="main-balance">
                <small>Saldo Geral</small>
                <h1 id="saldo">R$ 0,00</h1>
            </div>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="stats-row">
                <div class="stat-card incoming">
                    <div class="icon">↑</div>
                    <div class="data"><small>Receitas</small><b id="resumo-receita">R$ 0</b></div>
                </div>
                <div class="stat-card outgoing">
                    <div class="icon">↓</div>
                    <div class="data"><small>Despesas</small><b id="resumo-despesa">R$ 0</b></div>
                </div>
            </div>
            <div class="viz-card">
                <h4 class="card-title">Distribuição Mensal</h4>
                <div class="chart-box"><canvas id="graficoPizza"></canvas></div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div class="sticky-filter">
                <select id="filtroMes" class="modern-select">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril" selected>Abril</option>
                    <option value="maio">Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
                </select>
            </div>
            <div id="lista" class="timeline-list"></div>
        </section>

        <section id="aba-metas" class="tab-content">
            <div class="meta-container">
                <div class="meta-item">
                    <div class="meta-info"><span>Essencial (50%)</span><b id="txt-fixo">0 / 0</b></div>
                    <div class="progress-container"><div id="bar-fixo" class="bar g-green"></div></div>
                </div>
                <div class="meta-item">
                    <div class="meta-info"><span>Desejos (30%)</span><b id="txt-lazer">0 / 0</b></div>
                    <div class="progress-container"><div id="bar-lazer" class="bar g-orange"></div></div>
                </div>
                <div class="meta-item">
                    <div class="meta-info"><span>Investimento (20%)</span><b id="txt-invest">0 / 0</b></div>
                    <div class="progress-container"><div id="bar-invest" class="bar g-blue"></div></div>
                </div>
            </div>
        </section>

        <nav class="bottom-tab-bar">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active">📊<span>Home</span></button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn">📜<span>Extrato</span></button>
            <button onclick="switchTab('aba-metas', this)" class="nav-btn">🎯<span>Metas</span></button>
        </nav>

        <button id="abrirModal" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <div class="drag-handle"></div>
                <h3>Novo Lançamento</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição (ex: Aluguel)">
                    <input type="number" id="valor" placeholder="R$ 0,00">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial (50%)</option>
                        <option value="lazer">Lazer (30%)</option>
                        <option value="investimento">Investimento (20%)</option>
                    </select>
                </div>
                <button id="btnSalvar" class="btn-confirm">Salvar</button>
                <button id="btnFechar" class="btn-abort">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                window.carregarDados();
            } else {
                document.getElementById('btnAuth').innerText = "Entrar";
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        window.logout = () => signOut(window.auth).then(() => location.reload());
        document.getElementById('btnAuth').onclick = () => window.auth.currentUser ? window.logout() : window.loginGoogle();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then(reg => reg.update());
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
