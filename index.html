<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças PRO 50/30/20</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
</head>
<body>

<header>
    <h1>Finanças<span>PRO</span></h1>
    <div id="statusOrcamento" class="badge-status">Analisando...</div>
</header>

<div class="container">
    <section id="extrato" class="aba-content active">
        <div class="card-balanco">
            <div class="seletor-mes">
                <select id="filtroMes" onchange="carregarDados()"></select>
            </div>
            <div class="main-balance">
                <small>Saldo Atual</small>
                <h2 id="saldo">R$ 0,00</h2>
            </div>
            <div class="sub-balanco">
                <div class="item-balanco">
                    <small>Receitas</small>
                    <span id="receita" class="text-green">R$ 0,00</span>
                </div>
                <div class="item-balanco">
                    <small>Despesas</small>
                    <span id="despesa" class="text-red">R$ 0,00</span>
                </div>
            </div>
        </div>

        <div class="card-chart">
            <canvas id="graficoPizza"></canvas>
        </div>

        <div id="lista" class="historico-lista"></div>
    </section>

    <section id="lancamento" class="aba-content">
        <div class="card-form">
            <h2>Novo Lançamento</h2>
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" step="0.01" placeholder="Valor R$">
            <input type="date" id="data">
            <select id="tipo">
                <option value="receita">Receita (Entrada)</option>
                <option value="despesa" selected>Despesa (Saída)</option>
            </select>
            <select id="cat">
                <option value="Essencial">Essencial (50%)</option>
                <option value="Lazer">Lazer (30%)</option>
                <option value="Investimento">Investimento (20%)</option>
            </select>
            <button onclick="salvarNovoDado()" class="btn-save">Salvar Registro</button>
        </div>
    </section>
</div>

<nav class="nav-bottom">
    <button class="nav-item active" onclick="abrirAba(event, 'extrato')">📊 Dashboard</button>
    <button class="nav-item" onclick="abrirAba(event, 'lancamento')">➕ Lançar</button>
</nav>

<script src="script.js"></script>
</body>
</html>
