<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>FinançasPRO // Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --header-bg: #000000; --card: #0A0A0A; --text-main: #FFFFFF;
            --text-sub: #A1A1AA; --border: #1F2937; --accent: #FDE047;
            --green: #22C55E; --orange: #F97316; --red: #EF4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 120px; min-height: 100vh; overflow-x: hidden; }
        
        /* TELA DE BLOQUEIO BIOMÉTRICO */
        .app-lock-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .lock-btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 20px; font-weight: 800; cursor: pointer; margin-top: 20px; }

        .glass-header { background: var(--header-bg); padding: 40px 20px 30px; border-bottom: 1px solid var(--border); }
        .header-content { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-weight: 800; font-size: 1.2rem; } .brand span { color: var(--accent); }
        .user-pill { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 800; }
        
        .main-balance { text-align: center; }
        .main-balance h1 { font-size: 2.8rem; font-weight: 800; color: var(--text-main); margin-top: 5px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-top: -30px; }
        .stat-card { background: var(--card); padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        
        .viz-card { background: var(--card); margin: 25px 20px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); height: 320px; display: flex; flex-direction: column; justify-content: center; }
        .chart-box { position: relative; height: 100%; width: 100%; }
        
        .tab-content { display: none; } .tab-content.active { display: block; }

        .entry-card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: none; border: none; color: var(--red); font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        .bottom-tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: #000; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .floating-btn { position: fixed; bottom: 120px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); border: none; font-size: 32px; font-weight: 800; z-index: 999; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-sheet { background: #000; width: 100%; border-radius: 35px 35px 0 0; padding: 35px; border-top: 1px solid var(--border); max-width: 500px; margin: 0 auto; }
        .input-grid input, .input-grid select { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 16px; border: 1px solid var(--border); background: #0A0A0A; color: #fff; }
    </style>
</head>
<body class="dark-mode">

    <div id="app-lock" class="app-lock-overlay">
        <div style="font-weight:800; font-size:1.5rem;">FinançasPRO Locked</div>
        <button onclick="validarDigital()" class="lock-btn">USAR BIOMETRIA</button>
    </div>

    <div class="app-wrapper">
        <header class="glass-header">
            <div class="header-content">
                <div class="brand">Finanças<span>PRO</span></div>
                <button id="btnAuth" class="user-pill">Entrar</button>
            </div>
            <div class="main-balance">
                <small>Saldo Disponível</small>
                <h1 id="saldo">R$ 0,00</h1>
            </div>
        </header>

        <section id="aba-dashboard" class="tab-content active">
            <div class="stats-row">
                <div class="stat-card"><div class="icon">↑</div><div><small>Receitas</small><br><b id="resumo-receita">R$ 0</b></div></div>
                <div class="stat-card"><div class="icon">↓</div><div><small>Gastos</small><br><b id="resumo-despesa">R$ 0</b></div></div>
            </div>
            <div class="viz-card">
                <div class="chart-box"><canvas id="graficoPizza"></canvas></div>
            </div>
        </section>

        <section id="aba-extrato" class="tab-content">
            <div style="padding: 20px;">
                <select id="filtroMes" class="input-grid" onchange="carregarDados()">
                    <option value="janeiro">Janeiro</option><option value="fevereiro">Fevereiro</option>
                    <option value="março">Março</option><option value="abril">Abril</option>
                    <option value="maio" selected>Maio</option><option value="junho">Junho</option>
                    <option value="julho">Julho</option><option value="agosto">Agosto</option>
                    <option value="setembro">Setembro</option><option value="outubro">Outubro</option>
                    <option value="novembro">Novembro</option><option value="dezembro">Dezembro</option>
                </select>
            </div>
            <div id="lista" style="padding: 0 20px;"></div>
        </section>

        <nav class="bottom-tab-bar">
            <button onclick="switchTab('aba-dashboard', this)" class="nav-btn active">📊 Home</button>
            <button onclick="switchTab('aba-extrato', this)" class="nav-btn">📜 Extrato</button>
        </nav>

        <button onclick="document.getElementById('modal').style.display='flex'" class="floating-btn">+</button>

        <div id="modal" class="modal-overlay">
            <div class="modal-sheet">
                <h3 style="color:white; margin-bottom:15px;">Novo Lançamento</h3>
                <div class="input-grid">
                    <input type="text" id="desc" placeholder="Descrição">
                    <input type="number" id="valor" placeholder="Valor R$">
                    <input type="date" id="data-lancamento">
                    <select id="tipo">
                        <option value="entrada">Receita (+)</option>
                        <option value="fixo">Essencial</option>
                        <option value="lazer">Lazer</option>
                        <option value="investimento">Investimento</option>
                    </select>
                </div>
                <button onclick="salvarLancamento()" style="width:100%; padding:20px; background:var(--accent); border:none; border-radius:18px; font-weight:800;">CONFIRMAR</button>
                <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; border:none; color:var(--text-sub); padding:10px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6C8n-wiKv6kp2Q7Y99D2GEL2fg_0SPVE",
            authDomain: "financaspro-1e0e8.firebaseapp.com",
            projectId: "financaspro-1e0e8",
            storageBucket: "financaspro-1e0e8.firebasestorage.app",
            messagingSenderId: "659521706556",
            appId: "1:659521706556:web:86f2174c4c8a89335ac139"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.db = getFirestore(app);
        window.doc = doc; window.setDoc = setDoc; window.getDoc = getDoc;

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                document.getElementById('btnAuth').innerText = user.displayName.split(' ')[0];
                window.carregarDados();
            }
        });

        window.loginGoogle = () => signInWithPopup(window.auth, new GoogleAuthProvider());
        document.getElementById('btnAuth').onclick = () => window.loginGoogle();
    </script>
    
    <script>
        let currentChart;

        // BIOMETRIA MODELO QUE FUNCIONA
        async function validarDigital() {
            try {
                if (window.PublicKeyCredential) {
                    await navigator.credentials.get({
                        publicKey: { challenge: crypto.getRandomValues(new Uint8Array(32)), timeout: 60000, userVerification: "required" }
                    });
                }
                document.getElementById('app-lock').style.display = 'none';
            } catch (e) {
                alert("Erro na biometria ou cancelado.");
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            window.carregarDados();
        }

        window.carregarDados = async () => {
            const user = window.auth.currentUser; if (!user) return;
            const mes = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mes);
            const snap = await window.getDoc(ref);
            
            let r = 0, f = 0, l = 0, i = 0, html = "";
            let trans = snap.exists() ? snap.data().transacoes : [];
            
            trans.forEach((t, idx) => {
                const v = parseFloat(t.valor);
                if (t.tipo === 'entrada') r += v;
                else { if(t.tipo === 'fixo') f += v; else if(t.tipo === 'lazer') l += v; else i += v; }
                html += `<div class="entry-card"><div><b>${t.descricao}</b><br><small>${t.data}</small></div><div style="text-align:right"><b style="color:${t.tipo==='entrada'?'#22C55E':'#EF4444'}">R$ ${v.toFixed(2)}</b><br><button class="btn-del" onclick="deletar(${idx})">Remover</button></div></div>`;
            });

            document.getElementById('saldo').innerText = `R$ ${(r - (f+l+i)).toFixed(2)}`;
            document.getElementById('resumo-receita').innerText = `R$ ${r.toFixed(0)}`;
            document.getElementById('resumo-despesa').innerText = `R$ ${(f+l+i).toFixed(0)}`;
            document.getElementById('lista').innerHTML = html || '<p style="text-align:center;opacity:0.3;padding:20px;">Vazio</p>';
            renderPizza(f, l, i);
        };

        function renderPizza(f, l, i) {
            const ctx = document.getElementById('graficoPizza').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Fixo', 'Lazer', 'Invest'], datasets: [{ data: [f, l, i], backgroundColor: ['#EF4444', '#F97316', '#FDE047'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        window.salvarLancamento = async () => {
            const user = window.auth.currentUser;
            const d = document.getElementById('desc').value, v = document.getElementById('valor').value, dt = document.getElementById('data-lancamento').value, t = document.getElementById('tipo').value;
            
            if (!dt) return alert("Selecione a data!");
            
            // PEGA O MÊS DA DATA PARA SALVAR NO LUGAR CERTO
            const meses = ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            const mesAlvo = meses[new Date(dt).getUTCMonth()];

            const ref = window.doc(window.db, "usuarios", user.uid, "meses", mesAlvo);
            const snap = await window.getDoc(ref);
            let trans = snap.exists() ? snap.data().transacoes : [];
            trans.push({ descricao: d, valor: parseFloat(v), tipo: t, data: dt });
            
            await window.setDoc(ref, { transacoes: trans });
            document.getElementById('modal').style.display = 'none';
            window.carregarDados();
        };

        window.deletar = async (idx) => {
            const user = window.auth.currentUser; const m = document.getElementById('filtroMes').value;
            const ref = window.doc(window.db, "usuarios", user.uid, "meses", m);
            const snap = await window.getDoc(ref);
            let trans = snap.data().transacoes; trans.splice(idx, 1);
            await window.setDoc(ref, { transacoes: trans });
            window.carregarDados();
        };
    </script>
</body>
</html>
